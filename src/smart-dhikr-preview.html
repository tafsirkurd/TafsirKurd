<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dev Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d1520;color:#cde;padding:16px;font-size:14px}

/* ── mushaf viewer ── */
#mushaf-wrap{max-width:500px;margin:0 auto 32px}
.m-title{text-align:center;color:#ffc850;font-size:1rem;margin-bottom:4px}
.m-sub{text-align:center;color:#445;font-size:.65rem;margin-bottom:14px;direction:ltr}
.m-tabs{display:flex;gap:8px;margin-bottom:12px;direction:ltr}
.m-tab{flex:1;text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;font-size:.75rem;border:1px solid #1e2d3d;background:#0a1018;color:#556;transition:.15s}
.m-tab.on{background:#1e2d3d;color:#7ab4ff;border-color:#2a3d52}
.m-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.m-nav button{background:#1e2d3d;border:1px solid #2a3d52;color:#cde;padding:8px 22px;border-radius:8px;cursor:pointer;font-size:.9rem}
.m-nav button:disabled{opacity:.3;cursor:default}
#m-lbl{color:#7ab4ff;min-width:80px;text-align:center;font-size:.82rem}
#m-img{width:100%;border-radius:10px;display:none;border:1px solid #222}
#m-loading{text-align:center;padding:40px;color:#445;font-size:.8rem}
#m-err{display:none;text-align:center;padding:16px;color:#f4a261;font-size:.75rem;direction:ltr;background:#1a0f0a;border-radius:8px;margin-top:8px}

/* ── ayahs ── */
#m-ayahs{}
.s-hdr{text-align:center;background:#1a2030;border-radius:8px;padding:10px;margin:10px 0 4px;color:#ffc850;font-size:.85rem}
.ayah-row{padding:10px 12px;border-bottom:1px solid #111;line-height:2.1;direction:rtl}
.a-num{display:inline-block;background:#1e2d3d;color:#7ab4ff;font-size:.6rem;border-radius:999px;padding:1px 7px;margin-right:5px;vertical-align:middle}
.a-txt{font-size:1.1rem;color:#e8d9b8}
#m-ayahs-loading{text-align:center;padding:20px;color:#445;font-size:.78rem}
#m-ayahs-err{color:#f4a261;padding:16px;font-size:.75rem;direction:ltr;display:none}

/* ── coverage table ── */
h1{text-align:center;color:#7ab4ff;margin-bottom:6px;font-size:1.1rem}
.subtitle{text-align:center;color:#556;font-size:.75rem;margin-bottom:24px}
h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#445;margin:28px 0 10px;border-top:1px solid #1a2535;padding-top:16px}
table{width:100%;border-collapse:collapse;margin-bottom:8px}
th{font-size:.65rem;color:#445;text-align:right;padding:4px 8px;background:#0a1018;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #141e2a;vertical-align:top}
tr:hover td{background:#111d2a}
.id{font-size:.65rem;color:#334;font-family:monospace}
.tag{display:inline-block;background:rgba(255,200,80,.18);color:#ffc850;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:999px}
.tag.none{background:rgba(120,120,120,.15);color:#556}
.label{color:#e8d9b8;font-size:.9rem}
.source{color:#7a9ab0;font-size:.75rem}
.ar{color:#aaa;font-size:.78rem;line-height:1.5;direction:rtl;max-width:320px}
.ok{color:#4caf84;font-size:.7rem;font-weight:700}
.warn{color:#f4a261;font-size:.7rem;font-weight:700}
</style>
</head>
<body>

<!-- ══════════════════ MUSHAF VIEWER ══════════════════ -->
<div id="mushaf-wrap">
  <p class="m-title">مصحف — تاقیکرن</p>
  <p class="m-sub">quran.yousefheiba.com · image + text · 604 pages</p>

  <div class="m-nav">
    <button id="m-prev" onclick="mNav(-1)" disabled>◀</button>
    <span id="m-lbl">— / —</span>
    <button id="m-next" onclick="mNav(1)">▶</button>
  </div>

  <div class="m-tabs">
    <div class="m-tab on" id="tab-both" onclick="mTab('both')">Image + Text</div>
    <div class="m-tab" id="tab-img"  onclick="mTab('img')">Image only</div>
    <div class="m-tab" id="tab-txt"  onclick="mTab('txt')">Text only</div>
  </div>

  <div id="m-loading">جارکرن...</div>
  <img id="m-img" alt="quran page">
  <div id="m-err"></div>

  <div id="m-ayahs"></div>
</div>

<!-- ══════════════════ COVERAGE TABLE ══════════════════ -->
<hr style="border:none;border-top:1px solid #1a2535;margin-bottom:24px">
<h1>Smart Dhikr — Card Text Coverage</h1>
<p class="subtitle">✅ = hardcoded in JS &nbsp;|&nbsp; ⚠️ = comes from Supabase/i18n</p>

<script>
/* ═══════════ MUSHAF VIEWER ═══════════ */
(function() {
  var IMG_BASE  = 'https://quran.yousefheiba.com/api/quranPagesImage';
  var TEXT_BASE = 'https://quran.yousefheiba.com/api/quranPagesText';

  var pageUrls = {};        // page_number → page_url
  var total    = 604;
  var cur      = 1;
  var mode     = 'both';    // 'both' | 'img' | 'txt'

  var imgEl    = document.getElementById('m-img');
  var loadEl   = document.getElementById('m-loading');
  var errEl    = document.getElementById('m-err');
  var ayahsEl  = document.getElementById('m-ayahs');
  var lblEl    = document.getElementById('m-lbl');

  window.mTab = function(t) {
    mode = t;
    ['both','img','txt'].forEach(function(x) {
      document.getElementById('tab-'+x).className = 'm-tab' + (x===t?' on':'');
    });
    render();
  };

  window.mNav = function(dir) {
    cur = Math.max(1, Math.min(total, cur + dir));
    render();
  };

  function render() {
    lblEl.textContent = 'پ ' + cur + ' / ' + total;
    document.getElementById('m-prev').disabled = cur <= 1;
    document.getElementById('m-next').disabled = cur >= total;

    var wantImg = mode === 'img'  || mode === 'both';
    var wantTxt = mode === 'txt'  || mode === 'both';

    imgEl.style.display  = 'none';
    loadEl.style.display = 'none';
    errEl.style.display  = 'none';
    ayahsEl.innerHTML    = '';

    if (wantImg) showImage(cur);
    if (wantTxt) showText(cur);
  }

  function showImage(page) {
    if (pageUrls[page]) {
      setImg(pageUrls[page]);
    } else if (Object.keys(pageUrls).length > 0) {
      errEl.style.display = 'block';
      errEl.textContent   = 'No URL cached for page ' + page;
    } else {
      loadEl.style.display  = 'block';
      loadEl.textContent    = 'Image جارکرن...';
      fetch(IMG_BASE + '?page=1', {headers:{'Accept':'application/json'}})
        .then(function(r){return r.json();})
        .then(function(d){
          if (d.pages) d.pages.forEach(function(p){pageUrls[p.page_number]=p.page_url;});
          if (d.total_pages) total = d.total_pages;
          loadEl.style.display = 'none';
          if (pageUrls[page]) setImg(pageUrls[page]);
          else { errEl.style.display='block'; errEl.textContent='No URL for page '+page; }
        })
        .catch(function(e){
          loadEl.style.display = 'none';
          errEl.style.display  = 'block';
          errEl.textContent    = '❌ Image API: '+e.message;
        });
    }
  }

  function setImg(url) {
    imgEl.onload  = function(){imgEl.style.display='block';};
    imgEl.onerror = function(){errEl.style.display='block';errEl.textContent='❌ Image load failed: '+url;};
    imgEl.src = url;
  }

  function showText(page) {
    var loadDiv = document.createElement('div');
    loadDiv.id  = 'm-ayahs-loading';
    loadDiv.textContent = 'Text جارکرن...';
    ayahsEl.appendChild(loadDiv);

    fetch(TEXT_BASE + '?page=' + page, {headers:{'Accept':'application/json'}})
      .then(function(r){return r.json();})
      .then(function(d){
        ayahsEl.innerHTML = '';
        if (!d.data || !d.data.ayahs) {
          var e = document.createElement('div'); e.id='m-ayahs-err'; e.style.display='block';
          e.textContent='Unexpected API shape'; ayahsEl.appendChild(e); return;
        }
        var lastSurah = null;
        d.data.ayahs.forEach(function(a){
          if (a.surah.number !== lastSurah) {
            lastSurah = a.surah.number;
            var hdr = document.createElement('div');
            hdr.className = 's-hdr';
            hdr.textContent = a.surah.name;
            ayahsEl.appendChild(hdr);
          }
          var row = document.createElement('div');
          row.className = 'ayah-row';
          var num = document.createElement('span');
          num.className = 'a-num'; num.textContent = a.numberInSurah;
          var txt = document.createElement('span');
          txt.className = 'a-txt'; txt.textContent = a.text;
          row.appendChild(num); row.appendChild(txt);
          ayahsEl.appendChild(row);
        });
      })
      .catch(function(e){
        ayahsEl.innerHTML = '';
        var err = document.createElement('div'); err.id='m-ayahs-err'; err.style.display='block';
        err.textContent='❌ Text API: '+e.message; ayahsEl.appendChild(err);
      });
  }

  // Boot: pre-fetch image index so navigation is instant
  loadEl.style.display = 'block';
  loadEl.textContent   = 'جارکرن...';
  fetch(IMG_BASE + '?page=1', {headers:{'Accept':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.pages) d.pages.forEach(function(p){pageUrls[p.page_number]=p.page_url;});
      if (d.total_pages) { total=d.total_pages; }
      loadEl.style.display = 'none';
      render();
    })
    .catch(function(e){
      loadEl.style.display = 'none';
      errEl.style.display  = 'block';
      errEl.textContent    = '❌ Image API failed: '+e.message+' — text-only mode';
      mode = 'txt';
      document.getElementById('tab-txt').className='m-tab on';
      document.getElementById('tab-both').className='m-tab';
      render();
    });
})();
</script>

<!-- ══════════════════ COVERAGE TABLE ══════════════════ -->

      repeat:1, source:'أبو داود', ar:null },
    { id:'salawat', timeTag:null, tagStatus:'none',
      label:'صەڵەوات', labelStatus:'warn', labelNote:'labelFallback',
      repeat:10, source:'مسلم', ar:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ' }
  ],
  'FALLBACK_ZIKR': [
    { id:'forgiveness', timeTag:null, tagStatus:'none', label:'داواکاری لێبوردن', labelStatus:'warn', labelNote:'labelFallback', repeat:3, source:'البخاري ومسلم', ar:'أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ' },
    { id:'protection', timeTag:null, tagStatus:'none', label:'پاراستن', labelStatus:'warn', labelNote:'labelFallback', repeat:3, source:'أبو داود والترمذي', ar:'بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ' },
    { id:'gratitude', timeTag:null, tagStatus:'none', label:'سوپاسگوزاری', labelStatus:'warn', labelNote:'labelFallback', repeat:3, source:'ابن ماجه', ar:'الْحَمْدُ لِلَّهِ الَّذِي بِنِعْمَتِهِ تَتِمُّ الصَّالِحَاتُ' },
    { id:'before_quran', timeTag:null, tagStatus:'none', label:'بەری خوێندنا قورئانێ', labelStatus:'warn', labelNote:'labelFallback', repeat:1, source:'البخاري', ar:'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ' },

    { id:'adhan', timeTag:null, tagStatus:'none', label:'دوای ئەزان', labelStatus:'warn', labelNote:'labelFallback', repeat:1, source:'البخاري', ar:'اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ وَالصَّلَاةِ الْقَائِمَةِ' }
  ],
  'SEASONAL_ITEMS': [
    { id:'fasting', timeTag:'ڕەمەزان', tagStatus:'ok', label:'نیەتا ڕۆژوو', labelStatus:'warn', labelNote:'labelFallback', repeat:1, source:'أبو داود', ar:'اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ' },

Object.keys(ITEMS).forEach(function(pool) {
  var h2 = document.createElement('h2');
  h2.textContent = pool;
  document.body.appendChild(h2);

  var table = document.createElement('table');
  var thead = document.createElement('tr');
  thead.innerHTML = '<th>id</th><th>تاگ</th><th>تێکست</th><th>چاوکانی</th><th>عەرەبی</th>';
  table.appendChild(thead);

  ITEMS[pool].forEach(function(item) {
    var parts = [item.label];
    if (item.repeat > 1) parts.push('× ' + item.repeat);
    if (item.source)     parts.push(item.source);

    var tr = document.createElement('tr');
    var tagCell = item.timeTag
      ? '<span class="tag">' + item.timeTag + '</span> <span class="ok">✅</span>'
      : '<span class="tag none">بێ تاگ</span>';

      ? '<span class="ok">✅ هاردکۆد</span>'
      : '<span class="warn">⚠️ ' + item.labelNote + '</span>';

    tr.innerHTML = '<td class="id">' + item.id + '</td>'
      + '<td>' + tagCell + '</td>'
      + '<td><div class="label">' + parts.join(' · ') + '</div>'
         + '<div style="font-size:.65rem;margin-top:3px">' + statusBit + '</div></td>'
      + '<td><span class="ok">✅</span></td>'
      + '<td class="ar">' + (item.ar || '—') + '</td>';
    table.appendChild(tr);
  });

  document.body.appendChild(table);

</html>

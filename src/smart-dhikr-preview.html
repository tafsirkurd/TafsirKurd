<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dev Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d1520;color:#cde;padding:24px;font-size:14px}
h1{text-align:center;color:#7ab4ff;margin-bottom:6px;font-size:1.1rem}
.subtitle{text-align:center;color:#556;font-size:.75rem;margin-bottom:24px}
h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#445;margin:28px 0 10px;border-top:1px solid #1a2535;padding-top:16px}
table{width:100%;border-collapse:collapse;margin-bottom:8px}
th{font-size:.65rem;color:#445;text-align:right;padding:4px 8px;background:#0a1018;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #141e2a;vertical-align:top}
tr:hover td{background:#111d2a}
.id{font-size:.65rem;color:#334;font-family:monospace}
.tag{display:inline-block;background:rgba(255,200,80,.18);color:#ffc850;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:999px}
.label{color:#e8d9b8;font-size:.9rem}
.ar{color:#aaa;font-size:.78rem;line-height:1.5;direction:rtl;max-width:320px}
.ok{color:#4caf84;font-size:.7rem;font-weight:700}
</style>
</head>
<body>

<h1>Smart Dhikr — Card Text Coverage</h1>
<p class="subtitle">All texts hardcoded as labelFallback in smart-dhikr.js</p>

<script>
var ITEMS = {
  'TIME_ITEMS': [
    { id:'masjid_enter',  tag:'مزگەفت',            label:'چوونا مزگەفتێ',                   repeat:3,   source:'مسلم',              ar:'اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ' },
    { id:'after_prayer',  tag:'پشتی نڤێژێ',         label:'پشتی نڤێژێ',                      repeat:33,  source:'البخاري ومسلم',    ar:'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ' },
    { id:'morning',       tag:'سپێدە',              label:'زکرێ سپێدێ',                      repeat:3,   source:'أبو داود',          ar:'اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا' },
    { id:'waking',        tag:'ڕابوون ژ خەوێ',     label:'پشتی ڕابوونێ ژ خەوێ',            repeat:1,   source:'البخاري',           ar:'الحَمْدُ للَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا' },
    { id:'sunrise',       tag:'ئیشراق',             label:'نڤێژا ئیشراقێ',                   repeat:null,source:null,               ar:null },
    { id:'evening',       tag:'ئێڤار',              label:'زکرێن ئێڤاری',                    repeat:3,   source:'أبو داود والترمذي',ar:'اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا' },
    { id:'sleep',         tag:'شەڤ',               label:'بەرى نڤستنێ',                     repeat:3,   source:'البخاري ومسلم',    ar:'بِاسْمِكَ اللَّهُمَّ أَموُتُ وَأَحْيَا' },
    { id:'friday',        tag:'ئەینی',              label:'ڕۆژا ئینیێ',                      repeat:1,   source:'أبو داود',          ar:null },
    { id:'salawat',       tag:'صەڵەوات',            label:'صەڵەواتدان ل سەر پێغەمبەری ﷺ',   repeat:10,  source:'مسلم',              ar:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ' }
  ],
  'FALLBACK_ZIKR': [
    { id:'forgiveness',   tag:'ئیستغفار',           label:'داخوازا لێبۆرینێ',               repeat:3,   source:'البخاري ومسلم',    ar:'أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ' },
    { id:'protection',    tag:'پاراستن',            label:'پاراستنا موسلمانی',               repeat:3,   source:'أبو داود والترمذي',ar:'بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ' },
    { id:'salawat',       tag:'صەڵەوات',            label:'صەڵەواتدان ل سەر پێغەمبەری ﷺ',   repeat:10,  source:'مسلم',              ar:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ' },
    { id:'gratitude',     tag:'سوپاسگوزاری',        label:'حەمد و سەنا',                     repeat:3,   source:'ابن ماجه',          ar:'الْحَمْدُ لِلَّهِ الَّذِي بِنِعْمَتِهِ تَتِمُّ الصَّالِحَاتُ' },
    { id:'before_quran',  tag:'بەرى خواندنا قورئانێ',label:'ئادابێن قورئانێ',              repeat:1,   source:'البخاري',           ar:'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ' },
    { id:'distress',      tag:'دەمێ دلتەنگیێ',     label:'پەریشانی',                        repeat:3,   source:'الترمذي',           ar:'لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ' },
    { id:'istikhara',     tag:'ئیستیخارە',          label:'دوعایا ئیستیخارێ',               repeat:1,   source:'البخاري',           ar:'اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ وَأَسْتَقْدِرُكَ بِقُدْرَتِكَ' },
    { id:'adhan',         tag:'دوعایا پشتی بانگی',  label:'پشتی بانگی',                      repeat:1,   source:'البخاري',           ar:'اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ وَالصَّلَاةِ الْقَائِمَةِ' }
  ],
  'SEASONAL_ITEMS': [
    { id:'fasting',       tag:'ڕۆژیگرتن',          label:'ئنیەتا ڕۆژیێ',                    repeat:1,   source:'أبو داود',          ar:'اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ' },
    { id:'breaking_fast', tag:'فتارە',              label:'دەمێ فتارێ',                      repeat:1,   source:'أبو داود والترمذي',ar:'اللَّهُمَّ إِنِّي لَكَ صُمْتُ وَبِكَ آمَنْتُ' },
    { id:'lailat_qadr',   tag:'دوعایێن شەڤا قەدرێ',label:'شەوا قەدرێ',                     repeat:1,   source:'الترمذي',           ar:'اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي' },
    { id:'dhul_hijjah',   tag:'ذولحیجە',           label:'دەهکێن ذولحیجەیێ',               repeat:100, source:'البخاري',           ar:'سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَلَا إِلَهَ إِلَّا اللَّهُ وَاللَّهُ أَكْبَرُ' },
    { id:'arafat',        tag:'ڕۆژا عەرەفێ',       label:'دوعایا عەرەفاتێ',                repeat:1,   source:'مالك والترمذي',    ar:'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ' }
  ],
  'WEATHER_ITEMS': [
    { id:'rain',    tag:'دوعایێن بارانێ',  label:'باران',          repeat:1, source:'البخاري', ar:'اللَّهُمَّ صَيِّبًا نَافِعًا' },
    { id:'thunder', tag:'بریسی',           label:'دەمێ بریسیان',   repeat:1, source:'الموطأ',  ar:'سُبْحَانَ الَّذِي يُسَبِّحُ الرَّعْدُ بِحَمْدِهِ' },
    { id:'wind',    tag:'دوعایا بایێ ب هێز',label:'دەمێ بایێ',    repeat:1, source:'أبو داود',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَهَا وَخَيْرَ مَا فِيهَا' }
  ]
};

Object.keys(ITEMS).forEach(function(pool) {
  var h2 = document.createElement('h2');
  h2.textContent = pool;
  document.body.appendChild(h2);

  var table = document.createElement('table');
  var thead = document.createElement('tr');
  thead.innerHTML = '<th>id</th><th>تاگ</th><th>sd-sub</th><th>چاوکانی</th><th>عەرەبی</th>';
  table.appendChild(thead);

  ITEMS[pool].forEach(function(item) {
    var parts = [item.label];
    if (item.repeat > 1) parts.push('× ' + item.repeat);
    if (item.source) parts.push(item.source);

    var tr = document.createElement('tr');
    tr.innerHTML = '<td class="id">' + item.id + '</td>'
      + '<td><span class="tag">' + item.tag + '</span></td>'
      + '<td><div class="label">' + parts.join('  ·  ') + '</div>'
         + '<div style="font-size:.65rem;margin-top:3px"><span class="ok">✅ هاردکۆد</span></div></td>'
      + '<td><span class="ok">✅</span></td>'
      + '<td class="ar">' + (item.ar || '—') + '</td>';
    table.appendChild(tr);
  });

  document.body.appendChild(table);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TafsirKurd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FFFFFF;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            background: #000000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .login-logo svg {
            width: 28px;
            height: 28px;
            color: #FFFFFF;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #666666;
        }

        .login-card {
            background: #F5F5F5;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 8px;
            color: #000000;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #000000;
        }

        .form-input::placeholder {
            color: #999999;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #333333;
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 13px;
            color: #000000;
            display: none;
        }

        .error-message.active {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #FFFFFF;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999999;
        }
    </style>
    <script>
        // Early role-based sidebar hiding - runs before body renders
        (function() {
            var role = sessionStorage.getItem('adminRole');
            if (role && role !== 'super_admin') {
                var style = document.createElement('style');
                style.id = 'early-sidebar-hide';
                var css = '';
                if (role === 'analyst') {
                    css = '.nav-item[href*="messages"],.nav-item[href*="videos"],.nav-item[href*="tv-management"],.nav-item[href*="backgrounds"],.nav-item[href*="account-management"],.nav-item[href*="features"],.nav-item[href*="schedule"],.nav-item[href*="bot-protection"],.nav-item[href*="database"],.nav-item[href*="search-console"],.nav-item[href*="email-templates"],.nav-item[href*="activity-feed"]{display:none!important}';
                } else if (role === 'editor') {
                    css = '.nav-item[href*="analytics"],.nav-item[href*="users"],.nav-item[href*="reading-stats"],.nav-item[href*="social-stats"],.nav-item[href*="account-management"],.nav-item[href*="features"],.nav-item[href*="bot-protection"],.nav-item[href*="database"],.nav-item[href*="search-console"],.nav-item[href*="email-templates"],.nav-item[href*="activity-feed"]{display:none!important}';
                }
                style.textContent = css;
                document.head.appendChild(style);
            }
        })();
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i data-lucide="shield-check"></i>
            </div>
            <h1 class="login-title">Admin Login</h1>
            <p class="login-subtitle">TafsirKurd Dashboard</p>
        </div>

        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        class="form-input"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-input"
                        id="password"
                        placeholder="Enter your password"
                        required
                        autofocus
                    >
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i data-lucide="log-in"></i>
                    <span>Sign In</span>
                </button>

                <div class="error-message" id="errorMessage">
                    <i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i>
                    <span id="errorText"></span>
                </div>
            </form>
        </div>

        <div class="login-footer">
            Secure admin access • TafsirKurd © 2026
        </div>
    </div>

    <script src="/utils/device-fingerprint.js"></script>
    <script>
        lucide.createIcons();

        // Check if already logged in
        const adminToken = sessionStorage.getItem('adminToken');
        if (adminToken) {
            window.location.href = '/admin-dashboard.html';
        }

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Get device fingerprint (now async - generated server-side for security)
            const deviceFingerprint = window.deviceFingerprint ? await window.deviceFingerprint.get() : null;

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';
            errorMessage.classList.remove('active');

            try {
                const response = await fetch('/admin-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        deviceFingerprint
                    })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('adminToken', data.token);
                    console.log('✅ Login successful' + (data.deviceLocked ? ' (Device locked)' : ''));
                    window.location.href = '/admin-dashboard.html';
                } else {
                    // Show error with attempts remaining
                    let errorMsg = data.error || 'Invalid credentials';

                    // Handle device blocked
                    if (data.deviceBlocked) {
                        errorMsg = '🔒 ' + errorMsg;
                    } else if (data.attemptsRemaining !== undefined && data.attemptsRemaining > 0) {
                        errorMsg += ` (${data.attemptsRemaining} attempt${data.attemptsRemaining !== 1 ? 's' : ''} remaining)`;
                    }

                    errorText.textContent = errorMsg;
                    errorMessage.classList.add('active');
                    lucide.createIcons();

                    // Reset button
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i data-lucide="log-in"></i><span>Sign In</span>';
                    lucide.createIcons();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorText.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('active');
                lucide.createIcons();

                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i data-lucide="log-in"></i><span>Sign In</span>';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>

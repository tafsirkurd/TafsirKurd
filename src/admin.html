<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to New Admin Dashboard...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .redirect-container {
            max-width: 500px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #222222;
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            font-size: 14px;
            color: #CCCCCC;
            margin-bottom: 24px;
        }

        a {
            color: #FFFFFF;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h1>Redirecting to New Admin Dashboard</h1>
        <p>You are being redirected to the new admin dashboard...</p>
        <p style="font-size: 12px;">If you are not redirected automatically, <a href="/admin-login.html">click here</a>.</p>
    </div>

    <script>
        // Redirect to new admin login page after 2 seconds
        setTimeout(() => {
            window.location.href = '/admin-login.html';
        }, 2000);
    </script>
</body>
</html>

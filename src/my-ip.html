<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My IP Address</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .ip-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid #667eea;
        }

        .ip-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .loading {
            color: #999;
            font-style: italic;
        }

        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .success {
            color: #2ecc71;
            margin-top: 10px;
            font-weight: 600;
        }

        .info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Your IP Address</h1>
        <div class="ip-display">
            <div class="ip-value" id="ipAddress">Loading...</div>
        </div>
        <button class="copy-btn" id="copyBtn" onclick="copyIP()" style="display: none;">
            📋 Copy IP Address
        </button>
        <div class="success" id="copySuccess" style="display: none;">
            ✅ Copied to clipboard!
        </div>
        <div class="info">
            This is your current IP address. Send this to the admin to get access to restricted pages.
        </div>
    </div>

    <script>
        let currentIP = '';

        async function getIP() {
            try {
                const response = await fetch('/.netlify/functions/get-client-ip');
                const data = await response.json();
                currentIP = data.ip;

                document.getElementById('ipAddress').textContent = currentIP;
                document.getElementById('copyBtn').style.display = 'inline-block';
            } catch (error) {
                document.getElementById('ipAddress').textContent = 'Error loading IP';
                document.getElementById('ipAddress').style.color = '#e74c3c';
            }
        }

        function copyIP() {
            navigator.clipboard.writeText(currentIP).then(() => {
                document.getElementById('copySuccess').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('copySuccess').style.display = 'none';
                }, 2000);
            }).catch(err => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = currentIP;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                document.getElementById('copySuccess').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('copySuccess').style.display = 'none';
                }, 2000);
            });
        }

        // Load IP on page load
        getIP();
    </script>
</body>
</html>

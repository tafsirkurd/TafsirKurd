<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="*ƠH'H©1/F̀ *ÆE'1©1/F - *ƠA3̀1 ©HH1/">
    <title>*ƠH'H©1/F̀ *ÆE'1©1/F - *ƠA3̀1 ©HH1/</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --accent: #ffffff;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --border: #e8e8e8;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfdfd 0%, #ffffff 100%);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 200px;
            background: black;
            border-radius: 50%;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: black;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 180px;
            height: 180px;
            background: black;
            border-radius: 50%;
            bottom: 10%;
            left: 50%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            25% {
                transform: translateY(-30px) translateX(20px) rotate(90deg) scale(1.1);
            }
            50% {
                transform: translateY(0) translateX(40px) rotate(180deg) scale(1);
            }
            75% {
                transform: translateY(30px) translateX(20px) rotate(270deg) scale(0.9);
            }
        }

        .signup-container {
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 50px;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon {
            text-align: center;
            margin-bottom: 30px;
        }

        .success-icon i {
            font-size: 5rem;
            color: var(--success);
            animation: checkBounce 0.6s ease-out;
        }

        @keyframes checkBounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .welcome-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .user-info {
            background: var(--bg);
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
            text-align: center;
            border: 2px solid var(--border);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid var(--primary);
            animation: fadeIn 0.6s ease-out;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .user-email {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .preferences-section {
            margin: 30px 0;
        }

        .preferences-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            text-align: center;
        }

        .preference-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preference-item:hover {
            border-color: var(--primary);
            transform: translateX(-5px);
        }

        .preference-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 500;
        }

        .preference-icon {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 50px;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::after {
            right: 26px;
        }

        .continue-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: var(--accent);
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all var(--transition);
            margin: 35px 0 0 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .continue-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .continue-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .continue-btn span {
            position: relative;
            z-index: 1;
        }

        .continue-btn i {
            position: relative;
            z-index: 1;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .continue-btn.loading .loading-spinner {
            display: block;
        }

        .continue-btn.loading span {
            display: none;
        }

        .skip-link {
            text-align: center;
            margin-top: 20px;
        }

        .skip-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .skip-btn:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Tablet */
        @media (max-width: 992px) {
            .signup-card {
                padding: 40px 30px;
            }

            .welcome-title {
                font-size: 2rem;
            }
        }

        /* Mobile Large */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .signup-card {
                padding: 35px 25px;
                border-radius: 20px;
            }

            .welcome-title {
                font-size: 1.8rem;
            }

            .welcome-subtitle {
                font-size: 1rem;
            }

            .success-icon i {
                font-size: 4rem;
            }

            .user-avatar {
                width: 70px;
                height: 70px;
            }

            .user-name {
                font-size: 1.3rem;
            }

            .continue-btn {
                font-size: 1rem;
                padding: 16px;
            }
        }

        /* Mobile Small */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .signup-container {
                max-width: 100%;
            }

            .signup-card {
                padding: 25px 20px;
                border-radius: 18px;
            }

            .welcome-title {
                font-size: 1.5rem;
            }

            .welcome-subtitle {
                font-size: 0.95rem;
            }

            .success-icon i {
                font-size: 3.5rem;
            }

            .user-avatar {
                width: 60px;
                height: 60px;
            }

            .user-name {
                font-size: 1.2rem;
            }

            .user-email {
                font-size: 0.9rem;
            }

            .preferences-title {
                font-size: 1.1rem;
            }

            .preference-item {
                padding: 15px;
            }

            .preference-label {
                font-size: 0.95rem;
            }

            .continue-btn {
                font-size: 0.95rem;
                padding: 15px;
                margin-top: 25px;
            }

            .shape {
                display: none;
            }
        }

        /* Mobile Extra Small */
        @media (max-width: 360px) {
            .signup-card {
                padding: 20px 15px;
            }

            .welcome-title {
                font-size: 1.3rem;
            }

            .continue-btn {
                font-size: 0.9rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>

            <div class="welcome-header">
                <h1 class="welcome-title">3Ơ1©ƠH*HH (HH!</h1>
                <p class="welcome-subtitle">
                    (Ơ 3Ơ1©ƠH*HH̀̀ †HH̀*Ơ ˜HH1ƠHƠ. (' &Ơ2EHHFƠ©Ơ* •Î©(.ỜF
                </p>
            </div>

            <div class="user-info" id="userInfo">
                <!-- User info will be inserted here -->
            </div>

            <div class="preferences-section">
                <h2 class="preferences-title">GƠµ(˜'1/FƠ©'F*</h2>

                <div class="preference-item" onclick="togglePreference(this, 'notifications')">
                    <div class="preference-label">
                        <i class="fas fa-bell preference-icon"></i>
                        <span>&'¯'/'1©1/FƠHỜ •Æ˜'FƠ</span>
                    </div>
                    <div class="toggle-switch active" data-pref="notifications"></div>
                </div>

                <div class="preference-item" onclick="togglePreference(this, 'darkMode')">
                    <div class="preference-label">
                        <i class="fas fa-moon preference-icon"></i>
                        <span>/Æ.̀ *'1̀©</span>
                    </div>
                    <div class="toggle-switch" data-pref="darkMode"></div>
                </div>

                <div class="preference-item" onclick="togglePreference(this, 'autoSave')">
                    <div class="preference-label">
                        <i class="fas fa-save preference-icon"></i>
                        <span>GƠµ¯1*F̀ .Æ©'1</span>
                    </div>
                    <div class="toggle-switch active" data-pref="autoSave"></div>
                </div>
            </div>

            <button class="continue-btn" id="continueBtn" onclick="completeSignup()">
                <div class="loading-spinner"></div>
                <span>/Ơ3*~Î©1/F</span>
                <i class="fas fa-arrow-left"></i>
            </button>

            <div class="skip-link">
                <a class="skip-btn" onclick="skipToMain()">~ƠD©Î4©1/F H †HHFƠ 3Ơ1Ơ*'</a>
            </div>
        </div>
    </div>

    <script>
        // Load user data
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                // If no user data, redirect to login
                window.location.href = 'login.html';
                return;
            }

            // Display user info
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = `
                <img src="${user.picture}" alt="${user.name}" class="user-avatar">
                <div class="user-name">${user.name}</div>
                <div class="user-email">${user.email}</div>
            `;

            // Load saved preferences
            loadPreferences();
        });

        function loadPreferences() {
            const savedPrefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');

            // Set default preferences if not saved
            if (Object.keys(savedPrefs).length === 0) {
                savedPrefs.notifications = true;
                savedPrefs.darkMode = false;
                savedPrefs.autoSave = true;
            }

            // Apply saved preferences
            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                const pref = toggle.getAttribute('data-pref');
                if (savedPrefs[pref]) {
                    toggle.classList.add('active');
                } else {
                    toggle.classList.remove('active');
                }
            });
        }

        function togglePreference(item, prefName) {
            const toggle = item.querySelector('.toggle-switch');
            toggle.classList.toggle('active');

            // Save preference
            const prefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');
            prefs[prefName] = toggle.classList.contains('active');
            localStorage.setItem('userPreferences', JSON.stringify(prefs));
        }

        function completeSignup() {
            const btn = document.getElementById('continueBtn');
            btn.classList.add('loading');

            // Save completion status
            localStorage.setItem('signupCompleted', 'true');

            // Redirect to main page after 1 second
            setTimeout(() => {
                window.location.href = 'Quran.html';
            }, 1000);
        }

        function skipToMain() {
            // Save default preferences
            const defaultPrefs = {
                notifications: true,
                darkMode: false,
                autoSave: true
            };
            localStorage.setItem('userPreferences', JSON.stringify(defaultPrefs));
            localStorage.setItem('signupCompleted', 'true');

            // Redirect to main page
            window.location.href = 'Quran.html';
        }
    </script>
</body>
</html>

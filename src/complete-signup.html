<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="تەواوکردنی تۆمارکردن - تەفسیر کوورد">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>تەواوکردنی تۆمارکردن - تەفسیر کوورد</title>

    <!-- Favicons - High quality with SVG for perfect scaling -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/images/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/web-app-manifest-512x512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/web-app-manifest-192x192.png">
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">

    <!-- Kurdish Number Utility - Convert all numbers to Kurdish numerals -->
    <script src="utils/kurdish-numbers.js"></script>
    <script src="utils/auto-kurdish-numbers.js"></script>

    <!-- Apply theme immediately to prevent flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const userPrefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');
            const theme = savedTheme || (userPrefs.darkMode ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Critical Font Preloading - Instant font display, zero FOIT/FOUT -->
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-regular.woff2?v=16" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-600.woff2?v=16" as="font" type="font/woff2" crossorigin>

    <!-- Local Fonts - Zero external requests, instant loading -->
    <link rel="stylesheet" href="/assets/fonts/fonts.css?v=16">

    <!-- Local Font Awesome - Zero external requests -->
    <link rel="stylesheet" href="/assets/fontawesome/all.min.css?v=16">

    <!-- Notification System -->
    <script src="/utils/notification-messages.js"></script>
    <script src="/utils/notification-scheduler.js"></script>

    <style>
        :root {
            --primary: #000000;
            --accent: #ffffff;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --border: #e8e8e8;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #10b981;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --primary: #ffffff;
            --accent: #000000;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #ffffff;
            --text-muted: #b3b3b3;
            --border: #404040;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        [data-theme="dark"] .shape {
            background: white;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfdfd 0%, #ffffff 100%);
            min-height: 100vh;
            max-height: 100vh;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 200px;
            background: black;
            border-radius: 50%;
            top: 10%;
            left: 10%;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: black;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 60%;
            right: 10%;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
            }
            50% {
                transform: translateY(-20px) translateX(20px) scale(1.05);
            }
        }

        .signup-container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease-out;
            margin: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .success-icon {
            text-align: center;
            margin-bottom: 15px;
        }

        .success-icon i {
            font-size: 2.8rem;
            color: var(--success);
            animation: checkBounce 0.6s ease-out;
        }

        @keyframes checkBounce {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .welcome-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .welcome-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .user-info {
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid var(--border);
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 3px solid var(--primary);
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .user-email {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .preferences-section {
            margin: 15px 0;
        }

        .preferences-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            text-align: center;
        }

        .preference-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preference-item:hover {
            border-color: var(--primary);
            transform: translateX(-3px);
        }

        .preference-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .preference-icon {
            font-size: 1rem;
            color: var(--primary);
        }

        .toggle-switch {
            position: relative;
            width: 45px;
            height: 24px;
            background: #ccc;
            border-radius: 50px;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: var(--primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::after {
            right: 23px;
        }

        .continue-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: var(--accent);
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition);
            margin: 15px 0 0 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .continue-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .continue-btn span,
        .continue-btn i {
            position: relative;
            z-index: 1;
        }

        .loading-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .continue-btn.loading .loading-spinner {
            display: block;
        }

        .continue-btn.loading span {
            display: none;
        }

        .skip-link {
            text-align: center;
            margin-top: 12px;
        }

        .skip-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .skip-btn:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .signup-card {
                padding: 20px;
            }

            .success-icon i {
                font-size: 2.5rem;
            }

            .welcome-title {
                font-size: 1.4rem;
            }

            .shape {
                display: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .signup-card {
                padding: 18px;
                border-radius: 18px;
            }

            .success-icon {
                margin-bottom: 12px;
            }

            .success-icon i {
                font-size: 2.2rem;
            }

            .welcome-header {
                margin-bottom: 12px;
            }

            .welcome-title {
                font-size: 1.2rem;
            }

            .welcome-subtitle {
                font-size: 0.85rem;
            }

            .user-info {
                padding: 12px;
                margin: 12px 0;
            }

            .user-avatar {
                width: 45px;
                height: 45px;
                margin-bottom: 8px;
            }

            .user-name {
                font-size: 1rem;
            }

            .user-email {
                font-size: 0.78rem;
            }

            .preferences-section {
                margin: 12px 0;
            }

            .preferences-title {
                font-size: 0.9rem;
                margin-bottom: 10px;
            }

            .preference-item {
                padding: 8px 10px;
                margin-bottom: 6px;
            }

            .preference-label {
                font-size: 0.8rem;
                gap: 6px;
            }

            .preference-icon {
                font-size: 0.9rem;
            }

            .toggle-switch {
                width: 40px;
                height: 22px;
            }

            .toggle-switch::after {
                width: 18px;
                height: 18px;
            }

            .toggle-switch.active::after {
                right: 20px;
            }

            .continue-btn {
                font-size: 0.88rem;
                padding: 11px;
                margin-top: 12px;
            }

            .skip-link {
                margin-top: 10px;
            }

            .skip-btn {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 360px) {
            .signup-card {
                padding: 15px;
            }

            .welcome-title {
                font-size: 1.1rem;
            }

            .continue-btn {
                font-size: 0.82rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>

            <div class="welcome-header">
                <h1 class="welcome-title">سەرکەوتوو بوو!</h1>
                <p class="welcome-subtitle">
                    بە سەرکەوتوویی چوویتە ژوورەوە. با ئەزموونەکەت ڕێکبخەین
                </p>
            </div>

            <div class="user-info" id="userInfo">
                <!-- User info will be inserted here -->
            </div>

            <div class="preferences-section">
                <h2 class="preferences-title">هەڵبژاردنەکانت</h2>

                <div class="preference-item" onclick="togglePreference(this, 'notifications')">
                    <div class="preference-label">
                        <i class="fas fa-bell preference-icon"></i>
                        <span>ئاگادارکردنەوەی ڕۆژانە</span>
                    </div>
                    <div class="toggle-switch active" data-pref="notifications"></div>
                </div>

                <div class="preference-item" onclick="togglePreference(this, 'darkMode')">
                    <div class="preference-label">
                        <i class="fas fa-moon preference-icon"></i>
                        <span>دۆخی تاریک</span>
                    </div>
                    <div class="toggle-switch" data-pref="darkMode"></div>
                </div>

                <div class="preference-item" onclick="togglePreference(this, 'autoSave')">
                    <div class="preference-label">
                        <i class="fas fa-save preference-icon"></i>
                        <span>هەڵگرتنی خۆکار</span>
                    </div>
                    <div class="toggle-switch active" data-pref="autoSave"></div>
                </div>
            </div>

            <button class="continue-btn" id="continueBtn" onclick="completeSignup()">
                <div class="loading-spinner"></div>
                <span>دەستپێکردن</span>
                <i class="fas fa-arrow-left"></i>
            </button>

            <div class="skip-link">
                <a class="skip-btn" onclick="skipToMain()">پەلکێشکردن و چوونە سەرەتا</a>
            </div>
        </div>
    </div>

    <script>
        // Load user data
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                // If no user data, redirect to login
                window.location.href = '/login';
                return;
            }

            // Display user info (prevent Kurdish number conversion on email)
            const userInfoDiv = document.getElementById('userInfo');
            // Keep numbers in English for both name and email - don't convert
            userInfoDiv.innerHTML = `
                <img src="${user.picture}" alt="${user.name}" class="user-avatar">
                <div class="user-name" data-no-convert="true">${user.name}</div>
                <div class="user-email" data-no-convert="true">${user.email}</div>
            `;

            // Load saved preferences
            loadPreferences();
        });

        function loadPreferences() {
            const savedPrefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');
            const savedTheme = localStorage.getItem('theme');

            // Set default preferences if not saved
            if (Object.keys(savedPrefs).length === 0) {
                savedPrefs.notifications = true;
                savedPrefs.darkMode = false;
                savedPrefs.autoSave = true;
            }

            // Sync theme with darkMode preference
            if (savedTheme) {
                savedPrefs.darkMode = (savedTheme === 'dark');
            }

            // Apply saved theme
            document.documentElement.setAttribute('data-theme', savedPrefs.darkMode ? 'dark' : 'light');

            // Apply saved preferences to toggles
            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                const pref = toggle.getAttribute('data-pref');
                if (savedPrefs[pref]) {
                    toggle.classList.add('active');
                } else {
                    toggle.classList.remove('active');
                }
            });
        }

        async function togglePreference(item, prefName) {
            const toggle = item.querySelector('.toggle-switch');
            const wasActive = toggle.classList.contains('active');
            const willBeActive = !wasActive;

            // Special handling for notifications
            if (prefName === 'notifications' && willBeActive) {
                // Request browser notification permission
                const granted = await window.notificationScheduler.requestPermission();

                if (!granted) {
                    showNotification('Please enable notifications in your browser settings to receive reminders');
                    return; // Don't toggle if permission denied
                }
            }

            toggle.classList.toggle('active');
            const isActive = toggle.classList.contains('active');

            // Save preference
            const prefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');
            prefs[prefName] = isActive;
            localStorage.setItem('userPreferences', JSON.stringify(prefs));

            // Handle notification preference
            if (prefName === 'notifications') {
                if (isActive) {
                    // Save notification settings to browser
                    window.notificationScheduler.saveSettings({
                        enabled: true,
                        dailyReminder: true,
                        streakReminder: true,
                        goalReminder: true,
                        fridayReminder: true
                    });

                    // Save to database so email reminders work
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    if (user.sub) {
                        const userKey = 'quran_data_' + user.sub;
                        const saved = localStorage.getItem(userKey);
                        const userData = saved ? JSON.parse(saved) : {};

                        userData.notificationSettings = {
                            enabled: true,
                            emailReminders: true,
                            dailyReminder: true,
                            streakReminder: true,
                            goalReminder: true,
                            fridayReminder: true
                        };

                        fetch('/.netlify/functions/user-data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: user.sub,
                                action: 'save',
                                data: userData
                            })
                        }).catch(err => console.error('Failed to save notification settings:', err));
                    }

                    showNotification('Email reminders enabled! You\'ll receive daily Quran reminders in your inbox 📧🌙');
                } else {
                    // Disable notifications
                    window.notificationScheduler.saveSettings({ enabled: false });

                    // Save to database
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    if (user.sub) {
                        const userKey = 'quran_data_' + user.sub;
                        const saved = localStorage.getItem(userKey);
                        const userData = saved ? JSON.parse(saved) : {};

                        userData.notificationSettings = {
                            enabled: false,
                            emailReminders: false
                        };

                        fetch('/.netlify/functions/user-data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userId: user.sub,
                                action: 'save',
                                data: userData
                            })
                        }).catch(err => console.error('Failed to save notification settings:', err));
                    }

                    showNotification('Email reminders disabled');
                }
            }

            // If darkMode, apply theme immediately and save in Quran.html format
            if (prefName === 'darkMode') {
                const theme = isActive ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);

                // Show notification
                showNotification(isActive ? 'دۆخی تاریک چالاککرا' : 'دۆخی ڕووناک چالاککرا');
            }
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                left: 20px;
                padding: 15px 20px;
                background: linear-gradient(135deg, var(--primary) 0%, var(--primary) 100%);
                color: var(--accent);
                border-radius: 12px;
                font-weight: 600;
                text-align: center;
                box-shadow: var(--shadow-lg);
                z-index: 10000;
                animation: slideInDown 0.3s ease-out;
            `;
            notif.textContent = msg;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.animation = 'slideInDown 0.3s ease-in reverse';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        async function completeSignup() {
            const btn = document.getElementById('continueBtn');
            btn.classList.add('loading');

            try {
                // Save to localStorage
                localStorage.setItem('signupCompleted', 'true');

                // Save to database so it persists after logout
                const user = JSON.parse(localStorage.getItem('user'));
                if (user && user.sub) {
                    const userKey = 'quran_data_' + user.sub;
                    const saved = localStorage.getItem(userKey);
                    const userData = saved ? JSON.parse(saved) : {};

                    // Mark signup and profile as completed in database
                    userData.signupCompleted = true;
                    userData.profileCompleted = true;

                    await fetch('/.netlify/functions/user-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.sub,
                            action: 'save',
                            data: userData
                        })
                    });

                    console.log('✅ Signup completion saved to database');
                }

                // Try to clear service worker caches (non-blocking)
                clearAllCaches().catch(err => console.error('Cache clear error:', err));

                // Always redirect after short delay, regardless of cache clearing
                setTimeout(() => {
                    window.location.href = '/quran?t=' + Date.now();
                }, 800);
            } catch (error) {
                console.error('Signup completion error:', error);
                // Force redirect even on error
                window.location.href = '/quran?t=' + Date.now();
            }
        }

        async function skipToMain() {
            try {
                // Save default preferences
                const defaultPrefs = {
                    notifications: true,
                    darkMode: false,
                    autoSave: true
                };
                localStorage.setItem('userPreferences', JSON.stringify(defaultPrefs));
                localStorage.setItem('signupCompleted', 'true');

                // Save to database so it persists after logout
                const user = JSON.parse(localStorage.getItem('user'));
                if (user && user.sub) {
                    const userKey = 'quran_data_' + user.sub;
                    const saved = localStorage.getItem(userKey);
                    const userData = saved ? JSON.parse(saved) : {};

                    // Mark signup and profile as completed in database
                    userData.signupCompleted = true;
                    userData.profileCompleted = true;

                    await fetch('/.netlify/functions/user-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.sub,
                            action: 'save',
                            data: userData
                        })
                    });

                    console.log('✅ Signup completion saved to database (skipped)');
                }

                // Try to clear service worker caches (non-blocking)
                clearAllCaches().catch(err => console.error('Cache clear error:', err));

                // Always redirect after short delay
                setTimeout(() => {
                    window.location.href = '/quran?t=' + Date.now();
                }, 500);
            } catch (error) {
                console.error('Skip error:', error);
                // Force redirect even on error
                window.location.href = '/quran?t=' + Date.now();
            }
        }

        async function clearAllCaches() {
            try {
                // Clear all caches
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(cacheName => {
                    console.log('Clearing cache:', cacheName);
                    return caches.delete(cacheName);
                }));

                // Unregister all service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(registration => {
                        console.log('Unregistering service worker');
                        return registration.unregister();
                    }));
                }
            } catch (error) {
                console.error('Failed to clear caches:', error);
            }
        }

        // Don't register service worker on signup page
        // It will be registered on Quran.html after successful navigation
    </script>
</body>
</html>

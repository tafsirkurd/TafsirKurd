<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/utils/admin-guard.js?v=3"></script>
    <link rel="icon" type="image/png" href="/assets/images/TafsirKurd-favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="utils/theme-loader.js?v=2"></script>
    <title>Reading Stats - TafsirKurd Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/admin-styles.css?v=15">
    <style>
        .main-content { flex: 1; margin-left: 240px; min-width: 0; overflow-x: hidden; transition: margin-left 0.3s; }
        .sidebar.collapsed + .main-content { margin-left: 64px; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 12px; padding: 20px; }
        .stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .stat-icon i { width: 18px; height: 18px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--text-primary); line-height: 1; letter-spacing: -0.5px; margin-bottom: 4px; }
        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-tertiary); }
        .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        .table-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
        .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .table-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-tertiary); border-bottom: 1px solid var(--border-light); white-space: nowrap; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); color: var(--text-primary); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-hover); }

        .progress-bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; min-width: 80px; }
        .progress-fill { height: 100%; border-radius: 3px; background: #14b8a6; transition: width .3s; }
        .progress-fill.high { background: #10b981; }
        .progress-fill.mid { background: #f59e0b; }
        .progress-fill.low { background: #6366f1; }

        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .badge-green { background: rgba(16,185,129,.12); color: #10b981; }
        .badge-blue  { background: rgba(59,130,246,.12); color: #3b82f6; }
        .badge-gray  { background: var(--bg-active); color: var(--text-tertiary); }

        .search-input { padding: 7px 12px; border: 1px solid var(--border-light); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); font-size: 13px; font-family: inherit; width: 220px; }
        .search-input:focus { outline: none; border-color: #3b82f6; }

        .skel { height: 16px; background: var(--border-light); border-radius: 4px; animation: skel-pulse 1.2s ease infinite; }
        @keyframes skel-pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

        .dist-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary); }
        .dist-label { width: 90px; flex-shrink: 0; }
        .dist-bar-wrap { flex: 1; background: var(--border-light); border-radius: 3px; height: 8px; overflow: hidden; }
        .dist-bar-fill { height: 100%; border-radius: 3px; background: #14b8a6; transition: width .4s; }
        .dist-count { width: 32px; text-align: right; color: var(--text-tertiary); flex-shrink: 0; }

        .empty-state { padding: 48px 20px; text-align: center; color: var(--text-tertiary); }
        .empty-state i { width: 32px; height: 32px; margin-bottom: 12px; opacity: .4; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div id="topbar-mount"></div>
        <div class="page-content" style="padding: 24px; max-width: 1400px; margin: 0 auto;">

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
                <div>
                    <h1 style="font-size:22px;font-weight:800;color:var(--text-primary);margin:0 0 4px;">Quran Reading Stats</h1>
                    <p style="font-size:13px;color:var(--text-secondary);margin:0;">Reading progress across all registered users</p>
                </div>
                <button class="btn btn-secondary" onclick="loadStats()" id="refreshBtn" style="font-size:13px;display:inline-flex;align-items:center;gap:6px;">
                    <i data-lucide="refresh-cw" style="width:14px;height:14px;"></i> Refresh
                </button>
            </div>

            <!-- Summary stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="skel" style="width:60%;margin-bottom:8px;height:28px;"></div><div class="skel" style="width:40%;"></div></div>
                <div class="stat-card"><div class="skel" style="width:60%;margin-bottom:8px;height:28px;"></div><div class="skel" style="width:40%;"></div></div>
                <div class="stat-card"><div class="skel" style="width:60%;margin-bottom:8px;height:28px;"></div><div class="skel" style="width:40%;"></div></div>
                <div class="stat-card"><div class="skel" style="width:60%;margin-bottom:8px;height:28px;"></div><div class="skel" style="width:40%;"></div></div>
            </div>

            <!-- Distribution -->
            <div class="table-card" style="margin-bottom:24px;">
                <div class="table-header"><span class="table-title"><i data-lucide="bar-chart-2" style="width:14px;height:14px;vertical-align:-2px;margin-right:6px;"></i>Progress Distribution</span></div>
                <div style="padding:20px 24px;" id="distBlock">
                    <div class="skel" style="margin-bottom:10px;"></div>
                    <div class="skel" style="margin-bottom:10px;width:80%;"></div>
                    <div class="skel" style="margin-bottom:10px;width:60%;"></div>
                </div>
            </div>

            <!-- Users table -->
            <div class="table-card">
                <div class="table-header">
                    <span class="table-title"><i data-lucide="users" style="width:14px;height:14px;vertical-align:-2px;margin-right:6px;"></i>All Readers</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search by name or email…" oninput="filterTable()">
                </div>
                <div class="table-wrap">
                    <table id="readersTable">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Progress</th>
                                <th>Ayahs Read</th>
                                <th>Current Position</th>
                                <th>Best Streak</th>
                                <th>Active Days</th>
                                <th>Last Active</th>
                            </tr>
                        </thead>
                        <tbody id="readersBody">
                            <tr><td colspan="7"><div class="skel" style="margin:8px 0;"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.36.0"></script>
<script src="/utils/admin-sidebar.js?v=8" defer></script>
<script src="/utils/admin-topbar.js?v=4" defer></script>
<script src="/utils/admin-notifications.js?v=10"></script>

<script>
var _allUsers = [];

async function loadStats() {
    var btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" style="width:14px;height:14px;animation:spin .8s linear infinite"></i> Loading…';
    lucide.createIcons();

    try {
        var tok = sessionStorage.getItem('adminToken');
        var res = await fetch('/admin-users-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'get_reading_stats', token: tok })
        });
        var data = await res.json();
        if (data.error) throw new Error(data.error);
        renderStats(data);
    } catch(e) {
        document.getElementById('statsGrid').innerHTML = '<div style="grid-column:1/-1;padding:20px;color:var(--color-error)">Failed to load: ' + e.message + '</div>';
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i> Refresh';
        lucide.createIcons();
    }
}

function renderStats(data) {
    var s = data.summary || {};
    var users = data.users || [];
    _allUsers = users;

    // Summary cards
    document.getElementById('statsGrid').innerHTML = [
        { icon:'book-open', color:'#14b8a6', bg:'rgba(20,184,166,.12)', val: s.totalReaders || 0, label:'Total Readers', sub: 'users with ayahs read' },
        { icon:'trending-up', color:'#10b981', bg:'rgba(16,185,129,.12)', val: (s.avgProgress || 0) + '%', label:'Avg Completion', sub: 'across all readers' },
        { icon:'award', color:'#f59e0b', bg:'rgba(245,158,11,.12)', val: s.completedReaders || 0, label:'Completed Quran', sub: 'all 6,236 ayahs' },
        { icon:'zap', color:'#6366f1', bg:'rgba(99,102,241,.12)', val: s.activeReaders || 0, label:'Active (7 days)', sub: 'read recently' },
    ].map(function(c) {
        return '<div class="stat-card">'
            + '<div class="stat-icon" style="background:' + c.bg + '"><i data-lucide="' + c.icon + '" style="color:' + c.color + '"></i></div>'
            + '<div class="stat-value">' + c.val + '</div>'
            + '<div class="stat-label">' + c.label + '</div>'
            + '<div class="stat-sub">' + c.sub + '</div>'
            + '</div>';
    }).join('');

    // Distribution
    var dist = data.distribution || [];
    var labels = ['0–10%','10–25%','25–50%','50–75%','75–90%','90–100%'];
    var maxVal = Math.max.apply(null, dist.concat([1]));
    document.getElementById('distBlock').innerHTML = dist.map(function(count, i) {
        var pct = Math.round((count / maxVal) * 100);
        return '<div class="dist-row"><span class="dist-label">' + labels[i] + '</span>'
            + '<div class="dist-bar-wrap"><div class="dist-bar-fill" style="width:' + pct + '%"></div></div>'
            + '<span class="dist-count">' + count + '</span></div>';
    }).join('');

    renderTable(users);
    lucide.createIcons();
}

function renderTable(users) {
    var tbody = document.getElementById('readersBody');
    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><i data-lucide="book-open"></i><div>No readers yet</div></td></tr>';
        lucide.createIcons();
        return;
    }
    var TOTAL = 6236;
    tbody.innerHTML = users.map(function(u) {
        var pct = Math.min(100, Math.round(((u.ayahsRead || 0) / TOTAL) * 100));
        var fillClass = pct >= 75 ? 'high' : pct >= 25 ? 'mid' : 'low';
        var lastActive = u.lastActive ? new Date(u.lastActive).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'}) : '—';
        var pos = u.currentSurah ? 'S' + u.currentSurah + ':' + (u.currentAyah || 1) : '—';
        var streak = u.bestStreak ? u.bestStreak + ' days' : '—';
        var activeDays = u.activeDays30 ? u.activeDays30 + '/30d' : '—';
        return '<tr>'
            + '<td><div style="font-weight:600;color:var(--text-primary)">' + esc(u.name) + '</div>'
            + '<div style="font-size:11px;color:var(--text-tertiary)">' + esc(u.email) + '</div></td>'
            + '<td style="min-width:120px;"><div style="display:flex;align-items:center;gap:8px;">'
            + '<div class="progress-bar"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>'
            + '<span style="font-size:12px;color:var(--text-secondary);white-space:nowrap">' + pct + '%</span></div></td>'
            + '<td>' + (u.ayahsRead || 0).toLocaleString() + '</td>'
            + '<td>' + pos + '</td>'
            + '<td>' + streak + '</td>'
            + '<td>' + activeDays + '</td>'
            + '<td style="color:var(--text-secondary)">' + lastActive + '</td>'
            + '</tr>';
    }).join('');
}

function filterTable() {
    var q = (document.getElementById('searchInput').value || '').toLowerCase();
    var filtered = q ? _allUsers.filter(function(u) {
        return (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
    }) : _allUsers;
    renderTable(filtered);
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', function() {
    loadStats();
});
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>

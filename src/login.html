<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <script src="/utils/theme-loader.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="چوونە ژوورڤە بۆ تەفسیر کورد">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>چوونە ژوورڤە - تەفسیر کورد</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/images/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">

    <!-- Resource Hints -->
    <link rel="dns-prefetch" href="https://gijupzejtbpifjzwadee.supabase.co">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://gijupzejtbpifjzwadee.supabase.co" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Fonts -->
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-regular.woff2?v=16" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-600.woff2?v=16" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/fonts/fonts.css?v=16">
    <link rel="stylesheet" href="/assets/fontawesome/all.min.css?v=16">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #000000;
            --primary-light: #333333;
            --accent: #ffffff;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --border: #e8e8e8;
            --success: #2ecc71;
            --error: #e74c3c;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --primary: #ffffff;
            --primary-light: #cccccc;
            --accent: #000000;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #2a2a2a;
            --shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
            display: block;
        }

        [data-theme="dark"] .logo {
            filter: invert(1) brightness(1.2);
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .auth-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--bg);
            padding: 0.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

        .tab:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] .tab:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text);
            transition: all var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .form-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            font-size: 1.1rem;
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .auth-button:active {
            transform: translateY(0);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .auth-button.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .google-btn {
            width: 100%;
            padding: 1rem;
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .google-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .forgot-password {
            text-align: left;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color var(--transition);
            cursor: pointer;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }

        .message strong {
            font-weight: 600;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            display: block;
        }

        .message.info {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            color: #3498db;
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-title {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .auth-card {
                padding: 1.75rem 1.25rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }

            .form-input,
            .auth-button,
            .google-btn {
                padding: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <img src="assets/images/logo.png" alt="تەفسیر کورد" class="logo">
            <h1 class="auth-title">تەفسیر کورد</h1>
            <p class="auth-subtitle">ب خێر بێی بۆ پلاتفۆرما تەفسیرا قورئانێ</p>
        </div>

        <div class="auth-card">
            <div id="messageContainer"></div>

            <!-- Tabs (only shown for signin/signup) -->
            <div class="tabs" id="authTabs">
                <button class="tab active" onclick="showForm('signin')">چوونە ژوورڤە</button>
                <button class="tab" onclick="showForm('signup')">حسابێ نوی</button>
            </div>

            <!-- Sign In Form -->
            <div class="form-section active" id="signinForm">
                <form onsubmit="return handleEmailSignIn(event)">
                    <div class="form-group">
                        <label class="form-label">ئیمەیل</label>
                        <input
                            type="email"
                            class="form-input"
                            id="signInEmail"
                            placeholder="ئیمەیلا خوە بنڤیسە"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">پاسوۆرد</label>
                        <div class="password-toggle">
                            <input
                                type="password"
                                class="form-input"
                                id="signInPassword"
                                placeholder="پاسوۆردا خوە بنڤیسە"
                                required
                            >
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('signInPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a onclick="showForm('forgot')">پاسوۆردا خوە ژبیرکری؟</a>
                    </div>

                    <button type="submit" class="auth-button" id="signInBtn">
                        <span class="spinner"></span>
                        <span>چوونە ژوورڤە</span>
                    </button>
                </form>

                <div class="divider">یان</div>

                <button class="google-btn" onclick="signInWithGoogle()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>چوونە ژوورڤە ب Google</span>
                </button>
            </div>

            <!-- Sign Up Form -->
            <div class="form-section" id="signupForm">
                <form onsubmit="return handleEmailSignUp(event)">
                    <div class="form-group">
                        <label class="form-label">ناڤ</label>
                        <input
                            type="text"
                            class="form-input"
                            id="signUpName"
                            placeholder="ناڤا خوە بنڤیسە"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">ئیمەیل</label>
                        <input
                            type="email"
                            class="form-input"
                            id="signUpEmail"
                            placeholder="ئیمەیلا خوە بنڤیسە"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">پاسوۆرد</label>
                        <div class="password-toggle">
                            <input
                                type="password"
                                class="form-input"
                                id="signUpPassword"
                                placeholder="پاسوۆردێ بهێز دروستکە (کەمتر ٦ پیت)"
                                minlength="6"
                                required
                            >
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('signUpPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="auth-button" id="signUpBtn">
                        <span class="spinner"></span>
                        <span>دروستکرنا حساب</span>
                    </button>
                </form>

                <div class="divider">یان</div>

                <button class="google-btn" onclick="signInWithGoogle()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>دروستکرنا حساب ب Google</span>
                </button>

                <div class="back-link">
                    <a onclick="showForm('signin')">ژبەر حساب هەیە؟ چوونە ژوورڤە</a>
                </div>
            </div>

            <!-- Forgot Password Form -->
            <div class="form-section" id="forgotForm">
                <form onsubmit="return handleForgotPassword(event)">
                    <div class="form-group">
                        <label class="form-label">ئیمەیل</label>
                        <input
                            type="email"
                            class="form-input"
                            id="forgotEmail"
                            placeholder="ئیمەیلا خوە بنڤیسە"
                            required
                        >
                    </div>

                    <button type="submit" class="auth-button" id="forgotBtn">
                        <span class="spinner"></span>
                        <span>شاندنا لینکا ڤەگەهاندن</span>
                    </button>
                </form>

                <div class="back-link">
                    <a onclick="showForm('signin')">
                        <i class="fas fa-arrow-right"></i>
                        گەڕیان ڤە بۆ چوونە ژوورڤە
                    </a>
                </div>
            </div>

            <div class="back-link">
                <a href="/quran.html">
                    <i class="fas fa-arrow-right"></i>
                    گەڕیان ڤە بۆ سەرەکی
                </a>
            </div>
        </div>
    </div>

    <script>
        // Supabase client (initialized securely)
        let supabaseClient = null;

        // Initialize Supabase with secure credentials
        async function initializeSupabase() {
            try {
                // Fetch credentials from secure endpoint
                const response = await fetch('/.netlify/functions/auth-config');

                if (!response.ok) {
                    throw new Error('Failed to fetch auth configuration');
                }

                const config = await response.json();

                if (!config.supabaseUrl || !config.supabaseAnonKey) {
                    throw new Error('Invalid auth configuration');
                }

                // Initialize Supabase client
                supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                console.log('✅ Supabase initialized securely');
                return true;

            } catch (error) {
                console.error('❌ Failed to initialize Supabase:', error);
                showMessage('خەتایەک ڕوویدا لە دامەزراندنی سیستەم. تکایە دواتر هەوڵ بدەرەوە.', 'error');
                return false;
            }
        }

        // Form switching
        function showForm(formName) {
            console.log('Switching to form:', formName);

            // Hide all forms
            document.querySelectorAll('.form-section').forEach(form => {
                form.classList.remove('active');
            });

            // Show target form
            const targetForm = document.getElementById(formName + 'Form');
            if (targetForm) {
                targetForm.classList.add('active');
            }

            // Update tabs (hide tabs for forgot password)
            const tabsContainer = document.getElementById('authTabs');
            if (formName === 'forgot') {
                tabsContainer.style.display = 'none';
            } else {
                tabsContainer.style.display = 'flex';

                // Update active tab
                document.querySelectorAll('.tab').forEach((tab, index) => {
                    tab.classList.remove('active');
                    if ((formName === 'signin' && index === 0) || (formName === 'signup' && index === 1)) {
                        tab.classList.add('active');
                    }
                });
            }

            clearMessage();
        }

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const btn = input.parentElement.querySelector('.password-toggle-btn i');

            if (input.type === 'password') {
                input.type = 'text';
                btn.classList.remove('fa-eye');
                btn.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                btn.classList.remove('fa-eye-slash');
                btn.classList.add('fa-eye');
            }
        }

        // Show message
        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => clearMessage(), 5000);
        }

        function clearMessage() {
            document.getElementById('messageContainer').innerHTML = '';
        }

        // Set loading state
        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Email Sign In
        async function handleEmailSignIn(event) {
            event.preventDefault();
            clearMessage();

            // Check if Supabase is initialized
            if (!supabaseClient) {
                showMessage('سیستەم ئامادە نییە. تکایە پەڕە نوێبکەرەوە.', 'error');
                return false;
            }

            const email = document.getElementById('signInEmail').value.trim();
            const password = document.getElementById('signInPassword').value;

            // Validation
            if (!email || !password) {
                showMessage('تکایە ئیمەیل و پاسوۆرد بنڤیسە', 'error');
                return false;
            }

            setLoading('signInBtn', true);

            try {
                console.log('Attempting sign in for:', email);

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('Sign in response:', { data, error });

                if (error) throw error;

                showMessage('سەرکەفتی! تو هاتی ژوورڤە...', 'success');
                setTimeout(() => {
                    window.location.href = '/quran.html';
                }, 1500);

            } catch (error) {
                console.error('Sign in error:', error);
                let errorMessage = 'هەلە د چوونە ژوورڤە دا';

                if (error.message.includes('Invalid login credentials')) {
                    errorMessage = 'ئیمەیل یان پاسوۆردا نادروست';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMessage = 'تکایە ئیمەیلا خوە پشتڕاستکە!<br><br>ئێمە لینکێن پشتڕاستکرنێ نارینە بۆ ئیمەیلا تە. چاڤێ ئیمەیلا خوە بکە و لینکێ کلیک بکە بۆ چالاککرنا ئەژمارێ.';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                showMessage(errorMessage, 'error');
            } finally {
                setLoading('signInBtn', false);
            }

            return false;
        }

        // Email Sign Up
        async function handleEmailSignUp(event) {
            event.preventDefault();
            clearMessage();

            // Check if Supabase is initialized
            if (!supabaseClient) {
                showMessage('سیستەم ئامادە نییە. تکایە پەڕە نوێبکەرەوە.', 'error');
                return false;
            }

            const name = document.getElementById('signUpName').value.trim();
            const email = document.getElementById('signUpEmail').value.trim();
            const password = document.getElementById('signUpPassword').value;

            // Validation
            if (!name || !email || !password) {
                showMessage('تکایە هەمی خانەیان پڕبکە', 'error');
                return false;
            }

            if (password.length < 6) {
                showMessage('پاسوۆرد دڤێ کەمتر ٦ پیت بیت', 'error');
                return false;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('تکایە ئیمەیلەکا دروست بنڤیسە', 'error');
                return false;
            }

            setLoading('signUpBtn', true);

            try {
                console.log('Starting sign up for:', email);

                // Sign up with email confirmation required
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            display_name: name
                        },
                        emailRedirectTo: window.location.origin + '/quran.html',
                        // This ensures email confirmation is required
                        // User won't be created in auth.users until they verify
                    }
                });

                console.log('Sign up response:', { data, error });

                if (error) throw error;

                // Important: With email confirmation enabled in Supabase,
                // data.user will exist but data.session will be null
                // User must verify email before they can sign in
                if (data.user && !data.session) {
                    showMessage(
                        '✅ ئەژمارەکەت دروستکرا! <br><br>' +
                        'ئێمە لینکێن پشتڕاستکرنێ نارین بۆ <strong>' + email + '</strong><br><br>' +
                        'تکایە ئیمەیلا خوە ببینن و لینکێ کلیک بکە بۆ چالاککرنا ئەژمارێ. ' +
                        'دووی ئەوەی کە ئیمەیلا خوە پشتڕاستکر، دشێی بچیتە ژوورڤە.',
                        'success'
                    );

                    // Clear form
                    document.getElementById('signUpName').value = '';
                    document.getElementById('signUpEmail').value = '';
                    document.getElementById('signUpPassword').value = '';

                    // Switch to sign in form after 5 seconds
                    setTimeout(() => {
                        showForm('signin');
                        showMessage('ئێستا دشێی بچیتە ژوورڤە دووی ئەوەی کە ئیمەیلا خوە پشتڕاستکریت.', 'info');
                    }, 5000);
                } else if (data.session) {
                    // This shouldn't happen if email confirmation is enabled
                    // But handle it just in case
                    showMessage('سەرکەفتی! حسابا تە هاتە دروستکرن و تو هاتی ژوورڤە...', 'success');
                    setTimeout(() => {
                        window.location.href = '/quran.html';
                    }, 2000);
                } else {
                    throw new Error('Unexpected response from server');
                }

            } catch (error) {
                console.error('Sign up error:', error);
                let errorMessage = 'هەلە د دروستکرنا حسابێ دا';

                if (error.message.includes('User already registered') || error.message.includes('already registered')) {
                    errorMessage = 'ئەڤ ئیمەیلە ژبەر هاتییە بکارهینان. دشێی بچیتە ژوورڤە یان پاسوۆردا خوە ڤەگەهەند.';
                } else if (error.message.includes('Invalid email')) {
                    errorMessage = 'ئیمەیلا نادروست';
                } else if (error.message.includes('Password')) {
                    errorMessage = 'پاسوۆرد دڤێ کەمتر ٦ پیت بیت';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                showMessage(errorMessage, 'error');
            } finally {
                setLoading('signUpBtn', false);
            }

            return false;
        }

        // Google Sign In
        async function signInWithGoogle() {
            clearMessage();

            // Check if Supabase is initialized
            if (!supabaseClient) {
                showMessage('سیستەم ئامادە نییە. تکایە پەڕە نوێبکەرەوە.', 'error');
                return;
            }

            showMessage('ڤەگوهاستنا تە بۆ Google...', 'info');

            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/quran.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent'
                        }
                    }
                });

                if (error) throw error;

            } catch (error) {
                console.error('Google sign in error:', error);
                showMessage('هەلە د چوونە ژوورڤە ب Google: ' + error.message, 'error');
            }
        }

        // Forgot Password
        async function handleForgotPassword(event) {
            event.preventDefault();
            clearMessage();

            // Check if Supabase is initialized
            if (!supabaseClient) {
                showMessage('سیستەم ئامادە نییە. تکایە پەڕە نوێبکەرەوە.', 'error');
                return false;
            }

            const email = document.getElementById('forgotEmail').value.trim();

            if (!email) {
                showMessage('تکایە ئیمەیلا خوە بنڤیسە', 'error');
                return false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('تکایە ئیمەیلەکا دروست بنڤیسە', 'error');
                return false;
            }

            setLoading('forgotBtn', true);

            try {
                console.log('Sending password reset to:', email);

                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/quran.html'
                });

                if (error) throw error;

                showMessage(
                    '✅ لینکا ڤەگەهاندنا پاسوۆردێ هاتە شاندن!<br><br>' +
                    'چاڤێ ئیمەیلا خوە بکە بۆ <strong>' + email + '</strong> و لینکێ کلیک بکە بۆ ڤەگەهاندنا پاسوۆردا خوە.',
                    'success'
                );
                document.getElementById('forgotEmail').value = '';

                // Switch to sign in form after 3 seconds
                setTimeout(() => {
                    showForm('signin');
                }, 3000);

            } catch (error) {
                console.error('Password reset error:', error);
                showMessage('هەلە د شاندنا لینکا ڤەگەهاندنا پاسوۆردێ: ' + error.message, 'error');
            } finally {
                setLoading('forgotBtn', false);
            }

            return false;
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Initializing login page...');

            // Initialize Supabase first
            const initialized = await initializeSupabase();

            if (!initialized) {
                console.error('Failed to initialize Supabase');
                return;
            }

            // Check if user is already logged in
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();

                if (error) {
                    console.error('Session check error:', error);
                    return;
                }

                if (session) {
                    console.log('User already logged in, redirecting...');
                    showMessage('تو ژبەر د ژوورڤە دایی. ڤەگوهاستن...', 'info');
                    setTimeout(() => {
                        window.location.href = '/quran.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Error checking session:', error);
            }

            // Listen for auth state changes
            supabaseClient.auth.onAuthStateChange((event, session) => {
                console.log('Auth state changed:', event, session);

                if (event === 'SIGNED_IN' && session) {
                    console.log('User signed in, redirecting...');
                    showMessage('سەرکەفتی! ڤەگوهاستن...', 'success');
                    setTimeout(() => {
                        window.location.href = '/quran.html';
                    }, 1000);
                }

                if (event === 'USER_UPDATED') {
                    console.log('User data updated');
                }
            });

            console.log('✅ Login page ready');
        });
    </script>

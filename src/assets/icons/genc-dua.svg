<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#221060"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <radialGradient id="glow" cx="44%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="mc">
      <circle cx="34" cy="37" r="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" fill="url(#bg)"/>

  <!-- Subtle glow behind moon -->
  <ellipse cx="38" cy="38" rx="26" ry="22" fill="url(#glow)"/>

  <!-- Tiny stars -->
  <circle cx="11" cy="11" r="1.1" fill="#FFE566" opacity="0.8"/>
  <circle cx="67" cy="14" r="1.4" fill="#FFE566" opacity="0.9"/>
  <circle cx="73" cy="44" r="0.9" fill="#FFE566" opacity="0.6"/>
  <circle cx="9"  cy="58" r="0.8" fill="#FFE566" opacity="0.5"/>
  <circle cx="64" cy="66" r="1.0" fill="#FFE566" opacity="0.7"/>
  <circle cx="22" cy="68" r="0.9" fill="#FFE566" opacity="0.4"/>
  <circle cx="74" cy="30" r="1.1" fill="#FFE566" opacity="0.6"/>
  <circle cx="14" cy="42" r="0.7" fill="#FFE566" opacity="0.45"/>
  <circle cx="55" cy="8"  r="1.0" fill="#FFE566" opacity="0.55"/>

  <!-- Crescent moon (two-circle clip method) -->
  <g clip-path="url(#mc)">
    <circle cx="34" cy="37" r="20" fill="url(#moonGrad)"/>
    <circle cx="44" cy="32" r="16" fill="#110840"/>
  </g>
  <!-- Moon glow ring -->
  <circle cx="34" cy="37" r="20" fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.3"/>

  <!-- 5-pointed star  (center 59,27  R=7 r=3) -->
  <!-- outer: 270°→(59,20) 342°→(65.66,24.84) 54°→(63.12,32.66) 126°→(54.88,32.66) 198°→(52.34,24.84) -->
  <!-- inner: 306°→(60.76,24.57) 18°→(61.85,27.93) 90°→(59,30) 162°→(56.15,27.93) 234°→(57.24,24.57) -->
  <path d="M59,20 L60.76,24.57 L65.66,24.84 L61.85,27.93 L63.12,32.66 L59,30 L54.88,32.66 L56.15,27.93 L52.34,24.84 L57.24,24.57 Z"
        fill="url(#moonGrad)" opacity="0.95"/>

  <!-- Raised hands silhouette (simplified, bottom of image) -->
  <!-- Left hand -->
  <path d="M18,72 Q17,64 19,58 Q21,53 23,53 Q25,53 25,57 L25,63
           Q26,60 26,56 Q26,53 28,53 Q30,53 30,56 L30,63
           Q31,60 31,57 Q31,54 33,54 Q35,54 35,57 L35,72 Z"
        fill="#FFD700" opacity="0.7"/>
  <!-- Right hand (mirror) -->
  <path d="M62,72 Q63,64 61,58 Q59,53 57,53 Q55,53 55,57 L55,63
           Q54,60 54,56 Q54,53 52,53 Q50,53 50,56 L50,63
           Q49,60 49,57 Q49,54 47,54 Q45,54 45,57 L45,72 Z"
        fill="#FFD700" opacity="0.7"/>
  <!-- Small glow between hands -->
  <ellipse cx="40" cy="72" rx="5" ry="2" fill="#FFD700" opacity="0.15"/>
</svg>

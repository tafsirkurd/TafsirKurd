<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0008"/>
      <stop offset="100%" stop-color="#420018"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#9B6800"/>
    </linearGradient>
    <linearGradient id="pageL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#F0D8A0"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#F0D8A0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" fill="url(#bg)"/>

  <!-- Book group with shadow -->
  <g filter="url(#shadow)">
    <!-- Book cover base -->
    <rect x="9" y="17" width="62" height="48" rx="5" fill="url(#cover)"/>

    <!-- Left page -->
    <rect x="11" y="19" width="28" height="44" rx="3" fill="url(#pageL)"/>

    <!-- Right page -->
    <rect x="41" y="19" width="28" height="44" rx="3" fill="url(#pageR)"/>

    <!-- Center spine -->
    <rect x="38.5" y="17" width="3" height="48" rx="1.5" fill="#7A5200"/>

    <!-- Decorative corner ornaments (left page) -->
    <path d="M14,22 Q16,20 18,22 Q16,24 14,22" fill="#B8860B" opacity="0.7"/>
    <path d="M14,60 Q16,58 18,60 Q16,62 14,60" fill="#B8860B" opacity="0.7"/>
    <path d="M35,22 Q33,20 31,22 Q33,24 35,22" fill="#B8860B" opacity="0.7"/>
    <path d="M35,60 Q33,58 31,60 Q33,62 35,60" fill="#B8860B" opacity="0.7"/>

    <!-- Text lines — left page -->
    <rect x="16" y="28" width="20" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="16" y="33" width="22" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="16" y="38" width="18" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="16" y="43" width="21" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="16" y="48" width="16" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="16" y="53" width="13" height="1.5" rx="0.75" fill="#8B6914" opacity="0.5"/>

    <!-- Text lines — right page -->
    <rect x="44" y="28" width="22" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="44" y="33" width="19" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="44" y="38" width="21" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="44" y="43" width="17" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="44" y="48" width="22" height="1.5" rx="0.75" fill="#8B6914" opacity="0.75"/>
    <rect x="44" y="53" width="14" height="1.5" rx="0.75" fill="#8B6914" opacity="0.5"/>

    <!-- Small star ornament on right page top -->
    <!-- (center 56,24 R=4 r=1.7) -->
    <path d="M56,20 L56.9,22.3 L59.4,22.4 L57.5,23.9 L58.2,26.4 L56,25 L53.8,26.4 L54.5,23.9 L52.6,22.4 L55.1,22.3 Z"
          fill="#D4A017" opacity="0.9"/>
  </g>

  <!-- Page curl effect (bottom-right of right page) -->
  <path d="M66,63 Q69,63 69,59 Q69,65 63,65 Z" fill="#E8C87A" opacity="0.6"/>
  <path d="M66,63 Q69,65 63,65" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.4"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/assets/images/favicon-96x96.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="utils/theme-loader.js"></script>
    <title>Gencine - TafsirKurd Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-regular.woff2" as="font" type="font/woff2" crossorigin="">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/css/admin-styles.css">
    <style>
        @font-face {
            font-family: 'IBM Plex Sans Arabic';
            src: url('/assets/fonts/ibm-plex-arabic-v11-latin_arabic-regular.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'IBM Plex Sans Arabic';
            src: url('/assets/fonts/ibm-plex-arabic-v11-latin_arabic-500.woff2') format('woff2');
            font-weight: 500 700; font-style: normal; font-display: swap;
        }

        /* ── Stats row ── */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            flex: 1;
            min-width: 120px;
        }
        .stat-pill-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--bg-active);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }
        .stat-pill-icon svg { width: 16px; height: 16px; }
        .stat-pill strong {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            display: block;
        }

        /* ── Platform tabs ── */
        .platform-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-light);
        }
        .platform-tab {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-tertiary);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .platform-tab:hover { color: var(--text-primary); }
        .platform-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }
        .platform-tab .tab-count {
            font-size: 11px;
            font-weight: 700;
            background: var(--bg-hover);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 22px;
            text-align: center;
        }
        .platform-tab.active .tab-count {
            background: var(--text-primary);
            color: var(--bg-app);
        }

        /* ── View panels ── */
        .view-panel { display: none; }
        .view-panel.active { display: block; }

        /* ── Add form panel ── */
        .add-form-wrap {
            margin-bottom: 24px;
        }
        .add-form-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
        }
        .add-form-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }
        .add-form-toggle svg { width: 16px; height: 16px; }
        .add-form-body {
            display: none;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 20px;
        }
        .add-form-body.open { display: block; }
        .form-grid { display: flex; flex-direction: column; gap: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 14px;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-textarea {
            resize: vertical;
            min-height: 80px;
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            font-size: 15px;
            line-height: 1.9;
        }
        .form-textarea.ku {
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            font-size: 14px;
            min-height: 68px;
        }
        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding-top: 4px;
        }

        /* ── Item list ── */
        .items-list { display: flex; flex-direction: column; gap: 8px; }
        .item-card {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .item-card:hover {
            border-color: var(--border-medium);
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        .item-card-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--bg-active);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-size: 15px;
        }
        .item-card-body { flex: 1; min-width: 0; }
        .item-card-title { font-size:13px; font-weight:700; color:var(--text-primary); direction:rtl; margin-bottom:4px; font-family:'IBM Plex Sans Arabic',system-ui,sans-serif; }
        .item-card-ar {
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            font-size: 15px;
            direction: rtl;
            line-height: 1.9;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .item-card-ku {
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            font-size: 13px;
            direction: rtl;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 6px;
        }
        .item-card-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-cat { background: rgba(59,130,246,.1); color: #3b82f6; }
        .badge-repeat { background: var(--bg-active); color: var(--text-secondary); }
        .badge-source { background: var(--bg-active); color: var(--text-tertiary); font-weight: 400; }
        .item-card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .icon-action {
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .icon-action:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-medium); }
        .icon-action.danger:hover { background: rgba(220,38,38,.08); color: #dc2626; border-color: rgba(220,38,38,.25); }
        .icon-action svg { width: 13px; height: 13px; }

        /* ── Category cards ── */
        .cat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .cat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .cat-card:hover {
            border-color: var(--border-medium);
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        .cat-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .cat-card-left { display: flex; align-items: center; gap: 10px; }
        .cat-card-key {
            font-size: 11px;
            font-weight: 700;
            font-family: monospace;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(59,130,246,.1);
            color: #3b82f6;
        }
        .cat-card-label {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
        }
        .cat-card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            margin-bottom: 6px;
        }
        .cat-card-image {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: monospace;
        }

        /* ── Dua filter chips ── */
        .filter-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-chip {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-medium);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            direction: rtl;
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
        }
        .filter-chip:hover { border-color: var(--border-dark); color: var(--text-primary); }
        .filter-chip.on { background: var(--text-primary); color: var(--bg-app); border-color: var(--text-primary); }

        /* ── Toolbar ── */
        .list-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .list-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── Empty state ── */
        .empty-state {
            padding: 56px 24px;
            text-align: center;
            color: var(--text-tertiary);
            background: var(--bg-surface);
            border: 1px dashed var(--border-medium);
            border-radius: 12px;
        }
        .empty-state-icon {
            width: 48px; height: 48px;
            margin: 0 auto 14px;
            border-radius: 14px;
            background: var(--bg-active);
            display: flex; align-items: center; justify-content: center;
        }
        .empty-state-icon svg { width: 22px; height: 22px; color: var(--text-tertiary); }
        .empty-state p { font-size: 14px; margin: 0; }

        /* ── Edit mode highlight ── */
        .add-form-toggle.editing {
            background: rgba(59,130,246,.06);
            border-color: rgba(59,130,246,.3);
            color: var(--primary);
        }
    </style>
    <style id="early-sidebar-hide">
        .sidebar-nav{visibility:hidden}
    </style>
    <script>
        (function(){
            var role=sessionStorage.getItem('adminRole');
            var style=document.getElementById('early-sidebar-hide');
            var css='.sidebar-nav{visibility:visible}';
            if(role==='super_admin'){
                css='.sidebar-nav{visibility:visible}';
            }else if(role==='analyst'){
                css='.sidebar-nav{visibility:visible}.nav-item[href*="messages"],.nav-item[href*="videos"],.nav-item[href*="islamvoice-management"],.nav-item[href*="admin-gencine"],.nav-item[href*="account-management"],.nav-item[href*="features"],.nav-item[href*="schedule"],.nav-item[href*="bot-protection"],.nav-item[href*="database"],.nav-item[href*="search-console"],.nav-item[href*="email-templates"],.nav-item[href*="activity-feed"]{display:none!important}';
            }else if(role==='editor'){
                css='.sidebar-nav{visibility:visible}.nav-item[href*="analytics"],.nav-item[href*="users"],.nav-item[href*="reading-stats"],.nav-item[href*="social-stats"],.nav-item[href*="account-management"],.nav-item[href*="features"],.nav-item[href*="bot-protection"],.nav-item[href*="database"],.nav-item[href*="search-console"],.nav-item[href*="email-templates"],.nav-item[href*="activity-feed"]{display:none!important}';
            }else if(role==='custom'){
                css='.sidebar-nav{visibility:visible}.nav-item{display:none!important}';
            }
            if(role)style.textContent=css;
        })();
    </script>
</head>
<body>
<div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i data-lucide="play-circle"></i>
                <span class="sidebar-logo-text">TafsirKurd</span>
            </div>
            <button class="sidebar-toggle" id="menu-toggle">
                <i data-lucide="chevron-left"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-header">Overview</div>
                <a href="/admin-dashboard.html" class="nav-item"><i data-lucide="bar-chart-2"></i><span class="nav-item-label">Dashboard</span></a>
                <a href="/admin-analytics.html" class="nav-item"><i data-lucide="trending-up"></i><span class="nav-item-label">Analytics</span></a>
            </div>
            <div class="nav-section">
                <div class="nav-section-header">Content</div>
                <a href="/admin-messages.html" class="nav-item"><i data-lucide="message-square"></i><span class="nav-item-label">Messages</span></a>
                <a href="/admin-videos.html" class="nav-item"><i data-lucide="video"></i><span class="nav-item-label">Videos</span></a>
                <a href="/admin-islamvoice-management.html" class="nav-item"><i data-lucide="radio"></i><span class="nav-item-label">IslamVoice</span></a>
                <a href="/admin-gencine.html" class="nav-item active"><i data-lucide="gem"></i><span class="nav-item-label">Gencine</span></a>
                <a href="/admin-images.html" class="nav-item"><i data-lucide="camera"></i><span class="nav-item-label">Site Images</span></a>
                <a href="/admin-translations.html" class="nav-item"><i data-lucide="languages"></i><span class="nav-item-label">Translations</span></a>
            </div>
            <div class="nav-section">
                <div class="nav-section-header">Users</div>
                <a href="/admin-users.html" class="nav-item"><i data-lucide="users"></i><span class="nav-item-label">Users</span></a>
                <a href="/admin-reading-stats.html" class="nav-item"><i data-lucide="book-open"></i><span class="nav-item-label">Reading Stats</span></a>
            </div>
            <div class="nav-section">
                <div class="nav-section-header">System</div>
                <a href="/admin-account-management.html" class="nav-item"><i data-lucide="user-cog"></i><span class="nav-item-label">Admin Accounts</span></a>
                <a href="/admin-features.html" class="nav-item"><i data-lucide="layers"></i><span class="nav-item-label">Features</span></a>
                <a href="/admin-schedule.html" class="nav-item"><i data-lucide="calendar"></i><span class="nav-item-label">Schedule</span></a>
                <a href="/admin-social-stats.html" class="nav-item"><i data-lucide="share-2"></i><span class="nav-item-label">Social Stats</span></a>
                <a href="/admin-bot-protection.html" class="nav-item"><i data-lucide="shield"></i><span class="nav-item-label">Bot Protection</span></a>
                <a href="/admin-database.html" class="nav-item"><i data-lucide="database"></i><span class="nav-item-label">Database</span></a>
                <a href="/admin-search-console.html" class="nav-item"><i data-lucide="search"></i><span class="nav-item-label">Search Console</span></a>
                <a href="/admin-email-templates.html" class="nav-item"><i data-lucide="mail"></i><span class="nav-item-label">Email Templates</span></a>
                <a href="/admin-activity-feed.html" class="nav-item"><i data-lucide="activity"></i><span class="nav-item-label">Activity Feed</span></a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-profile">
                <div class="sidebar-profile-avatar"><i data-lucide="user"></i></div>
                <div class="sidebar-profile-info">
                    <div class="sidebar-profile-name"></div>
                    <div class="sidebar-profile-email"></div>
                </div>
                <button onclick="window.adminAuth.logout()" style="background:transparent;border:none;color:var(--text-tertiary);cursor:pointer;padding:4px;display:flex;align-items:center;transition:color .2s;" title="Logout">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <button class="topbar-menu-toggle" id="mobile-menu-toggle">
                <i data-lucide="menu"></i>
            </button>
            <div class="topbar-search">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search Gencine..." id="search-input">
            </div>
            <div class="topbar-actions">
                <div class="session-timer" id="sessionTimer" title="Session expires after 20 minutes">
                    <i data-lucide="clock"></i>
                    <span id="sessionTimerText">20:00</span>
                </div>
                <button class="topbar-btn" style="position: relative;">
                    <i data-lucide="bell"></i>
                    <span id="notification-badge" style="position: absolute; top: -4px; right: -4px; background: #ef4444; color: white; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; display: none;"></span>
                </button>
                <button class="topbar-btn" id="theme-toggle">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <div class="content-area">
            <!-- Page header -->
            <div class="page-header">
                <h1 class="page-title">Gencine</h1>
                <div class="page-actions">
                    <button class="btn btn-primary" id="top-add-btn" onclick="topAddClick()">
                        <i data-lucide="plus"></i>
                        <span id="top-add-label">Add</span>
                    </button>
                </div>
            </div>

            <!-- Stats row -->
            <div class="stats-row">
                <div class="stat-pill">
                    <div class="stat-pill-icon"><i data-lucide="folder"></i></div>
                    <div><strong id="stat-cats">—</strong>Categories</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-icon"><i data-lucide="hand-heart"></i></div>
                    <div><strong id="stat-duas">—</strong>Duas</div>
                </div>
                <div class="stat-pill">
                    <div class="stat-pill-icon"><i data-lucide="scroll-text"></i></div>
                    <div><strong id="stat-hadiths">—</strong>Hadiths</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="platform-tabs">
                <button class="platform-tab active" onclick="switchTab('categories')">
                    <i data-lucide="folder" style="width:15px;height:15px"></i>
                    Categories
                    <span class="tab-count" id="tab-count-cats">0</span>
                </button>
                <button class="platform-tab" onclick="switchTab('duas')">
                    <i data-lucide="hand-heart" style="width:15px;height:15px"></i>
                    Duas
                    <span class="tab-count" id="tab-count-duas">0</span>
                </button>
                <button class="platform-tab" onclick="switchTab('hadiths')">
                    <i data-lucide="scroll-text" style="width:15px;height:15px"></i>
                    Hadiths
                    <span class="tab-count" id="tab-count-hadiths">0</span>
                </button>
            </div>

            <!-- ── CATEGORIES ── -->
            <div id="panel-categories" class="view-panel active">
                <input type="hidden" id="cat-edit-id">
                <div class="add-form-wrap">
                    <button class="add-form-toggle" id="cat-form-toggle" onclick="toggleForm('cat')">
                        <i data-lucide="plus"></i>
                        <span id="cat-form-toggle-label">Add Category</span>
                    </button>
                    <div class="add-form-body" id="cat-form-body">
                        <div class="form-grid">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Key (slug)</label>
                                    <input type="text" id="cat-key" class="form-input" placeholder="e.g. morning" style="font-family:monospace">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Kurdish Label</label>
                                    <input type="text" id="cat-label" class="form-input" placeholder="&#x628;&#x6D5;&#x06CC;&#x0627;&#x0646;&#x06CC;&#x06A9;&#x0631;&#x062F;&#x0646;" dir="rtl" style="font-family:'IBM Plex Sans Arabic',system-ui,sans-serif">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Image Filename</label>
                                    <input type="text" id="cat-image" class="form-input" placeholder="genc-morning-bg.webp" style="font-family:monospace">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Sort Order</label>
                                    <input type="number" id="cat-sort" class="form-input" value="10" min="0">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Description</label>
                                <input type="text" id="cat-desc" class="form-input" placeholder="Short description shown on card" dir="rtl" style="font-family:'IBM Plex Sans Arabic',system-ui,sans-serif">
                            </div>
                            <div class="form-actions">
                                <button class="btn btn-secondary" onclick="cancelCatEdit()">Cancel</button>
                                <button class="btn btn-primary" onclick="saveCat()">Save Category</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="cat-list" class="cat-grid"></div>
            </div>

            <!-- ── DUAS ── -->
            <div id="panel-duas" class="view-panel">
                <input type="hidden" id="dua-edit-id">
                <div class="add-form-wrap">

<div id="notification-container" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px;pointer-events:none;"></div>

<script src="/utils/admin-session-timer-ui.js?v=5"></script>
<script src="/utils/admin-auth.js?v=4"></script>
<script>
'use strict';

/* ── Tab switching ── */
var currentTab = 'categories';
var addLabels = { categories: 'Add Category', duas: 'Add Dua', hadiths: 'Add Hadith' };

function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.platform-tab').forEach(function(b, i) {
        b.classList.toggle('active', ['categories','duas','hadiths'][i] === name);
    });
    document.querySelectorAll('.view-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('top-add-label').textContent = addLabels[name] || 'Add';
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

/* ── Top Add button — opens the relevant form ── */
function topAddClick() {
    toggleForm(currentTab === 'categories' ? 'cat' : currentTab === 'duas' ? 'dua' : 'hadith');
}

/* ── Collapsible forms ── */
function toggleForm(prefix) {
    var body = document.getElementById(prefix + '-form-body');
    var toggle = document.getElementById(prefix + '-form-toggle');
    if (!body) return;
    var isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    toggle.classList.toggle('editing', !isOpen);
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
function openForm(prefix) {
    var body = document.getElementById(prefix + '-form-body');
    var toggle = document.getElementById(prefix + '-form-toggle');
    if (!body) return;
    body.classList.add('open');
    toggle.classList.add('editing');
    body.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
function closeForm(prefix) {
    var body = document.getElementById(prefix + '-form-body');
    var toggle = document.getElementById(prefix + '-form-toggle');
    if (!body) return;
    body.classList.remove('open');
    toggle.classList.remove('editing');
}

/* ── Toast ── */
function showNotification(msg, type) {
    type = type || 'info';
    var colors = { success:'#22c55e', error:'#ef4444', info:'#3b82f6', warning:'#f59e0b' };
    var container = document.getElementById('notification-container');
    var el = document.createElement('div');
    el.style.cssText = 'background:var(--bg-surface);border:1px solid var(--border-medium);border-left:4px solid ' + (colors[type]||colors.info) + ';border-radius:8px;padding:12px 16px;font-size:13px;color:var(--text-primary);pointer-events:auto;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:fadeIn .2s ease;';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(function() { el.remove(); }, 3500);
}

/* ── State ── */
var allCategories = [];
var allDuas = [];
var allHadiths = [];
var duaFilterCat = 'all';

function updateStats() {
    document.getElementById('stat-cats').textContent    = allCategories.length;
    document.getElementById('stat-duas').textContent    = allDuas.length;
    document.getElementById('stat-hadiths').textContent = allHadiths.length;
    document.getElementById('tab-count-cats').textContent    = allCategories.length;
    document.getElementById('tab-count-duas').textContent    = allDuas.length;
    document.getElementById('tab-count-hadiths').textContent = allHadiths.length;
}

async function loadAll() { await Promise.all([loadCategories(), loadDuas(), loadHadiths()]); }

async function loadCategories() {
    var supabase = window.adminAuth.getSupabase(); if (!supabase) return;
    var r = await supabase.from('gencine_categories').select('*').order('sort_order');
    if (r.error) { showNotification('Error: ' + r.error.message, 'error'); return; }
    allCategories = r.data || [];
    renderCategoryList(); populateCatDropdown(); renderDuaCatFilter(); updateStats();
}
async function loadDuas() {
    var supabase = window.adminAuth.getSupabase(); if (!supabase) return;
    var r = await supabase.from('gencine_duas').select('*').order('category_key').order('sort_order');
    if (r.error) { showNotification('Error: ' + r.error.message, 'error'); return; }
    allDuas = r.data || [];
    renderDuaList(); updateStats();
}
async function loadHadiths() {
    var supabase = window.adminAuth.getSupabase(); if (!supabase) return;
    var r = await supabase.from('gencine_hadiths').select('*').order('sort_order');
    if (r.error) { showNotification('Error: ' + r.error.message, 'error'); return; }
    allHadiths = r.data || [];
    renderHadithList(); updateStats();
}

/* ── DOM helpers ── */
function mke(tag, cls) { var e = document.createElement(tag); if (cls) e.className = cls; return e; }
function mkIconBtn(lucideIcon, title, danger, cb) {
    var btn = mke('button', 'icon-action' + (danger ? ' danger' : ''));
    btn.title = title;
    btn.onclick = cb;
    var ico = mke('i'); ico.setAttribute('data-lucide', lucideIcon);
    btn.appendChild(ico);
    return btn;
}

/* ── CATEGORIES ── */
function renderCategoryList() {
    var list = document.getElementById('cat-list');
    list.textContent = '';
    if (!allCategories.length) {
        var es = mke('div', 'empty-state');
        var eico = mke('div', 'empty-state-icon'); var ei = mke('i'); ei.setAttribute('data-lucide','folder'); eico.appendChild(ei);
        var ep = mke('p'); ep.textContent = 'No categories yet. Add one above.';
        es.appendChild(eico); es.appendChild(ep); list.appendChild(es);
        if (typeof lucide !== 'undefined') lucide.createIcons(); return;
    }
    allCategories.forEach(function(cat) {
        var card = mke('div', 'cat-card');
        var top = mke('div', 'cat-card-top');
        var left = mke('div', 'cat-card-left');
        var keyEl = mke('span', 'cat-card-key'); keyEl.textContent = cat.key;
        var labelEl = mke('span', 'cat-card-label'); labelEl.textContent = cat.label_ku;
        left.appendChild(keyEl); left.appendChild(labelEl);
        var acts = mke('div', 'item-card-actions');
        acts.appendChild(mkIconBtn('pencil', 'Edit', false, function() { editCat(cat.id); }));
        acts.appendChild(mkIconBtn('trash-2', 'Delete', true, function() { deleteCat(cat.id); }));
        top.appendChild(left); top.appendChild(acts);
        card.appendChild(top);
        if (cat.description) { var d = mke('div', 'cat-card-desc'); d.textContent = cat.description; card.appendChild(d); }
        if (cat.image_name) { var img = mke('div', 'cat-card-image'); img.textContent = cat.image_name; card.appendChild(img); }
        list.appendChild(card);
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
function populateCatDropdown() {
    var sel = document.getElementById('dua-cat'); sel.textContent = '';
    allCategories.forEach(function(cat) {
        var opt = document.createElement('option');
        opt.value = cat.key; opt.textContent = cat.key + ' \u2014 ' + cat.label_ku;
        sel.appendChild(opt);
    });
}
function editCat(id) {
    var cat = allCategories.find(function(c) { return c.id === id; }); if (!cat) return;
    document.getElementById('cat-edit-id').value = id;
    document.getElementById('cat-key').value = cat.key;
    document.getElementById('cat-label').value = cat.label_ku;
    document.getElementById('cat-image').value = cat.image_name || '';
    document.getElementById('cat-desc').value = cat.description || '';
    document.getElementById('cat-sort').value = cat.sort_order;
    document.getElementById('cat-form-toggle-label').textContent = 'Editing: ' + cat.key;
    openForm('cat');
}
function cancelCatEdit() {
    ['cat-edit-id','cat-key','cat-label','cat-image','cat-desc'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('cat-sort').value = '10';
    document.getElementById('cat-form-toggle-label').textContent = 'Add Category';
    closeForm('cat');
}
async function saveCat() {
    var key = document.getElementById('cat-key').value.trim();
    var label = document.getElementById('cat-label').value.trim();
    if (!key || !label) { showNotification('Key and Kurdish label are required.', 'warning'); return; }
    var payload = { key: key, label_ku: label,
        image_name: document.getElementById('cat-image').value.trim() || null,
        description: document.getElementById('cat-desc').value.trim() || null,
        sort_order: parseInt(document.getElementById('cat-sort').value) || 0 };
    var supabase = window.adminAuth.getSupabase();
    var editId = document.getElementById('cat-edit-id').value;
    var r = editId ? await supabase.from('gencine_categories').update(payload).eq('id', editId)
                   : await supabase.from('gencine_categories').insert(payload);
    if (r.error) { showNotification('Save failed: ' + r.error.message, 'error'); return; }
    showNotification(editId ? 'Category updated.' : 'Category added.', 'success');
    cancelCatEdit(); await loadCategories(); localStorage.removeItem('gencine_cats_v1');
}
async function deleteCat(id) {
    var cat = allCategories.find(function(c) { return c.id === id; });
    if (!confirm('Delete "' + (cat ? cat.key : id) + '"? Duas in this category will be orphaned.')) return;
    var r = await window.adminAuth.getSupabase().from('gencine_categories').delete().eq('id', id);
    if (r.error) { showNotification('Delete failed: ' + r.error.message, 'error'); return; }
    showNotification('Category deleted.', 'success'); await loadCategories(); localStorage.removeItem('gencine_cats_v1');
}

/* ── DUAS ── */
function renderDuaCatFilter() {
    var bar = document.getElementById('dua-cat-filter'); bar.textContent = '';
    var allBtn = mke('button', 'filter-chip' + (duaFilterCat === 'all' ? ' on' : ''));
    allBtn.textContent = 'All'; allBtn.onclick = function() { duaFilterCat = 'all'; renderDuaList(); renderDuaCatFilter(); };
    bar.appendChild(allBtn);
    allCategories.forEach(function(cat) {
        var btn = mke('button', 'filter-chip' + (duaFilterCat === cat.key ? ' on' : ''));
        btn.textContent = cat.label_ku;
        btn.onclick = function() { duaFilterCat = cat.key; renderDuaList(); renderDuaCatFilter(); };
        bar.appendChild(btn);
    });
}
function renderDuaList() {
    var list = document.getElementById('dua-list'); list.textContent = '';
    var filtered = duaFilterCat === 'all' ? allDuas : allDuas.filter(function(d) { return d.category_key === duaFilterCat; });
    document.getElementById('dua-count').textContent = filtered.length + ' duas' + (duaFilterCat !== 'all' ? ' in "' + duaFilterCat + '"' : '');
    if (!filtered.length) {
        var es = mke('div', 'empty-state');
        var eico = mke('div', 'empty-state-icon'); var ei = mke('i'); ei.setAttribute('data-lucide','hand-heart'); eico.appendChild(ei);
        var ep = mke('p'); ep.textContent = 'No duas found. Add one above.';
        es.appendChild(eico); es.appendChild(ep); list.appendChild(es);
        if (typeof lucide !== 'undefined') lucide.createIcons(); return;
    }
    filtered.forEach(function(dua) {
        var card = mke('div', 'item-card');
        var icon = mke('div', 'item-card-icon'); var ico = mke('i'); ico.setAttribute('data-lucide','hand-heart'); icon.appendChild(ico);
        var body = mke('div', 'item-card-body');
        var arEl = mke('div', 'item-card-ar'); arEl.textContent = dua.ar; body.appendChild(arEl);
        var kuEl = mke('div', 'item-card-ku'); kuEl.textContent = dua.ku; body.appendChild(kuEl);
        var meta = mke('div', 'item-card-meta');
        var cb = mke('span', 'badge badge-cat'); cb.textContent = dua.category_key; meta.appendChild(cb);
        if (dua.repeat > 1) { var rb = mke('span', 'badge badge-repeat'); rb.textContent = '\u00D7 ' + dua.repeat; meta.appendChild(rb); }
        if (dua.source) { var sb = mke('span', 'badge badge-source'); sb.textContent = dua.source; meta.appendChild(sb); }
        body.appendChild(meta);
        var acts = mke('div', 'item-card-actions');
        acts.appendChild(mkIconBtn('pencil', 'Edit', false, function() { editDua(dua.id); }));
        acts.appendChild(mkIconBtn('trash-2', 'Delete', true, function() { deleteDua(dua.id); }));
        card.appendChild(icon); card.appendChild(body); card.appendChild(acts);
        list.appendChild(card);
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
function editDua(id) {
    var dua = allDuas.find(function(d) { return d.id === id; }); if (!dua) return;
    document.getElementById('dua-edit-id').value = id;
    document.getElementById('dua-ar').value = dua.ar; document.getElementById('dua-ku').value = dua.ku;
    document.getElementById('dua-source').value = dua.source || '';
    document.getElementById('dua-repeat').value = dua.repeat || 1;
    document.getElementById('dua-sort').value = dua.sort_order || 10;
    document.getElementById('dua-cat').value = dua.category_key;
    document.getElementById('dua-form-toggle-label').textContent = 'Editing dua';
    switchTab('duas'); openForm('dua');
}
function cancelDuaEdit() {
    ['dua-edit-id','dua-ar','dua-ku','dua-source'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('dua-repeat').value = '1'; document.getElementById('dua-sort').value = '10';
    document.getElementById('dua-form-toggle-label').textContent = 'Add Dua';
    closeForm('dua');
}
async function saveDua() {
    var ar = document.getElementById('dua-ar').value.trim(); var ku = document.getElementById('dua-ku').value.trim();
    if (!ar || !ku) { showNotification('Arabic and Kurdish text are required.', 'warning'); return; }
    var payload = { category_key: document.getElementById('dua-cat').value, ar: ar, ku: ku,
        source: document.getElementById('dua-source').value.trim() || null,
        repeat: parseInt(document.getElementById('dua-repeat').value) || 1,
        sort_order: parseInt(document.getElementById('dua-sort').value) || 0 };
    var supabase = window.adminAuth.getSupabase();
    var editId = document.getElementById('dua-edit-id').value;
    var r = editId ? await supabase.from('gencine_duas').update(payload).eq('id', editId)
                   : await supabase.from('gencine_duas').insert(payload);
    if (r.error) { showNotification('Save failed: ' + r.error.message, 'error'); return; }
    showNotification(editId ? 'Dua updated.' : 'Dua added.', 'success');
    cancelDuaEdit(); await loadDuas(); localStorage.removeItem('gencine_duas_v1');
}
async function deleteDua(id) {
    if (!confirm('Delete this dua?')) return;
    var r = await window.adminAuth.getSupabase().from('gencine_duas').delete().eq('id', id);
    if (r.error) { showNotification('Delete failed: ' + r.error.message, 'error'); return; }
    showNotification('Dua deleted.', 'success'); await loadDuas(); localStorage.removeItem('gencine_duas_v1');
}

/* ── HADITHS ── */
function renderHadithList() {
    var list = document.getElementById('hadith-list'); list.textContent = '';
    document.getElementById('hadith-count').textContent = allHadiths.length + ' hadiths';
    if (!allHadiths.length) {
        var es = mke('div', 'empty-state');
        var eico = mke('div', 'empty-state-icon'); var ei = mke('i'); ei.setAttribute('data-lucide','scroll-text'); eico.appendChild(ei);
        var ep = mke('p'); ep.textContent = 'No hadiths yet. Add one above.';
        es.appendChild(eico); es.appendChild(ep); list.appendChild(es);
        if (typeof lucide !== 'undefined') lucide.createIcons(); return;
    }
    allHadiths.forEach(function(h) {
        var card = mke('div', 'item-card');
        var icon = mke('div', 'item-card-icon'); var ico = mke('i'); ico.setAttribute('data-lucide','scroll-text'); icon.appendChild(ico);
        var body = mke('div', 'item-card-body');
        if (h.title) { var titleEl = mke('div', 'item-card-title'); titleEl.textContent = h.title; body.appendChild(titleEl); }
        var arEl = mke('div', 'item-card-ar'); arEl.textContent = h.ar; body.appendChild(arEl);
        var kuEl = mke('div', 'item-card-ku'); kuEl.textContent = h.ku; body.appendChild(kuEl);
        if (h.source) { var meta = mke('div', 'item-card-meta'); var sb = mke('span', 'badge badge-source'); sb.textContent = h.source; meta.appendChild(sb); body.appendChild(meta); }
        var acts = mke('div', 'item-card-actions');
        acts.appendChild(mkIconBtn('pencil', 'Edit', false, function() { editHadith(h.id); }));
        acts.appendChild(mkIconBtn('trash-2', 'Delete', true, function() { deleteHadith(h.id); }));
        card.appendChild(icon); card.appendChild(body); card.appendChild(acts);
        list.appendChild(card);
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
function editHadith(id) {
    var h = allHadiths.find(function(x) { return x.id === id; }); if (!h) return;
    document.getElementById('hadith-edit-id').value = id;
    document.getElementById('hadith-title').value = h.title || '';
    document.getElementById('hadith-ar').value = h.ar; document.getElementById('hadith-ku').value = h.ku;
    document.getElementById('hadith-source').value = h.source || '';
    document.getElementById('hadith-sort').value = h.sort_order || 10;
    document.getElementById('hadith-form-toggle-label').textContent = 'Editing hadith';
    switchTab('hadiths'); openForm('hadith');
}
function cancelHadithEdit() {
    ['hadith-edit-id','hadith-title','hadith-ar','hadith-ku','hadith-source'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('hadith-sort').value = '10';
    document.getElementById('hadith-form-toggle-label').textContent = 'Add Hadith';
    closeForm('hadith');
}
async function saveHadith() {
    var ar = document.getElementById('hadith-ar').value.trim(); var ku = document.getElementById('hadith-ku').value.trim();
    if (!ar || !ku) { showNotification('Arabic and Kurdish text are required.', 'warning'); return; }
    var payload = { title: document.getElementById('hadith-title').value.trim() || null, ar: ar, ku: ku,
        source: document.getElementById('hadith-source').value.trim() || null,
        sort_order: parseInt(document.getElementById('hadith-sort').value) || 0 };
    var supabase = window.adminAuth.getSupabase();
    var editId = document.getElementById('hadith-edit-id').value;
    var r = editId ? await supabase.from('gencine_hadiths').update(payload).eq('id', editId)
                   : await supabase.from('gencine_hadiths').insert(payload);
    if (r.error) { showNotification('Save failed: ' + r.error.message, 'error'); return; }
    showNotification(editId ? 'Hadith updated.' : 'Hadith added.', 'success');
    cancelHadithEdit(); await loadHadiths(); localStorage.removeItem('gencine_hadiths_v1');
}
async function deleteHadith(id) {
    if (!confirm('Delete this hadith?')) return;
    var r = await window.adminAuth.getSupabase().from('gencine_hadiths').delete().eq('id', id);
    if (r.error) { showNotification('Delete failed: ' + r.error.message, 'error'); return; }
    showNotification('Hadith deleted.', 'success'); await loadHadiths(); localStorage.removeItem('gencine_hadiths_v1');
}

/* ── Theme toggle ── */
(function() {
    var themeIcon = document.getElementById('theme-icon');
    if (localStorage.getItem('admin-theme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeIcon.setAttribute('data-lucide', 'sun');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    document.getElementById('theme-toggle').addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        var isDark = document.body.classList.contains('dark-mode');
        themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        if (typeof lucide !== 'undefined') lucide.createIcons();
        localStorage.setItem('admin-theme', isDark ? 'dark' : 'light');
    });
})();

/* ── Init ── */
(async function() {
    var isAuth = await window.adminAuth.checkAuth();
    if (isAuth) await loadAll();
})();

document.getElementById('menu-toggle').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('collapsed');
});
var mobileBtn = document.getElementById('mobile-menu-toggle');
if (mobileBtn) mobileBtn.addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('mobile-open');
});
// Search filter
var searchInput = document.getElementById('search-input');
if (searchInput) searchInput.addEventListener('input', function() {
    var q = this.value.toLowerCase();
    document.querySelectorAll('.item-card, .cat-card').forEach(function(el) {
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
});
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>

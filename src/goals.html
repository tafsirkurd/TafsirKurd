    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f8f8f8;
            --bg-tertiary: #f0f0f0;
            --text: #000000;
            --text-muted: #666666;
            --border: #e0e0e0;
            --accent: #000000;
            --success: #22c55e;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text: #ffffff;
            --text-muted: #999999;
            --border: #252525;
            --accent: #ffffff;
            --shadow: 0 2px 20px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        /* Main */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 100px;
        }

        /* Streak Hero */
        .streak-hero {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .streak-number {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }

        .streak-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .streak-info h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        /* Week Progress */
        .week-grid {
            display: flex;
            gap: 8px;
        }

        .day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .day-name {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .day-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
        }

        .day-item.completed .day-circle {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        .day-item.today .day-circle {
            border-color: var(--accent);
            border-width: 3px;
            transform: scale(1.1);
        }

        /* Goal Card */
        .goal-card {
            background: var(--accent);
            color: var(--bg);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .goal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
        }

        .goal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .goal-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .goal-icon {
            font-size: 2rem;
            opacity: 0.3;
        }

        .goal-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            position: relative;
        }

        .goal-detail {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: var(--radius-sm);
        }

        .goal-detail-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .goal-detail-value {
            font-weight: 600;
        }

        /* Progress Section */
        .progress-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            opacity: 0.5;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-text {
            font-size: 0.95rem;
        }

        .progress-percent {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .progress-bar {
            height: 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        /* Calendar Section */
        .calendar-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .year-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .year-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text);
        }

        .year-btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .year-display {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .month-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
        }

        .month-name {
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }

        .day-cell:hover:not(.empty) {
            transform: scale(1.2);
        }

        .day-cell.empty { background: transparent; }
        .day-cell.unread { background: var(--bg-tertiary); }
        .day-cell.partial { background: #fbbf24; color: #000; }
        .day-cell.read { background: var(--success); color: #fff; }

        /* Manual Entry */
        .manual-entry {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            margin-top: 20px;
        }

        .manual-title {
            font-weight: 600;
            margin-bottom: 14px;
        }

        .manual-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-input {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            background: var(--bg-secondary);
            color: var(--text);
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Actions */
        .actions-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .danger-btn {
            background: #dc3545;
            border-color: #dc3545;
        }

        .danger-btn:hover {
            background: #c82333;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: var(--shadow-hover);
            z-index: 9999;
            opacity: 0;
            transition: var(--transition);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .header-inner { padding: 14px 16px; }
            .header-title { font-size: 1.2rem; }
            .btn { padding: 8px 14px; font-size: 0.85rem; }
            .header-actions { flex-wrap: wrap; }

            .main { padding: 16px; }

            .streak-hero {
                flex-direction: column;
                text-align: center;
                padding: 24px;
                gap: 20px;
            }

            .streak-number { font-size: 3rem; }

            .week-grid {
                justify-content: center;
                flex-wrap: wrap;
            }

            .day-circle { width: 36px; height: 36px; font-size: 0.9rem; }

            .goal-card { padding: 20px; }
            .goal-title { font-size: 1.1rem; }
            .goal-details { grid-template-columns: repeat(2, 1fr); }
            .goal-detail { padding: 12px; }

            .progress-section, .calendar-section, .actions-section {
                padding: 18px;
            }

            .months-grid { grid-template-columns: 1fr; }

            .manual-form {
                flex-wrap: wrap;
                gap: 10px;
            }
            .manual-form .form-input {
                flex: 1 1 calc(50% - 5px);
                min-width: 0;
                padding: 14px 12px;
                font-size: 16px;
            }
            .manual-form .btn {
                flex: 1 1 100%;
                justify-content: center;
                padding: 14px 20px;
            }

            .btn { width: 100%; justify-content: center; }
        }

        @media (max-width: 380px) {
            .streak-number { font-size: 2.5rem; }
            .day-circle { width: 32px; height: 32px; font-size: 0.8rem; }
            .goal-details { grid-template-columns: 1fr; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .streak-hero, .goal-card, .progress-section, .calendar-section, .actions-section {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>

                <a href="/quran" class="btn btn-outline" data-t="goals_back_btn">

    <main class="main">

        <!-- Goal Card -->
        <div class="goal-card" id="goalCard" style="display: none;">

                </div>

            </div>
            <div class="goal-details" id="goalDetails"></div>
        </div>

        <!-- Today's Progress -->
        <div class="progress-section">
            <h2 class="section-title" data-t="goals_today_progress">

            </div>

                <div class="progress-fill" id="progressFill" style="width: 0%"></div>

        <!-- Calendar -->
        <div class="calendar-section">
            <h2 class="section-title" data-t="goals_calendar_title">

            </h2>

            <div class="year-nav">
                <button class="year-btn" onclick="changeYear(-1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <span class="year-display" id="currentYear">2026</span>
                <button class="year-btn" onclick="changeYear(1)">
                    <i class="fas fa-chevron-left"></i>

            <div class="months-grid" id="monthsGrid"></div>

                <div class="manual-form">
                    <input type="date" class="form-input" id="manualDate">
                    <input type="number" class="form-input" id="manualMinutes" placeholder="خولەک" data-t-placeholder="goals_minutes_placeholder">

        <!-- Actions -->
        <div class="actions-section">
            <h2 class="section-title" data-t="goals_manage_title">

                رێڤەبرن
            </h2>
            <button class="btn danger-btn" onclick="deleteGoal()">
                <i class="fas fa-trash"></i>
                سڕینەڤەیا هەمی زانیاریان
            </button>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // All DOM manipulation uses safe methods (createElement, textContent)
        // No user-generated content is rendered without escaping

        let currentYear = new Date().getFullYear();
        let readingData = {};
        let dailyGoalMinutes = 10;
        let currentUser = null;
        let currentGoal = null;

        const daysOfWeek = ['یەک', 'دوو', 'سێ', 'چوار', 'پێنج', 'ئەی', 'شەم'];
        const monthNames = ['کانوونا دوویێ', 'شوبات', 'ئازار', 'نیسان', 'ئایار', 'حوزەیران', 'تەممووز', 'ئاب', 'ئەیلول', 'تشرینا ئێکێ', 'تشرینا دوویێ', 'کانوونا ئێکێ'];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        function formatDate(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        }

        function loadData() {
            const userKey = 'quran_data_' + currentUser.sub;
            const saved = localStorage.getItem(userKey);
            if (saved) {
                const data = JSON.parse(saved);
                readingData = {};
                if (data.dailyActivity) {
                    Object.keys(data.dailyActivity).forEach(function(date) {
                        readingData[date] = data.dailyActivity[date].minutes || 0;
                    });
                }
                dailyGoalMinutes = data.dailyGoalMinutes || 10;
            }
        }

        function saveData() {
            const userKey = 'quran_data_' + currentUser.sub;
            const saved = localStorage.getItem(userKey) || '{}';
            const data = JSON.parse(saved);

            if (!data.dailyActivity) data.dailyActivity = {};
            Object.keys(readingData).forEach(function(date) {
                if (!data.dailyActivity[date]) {
                    data.dailyActivity[date] = { minutes: 0, ayahs: 0, surahs: [] };
                }
                data.dailyActivity[date].minutes = readingData[date];
            });

            data.dailyGoalMinutes = dailyGoalMinutes;
            localStorage.setItem(userKey, JSON.stringify(data));
        }

        function calculateStreak() {
            const today = new Date();
            const todayKey = formatDate(today);
            let streak = 0;
            const checkDate = new Date(today);

            while (true) {
                const dateKey = formatDate(checkDate);
                const minutesRead = readingData[dateKey] || 0;

                if (minutesRead >= dailyGoalMinutes) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    if (dateKey === todayKey) {
                        checkDate.setDate(checkDate.getDate() - 1);
                        continue;
                    }
                    break;
                }
            }
            return streak;
        }

        function renderWeekProgress() {
            const container = document.getElementById('weekProgress');
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            const today = new Date();
            const dayOfWeek = today.getDay();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - dayOfWeek);

            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                const dateKey = formatDate(date);
                const isToday = i === dayOfWeek;
                const hasReading = readingData[dateKey] && readingData[dateKey] >= dailyGoalMinutes;

                const dayItem = document.createElement('div');
                dayItem.className = 'day-item' + (hasReading ? ' completed' : '') + (isToday ? ' today' : '');

                const dayName = document.createElement('div');
                dayName.className = 'day-name';
                dayName.textContent = daysOfWeek[i];

                const dayCircle = document.createElement('div');
                dayCircle.className = 'day-circle';
                dayCircle.textContent = hasReading ? '✓' : '○';

                dayItem.appendChild(dayName);
                dayItem.appendChild(dayCircle);
                container.appendChild(dayItem);
            }
        }

        function renderGoalCard() {
            if (!currentGoal) return;

            const card = document.getElementById('goalCard');
            card.style.display = 'block';

            document.getElementById('goalTitle').textContent = currentGoal.name || 'ئارمانجا تە';
            document.getElementById('goalDesc').textContent = currentGoal.description || '';

            const grid = document.getElementById('goalDetails');
            while (grid.firstChild) {
                grid.removeChild(grid.firstChild);
            }

            const details = [
                { label: 'جۆر', value: getGoalTypeLabel(currentGoal.type) },
                { label: 'پێوەر', value: getCriteriaLabel(currentGoal.criteria) },
                { label: 'ئارمانج', value: currentGoal.target + ' ' + getCriteriaUnit(currentGoal.criteria) },
                { label: 'دووبارەبوون', value: getFrequencyLabel(currentGoal.frequency) }
            ];

            details.forEach(function(d) {
                const item = document.createElement('div');
                item.className = 'goal-detail';
                const label = document.createElement('div');
                label.className = 'goal-detail-label';
                label.textContent = d.label;
                const value = document.createElement('div');
                value.className = 'goal-detail-value';
                value.textContent = d.value;
                item.appendChild(label);
                item.appendChild(value);
                grid.appendChild(item);
            });
        }

        function getGoalTypeLabel(type) {
            const labels = { '10min': '١٠ خولەک', '30days': '٣٠ رۆژ', '1year': 'سالەک', 'custom': 'تایبەت' };
            return labels[type] || type;
        }

        function getCriteriaLabel(c) {
            const labels = { 'time': 'دەم', 'pages': 'لاپەڕ', 'ayahs': 'ئایەت', 'surahs': 'سوورە', 'juz': 'جوز' };
            return labels[c] || c;
        }

        function getCriteriaUnit(c) {
            const units = { 'time': 'خولەک', 'pages': 'لاپەڕ', 'ayahs': 'ئایەت', 'surahs': 'سوورە', 'juz': 'جوز' };
            return units[c] || '';
        }

        function getFrequencyLabel(f) {
            const labels = { 'daily': 'رۆژانە', 'weekly': 'هەفتانە', 'monthly': 'مەهانە' };
            return labels[f] || f;
        }

        function updateTodayProgress() {
            const today = formatDate(new Date());
            const todayMinutes = readingData[today] || 0;
            const percent = Math.min(100, Math.round((todayMinutes / dailyGoalMinutes) * 100));

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('goalPercent').textContent = percent + '%';

            const targetMinutes = currentGoal ? currentGoal.target : dailyGoalMinutes;
            document.getElementById('goalText').textContent = 'ئارمانجا ئەڤڕۆ: ' + targetMinutes + ' خولەک (' + todayMinutes + ' تمام)';
        }

        function renderCalendar() {
            const container = document.getElementById('monthsGrid');
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            for (let month = 0; month < 12; month++) {
                const monthCard = document.createElement('div');
                monthCard.className = 'month-card';

                const monthName = document.createElement('div');
                monthName.className = 'month-name';
                monthName.textContent = monthNames[month];

                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';

                const daysInMonth = new Date(currentYear, month + 1, 0).getDate();
                const firstDay = new Date(currentYear, month, 1).getDay();

                for (let i = 0; i < firstDay; i++) {
                    const empty = document.createElement('div');
                    empty.className = 'day-cell empty';
                    daysGrid.appendChild(empty);
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(currentYear, month, day);
                    const dateKey = formatDate(date);
                    const reading = readingData[dateKey] || 0;

                    const cell = document.createElement('div');
                    cell.className = 'day-cell';
                    if (reading >= dailyGoalMinutes) {
                        cell.classList.add('read');
                    } else if (reading > 0) {
                        cell.classList.add('partial');
                    } else {
                        cell.classList.add('unread');
                    }
                    cell.textContent = day;
                    cell.title = reading + ' خولەک';
                    daysGrid.appendChild(cell);
                }

                monthCard.appendChild(monthName);
                monthCard.appendChild(daysGrid);
                container.appendChild(monthCard);
            }
        }

        function changeYear(delta) {
            currentYear += delta;
            document.getElementById('currentYear').textContent = currentYear;
            renderCalendar();
        }

        function addManualEntry() {
            const dateInput = document.getElementById('manualDate');
            const minutesInput = document.getElementById('manualMinutes');

            if (!dateInput.value || !minutesInput.value) {
                showToast('تکایە هەردوو خانە پڕ بکە');
                return;
            }

            const date = new Date(dateInput.value);
            const minutes = parseInt(minutesInput.value, 10);
            const dateKey = formatDate(date);

            readingData[dateKey] = (readingData[dateKey] || 0) + minutes;
            saveData();
            renderCalendar();
            renderWeekProgress();
            updateStreak();
            updateTodayProgress();

            minutesInput.value = '';
            showToast('زانیاری هاتە زێدەکرن');
        }

        function updateStreak() {
            const streak = calculateStreak();
            document.getElementById('streakNumber').textContent = streak;
        }

        function deleteGoal() {
            if (confirm('ئایا دڵنیایت لە سڕینەڤەیا هەمی زانیاریان؟')) {
                const userKey = 'quran_data_' + currentUser.sub;
                const saved = localStorage.getItem(userKey);
                const data = saved ? JSON.parse(saved) : {};

                data.dailyActivity = {};
                data.sessions = [];
                data.stats = { daysActive: 0, surahsCompleted: 0, ayahsRead: 0, totalActiveMinutes: 0, streak: 0, level: 1 };

                localStorage.setItem(userKey, JSON.stringify(data));
                localStorage.removeItem('readingGoal');

                readingData = {};
                dailyGoalMinutes = 10;
                currentGoal = null;

                renderCalendar();
                renderWeekProgress();
                updateStreak();
                updateTodayProgress();
                document.getElementById('goalCard').style.display = 'none';

                showToast('هەمی زانیاری هاتنە سڕینەڤە');
            }
        }

        // Init
        window.addEventListener('load', function() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login';
                return;
            }
            currentUser = JSON.parse(user);

            const readingGoal = localStorage.getItem('readingGoal');
            if (!readingGoal) {
                window.location.href = '/reading-goal';
                return;
            }

            currentGoal = JSON.parse(readingGoal);

            let goalMinutes = 10;
            if (currentGoal.criteria === 'time') {
                goalMinutes = currentGoal.target || 10;
            } else if (currentGoal.criteria === 'pages') {
                goalMinutes = (currentGoal.target || 10) * 3;
            } else {
                goalMinutes = currentGoal.target || 10;
            }

            loadData();
            dailyGoalMinutes = goalMinutes;

            renderGoalCard();
            renderWeekProgress();
            renderCalendar();
            updateStreak();
            updateTodayProgress();

            document.getElementById('currentYear').textContent = currentYear;
            document.getElementById('manualDate').valueAsDate = new Date();
        });
    </script>
</body>
</html>

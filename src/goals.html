<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ئامانجەکان - تەفسیر کوورد</title>

    <!-- Favicons - Big site sizes for better visibility -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/logo.png">
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">

    <!-- Console Cleaner - Clean console in production -->
    <script src="utils/console-cleaner.js"></script>

    <!-- Kurdish Number Utility - Convert all numbers to Kurdish numerals -->
    <script src="utils/kurdish-numbers.js"></script>
    <script src="utils/auto-kurdish-numbers.js"></script>

    <!-- Critical Font Preloading - Instant font display, zero FOIT/FOUT -->
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-regular.woff2?v=16" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/ibm-plex-arabic-v11-latin_arabic-600.woff2?v=16" as="font" type="font/woff2" crossorigin>

    <!-- Local Fonts - Zero external requests, instant loading -->
    <link rel="stylesheet" href="/assets/fonts/fonts.css?v=16">

    <!-- Local Font Awesome - Zero external requests -->
    <link rel="stylesheet" href="/assets/fontawesome/all.min.css?v=16">
    <style>
        :root {
            --primary: #000000;
            --accent: #ffffff;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --border: #e8e8e8;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.1);
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: var(--card-bg);
            padding: 20px 0;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 30px;
        }

        /* Progress Section */
        .progress-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Streak Container */
        .streak-container {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 30px;
            margin-bottom: 40px;
            align-items: center;
        }

        .streak-left {
            text-align: center;
        }

        .streak-number {
            font-size: 5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .streak-label {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .streak-right h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text);
        }

        /* Week Progress - Like the image */
        .week-progress {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            position: relative;
        }

        .week-progress::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border);
            z-index: 0;
        }

        .day-card {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .day-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .day-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--border);
            border: 4px solid var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all var(--transition);
        }

        .day-card.completed .day-circle {
            background: var(--success);
            color: white;
        }

        .day-card.today .day-circle {
            border-color: var(--primary);
            border-width: 6px;
            transform: scale(1.1);
        }

        /* Goal Details Card */
        .goal-details-card {
            background: linear-gradient(135deg, var(--primary) 0%, #333 100%);
            color: var(--accent);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .goal-details-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .goal-details-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .goal-details-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .goal-details-description {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .goal-details-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .goal-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .goal-detail-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .goal-detail-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .goal-detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Goal Progress */
        .goal-section {
            margin-bottom: 40px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .goal-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .goal-percentage {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-container {
            width: 100%;
            height: 40px;
            background: var(--bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #27ae60);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: 700;
        }

        /* Calendar Section */
        .calendar-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .year-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .year-btn {
            padding: 10px 20px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
        }

        .year-btn:hover {
            background: var(--primary);
            color: var(--accent);
            border-color: var(--primary);
        }

        .current-year {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .month-card {
            background: var(--bg);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--border);
        }

        .month-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-cell:hover:not(.empty) {
            transform: scale(1.1);
        }

        .day-cell.empty {
            background: transparent;
        }

        .day-cell.read {
            background: var(--success);
            color: white;
        }

        .day-cell.partial {
            background: var(--warning);
            color: white;
        }

        .day-cell.unread {
            background: var(--border);
        }

        /* Manual Entry */
        .manual-entry {
            background: var(--bg);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .manual-entry-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .manual-entry-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
        }

        .form-input {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .add-btn {
            padding: 12px 30px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Goal Management */
        .goal-management {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .goal-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .goal-btn {
            padding: 15px 30px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            background: var(--bg);
        }

        .goal-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .goal-btn.delete {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }


        @media (max-width: 768px) {
            .week-progress {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }

            .months-grid {
                grid-template-columns: 1fr;
            }

            .manual-entry-form {
                grid-template-columns: 1fr;
            }

            .streak-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="header-title">ئامانجەکان</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="/reading-goal" class="back-btn" style="background: var(--primary); color: var(--accent); border-color: var(--primary);">
                    <i class="fas fa-plus"></i>
                    ئامانجێ نوێ
                </a>
                <a href="/quran" class="back-btn">
                    <i class="fas fa-arrow-right"></i>
                    گەڕانەوە
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Progress Section -->
        <div class="progress-section">
            <h2 class="section-title">
                <i class="fas fa-chart-line"></i>
                پێشکەوتن
            </h2>

            <!-- Goal Details Card -->
            <div class="goal-details-card" id="goalDetailsCard" style="display: none;">
                <div class="goal-details-header">
                    <div>
                        <div class="goal-details-title" id="goalDetailsTitle">ئامانجا تە</div>
                        <div class="goal-details-description" id="goalDetailsDescription"></div>
                    </div>
                    <div class="goal-details-icon">🎯</div>
                </div>
                <div class="goal-details-grid" id="goalDetailsGrid">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <div class="streak-container">
                <div class="streak-left">
                    <div class="streak-number" id="streakNumber">0</div>
                    <div class="streak-label">ڕۆژ</div>
                </div>
                <div class="streak-right">
                    <h3>پێشکەوتنی ئەم هەفتەیە</h3>
                    <div class="week-progress" id="weekProgress">
                        <!-- Days will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Today's Goal -->
            <div class="goal-section">
                <div class="goal-header">
                    <div class="goal-text" id="goalText">ئامانجی ئەمڕۆ: 10 خولەک خوێندنەوە</div>
                    <div class="goal-percentage" id="goalPercent">0%</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="calendar-section">
            <h2 class="section-title">
                <i class="fas fa-calendar-alt"></i>
                ڕۆژژمێری پێشکەوتن
            </h2>

            <div class="year-selector">
                <button class="year-btn" onclick="changeYear(-1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div class="current-year" id="currentYear">2025</div>
                <button class="year-btn" onclick="changeYear(1)">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <div class="months-grid" id="monthsGrid">
                <!-- Months will be populated by JavaScript -->
            </div>

            <!-- Manual Entry -->
            <div class="manual-entry">
                <div class="manual-entry-title">زیادکردنی خولەک بە دەستی</div>
                <div class="manual-entry-form">
                    <input type="date" class="form-input" id="manualDate">
                    <input type="number" class="form-input" id="manualMinutes" placeholder="خولەک (بە خولەک)">
                    <button class="add-btn" onclick="addManualEntry()">
                        <i class="fas fa-plus"></i> زیادکردن
                    </button>
                </div>
            </div>
        </div>

        <!-- Goal Management -->
        <div class="goal-management">
            <h2 class="section-title">
                <i class="fas fa-cog"></i>
                بەڕێوەبردنی ئامانج
            </h2>

            <div class="goal-actions">
                <button class="goal-btn delete" onclick="deleteGoal()">
                    <i class="fas fa-trash"></i> سڕینەوەی هەموو زانیاری
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentYear = new Date().getFullYear();
        let readingData = {};
        let dailyGoalMinutes = 10;
        let streakDays = 0;
        let currentUser = null;
        let currentGoal = null; // Store the full goal object

        const daysOfWeek = ['یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی', 'شەممە'];
        const monthNames = ['کانوونی دووەم', 'شوبات', 'ئازار', 'نیسان', 'ئایار', 'حوزەیران', 'تەممووز', 'ئاب', 'ئەیلوول', 'تشرینی یەکەم', 'تشرینی دووەم', 'کانوونی یەکەم'];

        window.addEventListener('load', () => {
            // Check if user is authenticated
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login';
                return;
            }
            currentUser = JSON.parse(user);

            // Check if user has set up a reading goal
            const readingGoal = localStorage.getItem('readingGoal');
            if (!readingGoal) {
                // No goal set, redirect to reading goal setup
                window.location.href = '/reading-goal';
                return;
            }

            // Load goal settings from reading-goal setup
            currentGoal = JSON.parse(readingGoal);

            // Convert goal to minutes based on criteria
            let goalMinutes = 10;
            if (currentGoal.criteria === 'time') {
                goalMinutes = currentGoal.target || 10;
            } else if (currentGoal.criteria === 'pages') {
                // Estimate: 1 page ≈ 3 minutes
                goalMinutes = (currentGoal.target || 10) * 3;
            } else {
                // For ayahs/surahs, use a default estimation
                goalMinutes = currentGoal.target || 10;
            }

            loadData();

            // Apply goal settings (override what was loaded from quran_data)
            dailyGoalMinutes = goalMinutes;

            // Render goal details card
            renderGoalDetails();

            renderWeekProgress();
            renderCalendar();
            updateStreak();
            updateTodayProgress();
            document.getElementById('currentYear').textContent = KurdishNumbers.toKurdish(currentYear);
            document.getElementById('manualDate').valueAsDate = new Date();
        });

        function renderGoalDetails() {
            if (!currentGoal) return;

            const card = document.getElementById('goalDetailsCard');
            const title = document.getElementById('goalDetailsTitle');
            const description = document.getElementById('goalDetailsDescription');
            const grid = document.getElementById('goalDetailsGrid');

            // Show the card
            card.style.display = 'block';

            // Set title and description
            title.textContent = currentGoal.name || 'ئامانجا تە';
            description.textContent = currentGoal.description || '';

            // Build details grid
            grid.innerHTML = '';

            // Add goal type detail
            addDetailItem(grid, 'جۆرا ئامانجێ', getGoalTypeLabel(currentGoal.type));

            // Add criteria detail
            addDetailItem(grid, 'پێوەر', getCriteriaLabel(currentGoal.criteria));

            // Add target detail
            addDetailItem(grid, 'ئامانجا رۆژانە', `${currentGoal.target} ${getCriteriaUnit(currentGoal.criteria)}`);

            // Add frequency detail
            addDetailItem(grid, 'دووبارەبوون', getFrequencyLabel(currentGoal.frequency));

            // Add flow details if available
            if (currentGoal.flow) {
                if (currentGoal.flow.step2) {
                    addDetailItem(grid, 'هەلبژاردنا ١', getFlowLabel(currentGoal.type, 'step2', currentGoal.flow.step2));
                }
                if (currentGoal.flow.step3) {
                    addDetailItem(grid, 'هەلبژاردنا ٢', getFlowLabel(currentGoal.type, 'step3', currentGoal.flow.step3));
                }
                if (currentGoal.flow.step4) {
                    addDetailItem(grid, 'هەلبژاردنا ٣', getFlowLabel(currentGoal.type, 'step4', currentGoal.flow.step4));
                }
            }

            // Add start date
            const startDate = new Date(currentGoal.startDate);
            addDetailItem(grid, 'دەستپێکرن', startDate.toLocaleDateString('ku'));
        }

        function addDetailItem(container, label, value) {
            const item = document.createElement('div');
            item.className = 'goal-detail-item';
            item.innerHTML = `
                <div class="goal-detail-label">${label}</div>
                <div class="goal-detail-value">${value}</div>
            `;
            container.appendChild(item);
        }

        function getGoalTypeLabel(type) {
            const labels = {
                '10min': 'خواندنا ١٠ خولەکان',
                '30days': 'قورئانا ٣٠ رۆژان',
                '1year': 'قورئانا ساڵەکێ',
                'custom': 'تایبەت'
            };
            return labels[type] || type;
        }

        function getCriteriaLabel(criteria) {
            const labels = {
                'time': 'کات',
                'pages': 'لاپەڕە',
                'ayahs': 'ئایەت',
                'surahs': 'سوورە',
                'juz': 'جوز',
                'verses': 'ئایەت'
            };
            return labels[criteria] || criteria;
        }

        function getCriteriaUnit(criteria) {
            const units = {
                'time': 'خولەک',
                'pages': 'لاپەڕە',
                'ayahs': 'ئایەت',
                'surahs': 'سوورە',
                'juz': 'جوز',
                'verses': 'ئایەت'
            };
            return units[criteria] || '';
        }

        function getFrequencyLabel(frequency) {
            const labels = {
                'daily': 'رۆژانە',
                'weekly': 'هەفتانە',
                'monthly': 'مەهانە',
                '5days': '٥ رۆژ/هەفتە',
                '3days': '٣ رۆژ/هەفتە'
            };
            return labels[frequency] || frequency;
        }

        function getFlowLabel(goalType, step, value) {
            // Return Kurdish labels based on goal type and step
            const flowLabels = {
                '1year': {
                    step2: {
                        '1time': 'جارەکێ د ساڵێ',
                        '2times': 'دوو جاران د ساڵێ',
                        '3times': 'سێ جاران د ساڵێ'
                    },
                    step3: {
                        'none': 'هەر رۆژێ بخێنە',
                        'friday': 'هەینی بەتاڵ',
                        'weekend': 'کۆتایی هەفتە بەتاڵ'
                    },
                    step4: {
                        'weekly': 'پێداچوونەوەیا هەفتانە',
                        'monthly': 'پێداچوونەوەیا مەهانە',
                        'quarterly': 'پێداچوونەوەیا سێ مەهان'
                    }
                },
                '30days': {
                    step2: {
                        'standard': '١ جوز/رۆژ',
                        'intensive': '٢ جوز/رۆژ',
                        'relaxed': '١ جوز/٢ رۆژ'
                    },
                    step3: {
                        'tajweed': 'ب تەجویدێ',
                        'understanding': 'ب تەفسیرێ',
                        'memorization': 'حیڤز کرن',
                        'both': 'تەجوید و تەفسیر'
                    },
                    step4: {
                        'juz1': 'ل جوزا ١',
                        'juz30': 'ل جوزا ٣٠',
                        'juz29': 'ل جوزا ٢٩'
                    }
                },
                '10min': {
                    step2: {
                        'daily': 'هەر رۆژێ',
                        '5days': '٥ رۆژ/هەفتە',
                        '3days': '٣ رۆژ/هەفتە'
                    },
                    step3: {
                        'morning': 'سبەحێ',
                        'afternoon': 'پێشڤانێ',
                        'evening': 'ئێڤارێ',
                        'flexible': 'دەمەکێ نەدیاری'
                    }
                }
            };

            if (flowLabels[goalType] && flowLabels[goalType][step] && flowLabels[goalType][step][value]) {
                return flowLabels[goalType][step][value];
            }

            return value;
        }

        function loadData() {
            // Load REAL data from user's quran_data
            const userKey = 'quran_data_' + currentUser.sub;
            const saved = localStorage.getItem(userKey);

            if (saved) {
                const data = JSON.parse(saved);

                // Convert dailyActivity to readingData format
                readingData = {};
                if (data.dailyActivity) {
                    Object.keys(data.dailyActivity).forEach(date => {
                        readingData[date] = data.dailyActivity[date].minutes || 0;
                    });
                }

                // Get daily goal (default 10 minutes)
                dailyGoalMinutes = data.dailyGoalMinutes || 10;

                // Calculate streak from real data
                streakDays = calculateStreak();
            }
        }

        function saveData() {
            // Save to the main quran_data structure
            const userKey = 'quran_data_' + currentUser.sub;
            const saved = localStorage.getItem(userKey);
            const data = saved ? JSON.parse(saved) : {};

            // Update dailyActivity from readingData
            if (!data.dailyActivity) data.dailyActivity = {};

            Object.keys(readingData).forEach(date => {
                if (!data.dailyActivity[date]) {
                    data.dailyActivity[date] = { minutes: 0, ayahs: 0, surahs: [] };
                }
                data.dailyActivity[date].minutes = readingData[date];
            });

            // Save daily goal to quran_data
            data.dailyGoalMinutes = dailyGoalMinutes;

            localStorage.setItem(userKey, JSON.stringify(data));

            // Also update the readingGoal to keep it in sync
            const readingGoal = localStorage.getItem('readingGoal');
            if (readingGoal) {
                const goal = JSON.parse(readingGoal);
                goal.target = dailyGoalMinutes;
                localStorage.setItem('readingGoal', JSON.stringify(goal));
            }
        }

        function renderWeekProgress() {
            const container = document.getElementById('weekProgress');
            container.innerHTML = '';

            const today = new Date();
            const dayOfWeek = today.getDay();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - dayOfWeek);

            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                const dateKey = formatDate(date);
                const isToday = i === dayOfWeek;
                const hasReading = readingData[dateKey] && readingData[dateKey] >= dailyGoalMinutes;

                const dayCard = document.createElement('div');
                dayCard.className = `day-card ${hasReading ? 'completed' : ''} ${isToday ? 'today' : ''}`;
                dayCard.innerHTML = `
                    <div class="day-name">${daysOfWeek[i]}</div>
                    <div class="day-circle">${hasReading ? '✓' : '○'}</div>
                `;
                container.appendChild(dayCard);
            }
        }

        function renderCalendar() {
            const container = document.getElementById('monthsGrid');
            container.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const monthCard = document.createElement('div');
                monthCard.className = 'month-card';

                const daysInMonth = new Date(currentYear, month + 1, 0).getDate();
                const firstDay = new Date(currentYear, month, 1).getDay();

                let daysHTML = '';
                for (let i = 0; i < firstDay; i++) {
                    daysHTML += '<div class="day-cell empty"></div>';
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(currentYear, month, day);
                    const dateKey = formatDate(date);
                    const reading = readingData[dateKey] || 0;

                    let className = 'day-cell unread';
                    if (reading >= dailyGoalMinutes) {
                        className = 'day-cell read';
                    } else if (reading > 0) {
                        className = 'day-cell partial';
                    }

                    daysHTML += `<div class="${className}" title="${reading} خولەک">${day}</div>`;
                }

                monthCard.innerHTML = `
                    <div class="month-name">${monthNames[month]}</div>
                    <div class="days-grid">${daysHTML}</div>
                `;
                container.appendChild(monthCard);
            }
        }

        function changeYear(delta) {
            currentYear += delta;
            document.getElementById('currentYear').textContent = KurdishNumbers.toKurdish(currentYear);
            renderCalendar();
        }

        function addManualEntry() {
            const dateInput = document.getElementById('manualDate');
            const minutesInput = document.getElementById('manualMinutes');

            if (!dateInput.value || !minutesInput.value) {
                alert('تکایە هەردوو خانە پڕبکەرەوە');
                return;
            }

            const date = new Date(dateInput.value);
            const minutes = parseInt(minutesInput.value);
            const dateKey = formatDate(date);

            readingData[dateKey] = (readingData[dateKey] || 0) + minutes;
            saveData();
            renderCalendar();
            renderWeekProgress();
            updateStreak();
            updateTodayProgress();

            minutesInput.value = '';
            alert('زانیاریەکە زیادکرا');
        }

        function calculateStreak() {
            const today = new Date();
            let streak = 0;
            let checkDate = new Date(today);

            while (true) {
                const dateKey = formatDate(checkDate);
                if (readingData[dateKey] && readingData[dateKey] >= dailyGoalMinutes) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }

            return streak;
        }

        function updateStreak() {
            streakDays = calculateStreak();
            document.getElementById('streakNumber').textContent = KurdishNumbers.toKurdish(streakDays);
        }

        function updateTodayProgress() {
            const today = formatDate(new Date());
            const todayMinutes = readingData[today] || 0;
            const percent = Math.min(100, Math.round((todayMinutes / dailyGoalMinutes) * 100));

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('goalPercent').textContent = KurdishNumbers.toKurdish(percent) + '%';

            // Display goal based on criteria from reading-goal
            let goalText = '';
            if (currentGoal && currentGoal.criteria === 'pages') {
                const pagesRead = Math.floor(todayMinutes / 3); // Estimate: 1 page ≈ 3 minutes
                goalText = `ئامانجی ئەمڕۆ: ${currentGoal.target} لاپەڕە خوێندنەوە (${pagesRead} لاپەڕە تەواوکراوە)`;
            } else if (currentGoal && currentGoal.criteria === 'juz') {
                const juzRead = Math.floor(todayMinutes / 60); // Estimate: 1 juz ≈ 60 minutes
                goalText = `ئامانجی ئەمڕۆ: ${currentGoal.target} جوز خوێندنەوە (${juzRead} جوز تەواوکراوە)`;
            } else if (currentGoal && currentGoal.criteria === 'verses') {
                goalText = `ئامانجی ئەمڕۆ: ${currentGoal.target} ئایەت خوێندنەوە (${todayMinutes} خولەک تەواوکراوە)`;
            } else if (currentGoal && currentGoal.criteria === 'ayahs') {
                goalText = `ئامانجی ئەمڕۆ: ${currentGoal.target} ئایەت خوێندنەوە (${todayMinutes} خولەک تەواوکراوە)`;
            } else if (currentGoal && currentGoal.criteria === 'surahs') {
                const surahsRead = Math.floor(todayMinutes / 10); // Estimate
                goalText = `ئامانجی ئەمڕۆ: ${currentGoal.target} سوورە خوێندنەوە (${surahsRead} سوورە تەواوکراوە)`;
            } else {
                // Default to time-based (minutes)
                const targetMinutes = currentGoal ? currentGoal.target : dailyGoalMinutes;
                goalText = `ئامانجی ئەمڕۆ: ${targetMinutes} خولەک خوێندنەوە (${todayMinutes} خولەک تەواوکراوە)`;
            }

            document.getElementById('goalText').textContent = goalText;
        }


        function deleteGoal() {
            if (confirm('ئایا دڵنیایت لە سڕینەوەی هەموو زانیاری و دەستپێکردنەوە؟')) {
                // Clear reading data but keep other user data
                const userKey = 'quran_data_' + currentUser.sub;
                const saved = localStorage.getItem(userKey);
                const data = saved ? JSON.parse(saved) : {};

                // Clear activity-related data only
                data.dailyActivity = {};
                data.sessions = [];
                data.stats = {
                    daysActive: 0,
                    surahsCompleted: 0,
                    ayahsRead: 0,
                    totalActiveMinutes: 0,
                    streak: 0,
                    level: 1
                };

                localStorage.setItem(userKey, JSON.stringify(data));

                // Clear reading goal
                localStorage.removeItem('readingGoal');

                // Reset local data
                readingData = {};
                dailyGoalMinutes = 10;
                streakDays = 0;
                currentGoal = null;

                renderCalendar();
                renderWeekProgress();
                updateStreak();
                updateTodayProgress();
                alert('هەموو زانیاریەکان سڕایەوە');
            }
        }

        function formatDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => {
                    console.log('✅ Service Worker registered successfully:', registration.scope);
                })
                .catch(error => {
                    console.log('❌ Service Worker registration failed:', error);
                });
        }
    </script>
</body>

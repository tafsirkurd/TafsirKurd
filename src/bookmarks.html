        :root {

            --accent: #000000;
            --accent-soft: rgba(0,0,0,0.05);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --bg-secondary: #141414;
            --text: #ffffff;
            --text-muted: #999999;
            --border: #252525;
            --accent: #ffffff;
            --accent-soft: rgba(255,255,255,0.05);
            --shadow: 0 2px 20px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title i { opacity: 0.6; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* Main Container */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 100px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .sort-select {
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 30px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }

        .empty-icon {
            font-size: 4rem;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-desc {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        /* Bookmark Cards */
        .bookmarks-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bookmark-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .bookmark-card::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            transition: var(--transition);
        }

        .bookmark-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .bookmark-card:hover::before {
            width: 6px;
        }

        .bookmark-card.removing {
            opacity: 0;
            transform: scale(0.9) translateX(-20px);
            margin-bottom: -100%;
            padding: 0;
            overflow: hidden;
        }

        .bookmark-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }

        .bookmark-info {
            flex: 1;

        .bookmark-surah {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;

        .bookmark-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bookmark-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .action-btn.delete:hover {
            background: #dc3545;
            border-color: #dc3545;
        }

        .ayah-text {
            font-family: 'KFGQPC Hafs', 'Scheherazade New', serif;
            font-size: 1.6rem;
            line-height: 2.2;
            text-align: center;
            padding: 24px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
        }

        .ayah-note {
            background: var(--bg);
            padding: 16px;
            border-radius: var(--radius-sm);
            border-right: 3px solid var(--accent);
            margin-bottom: 12px;
        }

        .note-label {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
        }

        .note-text {
            line-height: 1.7;
        }

        .note-editor {
            display: none;
            margin-top: 16px;
        }

        .note-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
        }

        .note-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .save-note-btn {
            margin-top: 12px;
            padding: 10px 20px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .save-note-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: var(--shadow-hover);
            z-index: 9999;
            opacity: 0;
            transition: var(--transition);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Mobile Styles */
        @media (max-width: 640px) {
            .header-inner { padding: 14px 16px; }
            .header-title { font-size: 1.3rem; }
            .back-btn { padding: 8px 14px; font-size: 0.85rem; }

            .main { padding: 20px 16px 80px; }

            .stats-grid { gap: 8px; }
            .stat-card { padding: 14px 10px; }
            .stat-value { font-size: 1.5rem; }
            .stat-label { font-size: 0.75rem; }

            .controls { flex-direction: column; gap: 10px; }
            .search-input, .sort-select { padding: 12px 16px; }

            .bookmark-card { padding: 18px; }
            .bookmark-header { flex-direction: column; gap: 12px; }
            .bookmark-actions { align-self: flex-end; }

            .ayah-text { font-size: 1.3rem; padding: 18px; line-height: 2; }

            .empty-state { padding: 60px 20px; }
            .empty-icon { font-size: 3rem; }
            .empty-title { font-size: 1.2rem; }
        }

        @media (max-width: 380px) {
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card { display: flex; justify-content: space-between; align-items: center; }
            .stat-value { font-size: 1.3rem; }
            .ayah-text { font-size: 1.1rem; padding: 14px; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bookmark-card {
            animation: fadeIn 0.4s ease forwards;
        }

        .bookmark-card:nth-child(1) { animation-delay: 0.05s; }
        .bookmark-card:nth-child(2) { animation-delay: 0.1s; }
        .bookmark-card:nth-child(3) { animation-delay: 0.15s; }
        .bookmark-card:nth-child(4) { animation-delay: 0.2s; }
        .bookmark-card:nth-child(5) { animation-delay: 0.25s; }

</head>

            89: { arabic: "الفجر", english: "Al-Fajr" },
            90: { arabic: "البلد", english: "Al-Balad" },
            91: { arabic: "الشمس", english: "Ash-Shams" },
            92: { arabic: "الليل", english: "Al-Layl" },
            93: { arabic: "الضحى", english: "Ad-Duha" },
            94: { arabic: "الشرح", english: "Ash-Sharh" },
            95: { arabic: "التين", english: "At-Tin" },
            96: { arabic: "العلق", english: "Al-Alaq" },
            97: { arabic: "القدر", english: "Al-Qadr" },
            98: { arabic: "البينة", english: "Al-Bayyinah" },
            99: { arabic: "الزلزلة", english: "Az-Zalzalah" },
            100: { arabic: "العاديات", english: "Al-Adiyat" },
            101: { arabic: "القارعة", english: "Al-Qari'ah" },
            102: { arabic: "التكاثر", english: "At-Takathur" },
            103: { arabic: "العصر", english: "Al-Asr" },
            104: { arabic: "الهمزة", english: "Al-Humazah" },
            105: { arabic: "الفيل", english: "Al-Fil" },
            106: { arabic: "قريش", english: "Quraysh" },
            107: { arabic: "الماعون", english: "Al-Ma'un" },
            108: { arabic: "الكوثر", english: "Al-Kawthar" },
            109: { arabic: "الكافرون", english: "Al-Kafirun" },
            110: { arabic: "النصر", english: "An-Nasr" },
            111: { arabic: "المسد", english: "Al-Masad" },
            112: { arabic: "الإخلاص", english: "Al-Ikhlas" },
            113: { arabic: "الفلق", english: "Al-Falaq" },
            114: { arabic: "الناس", english: "An-Nas" }
        };

        // XSS Protection: Escape HTML in user content
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Safe DOM creation helper
        function createEl(tag, className, textContent) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (textContent) el.textContent = textContent;
            return el;
        }

        async function loadQuranData() {
            try {
                const response = await fetch('/data/quran.json');
                if (response.ok) {
                    const json = await response.json();
                    quranData = {};
                    for (const surahNum in json) {
                        if (Array.isArray(json[surahNum])) {
                            quranData[surahNum] = { verses: json[surahNum] };
                        }
                    }
                }
            } catch (e) { /* Silently ignore - will use cached text */ }
        }

        function loadBookmarks() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                const data = JSON.parse(localStorage.getItem('quran_data_' + user.sub) || '{}');
                bookmarkedAyahs = data.bookmarks || [];
                ayahNotes = data.notes || {};
                ayahTimestamps = data.timestamps || {};
            }
        }

        function saveBookmarks() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                const userKey = 'quran_data_' + user.sub;
                const data = JSON.parse(localStorage.getItem(userKey) || '{}');
                data.bookmarks = bookmarkedAyahs;
                data.notes = ayahNotes;
                data.timestamps = ayahTimestamps;
                data.lastSyncTime = Date.now();
                localStorage.setItem(userKey, JSON.stringify(data));
            }
        }

        function getCachedText(key) {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                const data = JSON.parse(localStorage.getItem('quran_data_' + user.sub) || '{}');
                return data.cachedText?.[key] || null;
            }
            return null;
        }

        function getAyahText(surah, ayah) {
            if (quranData && quranData[surah]) {
                const verse = quranData[surah].verses.find(v => v.verse === ayah);
                return verse?.text || null;
            }
            return null;
        }

        function formatTime(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            const hrs = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (mins < 1) return window.__t?.('bookmarks_time_now') || 'نها';
            if (mins < 60) return (window.__t?.('bookmarks_time_ago') || 'پێش') + ' ' + mins + ' ' + (window.__t?.('bookmarks_time_minutes') || 'خولەک');
            if (hrs < 24) return (window.__t?.('bookmarks_time_ago') || 'پێش') + ' ' + hrs + ' ' + (window.__t?.('bookmarks_time_hours') || 'کاتژمێر');
            if (days < 7) return (window.__t?.('bookmarks_time_ago') || 'پێش') + ' ' + days + ' ' + (window.__t?.('bookmarks_time_days') || 'ڕۆژ');
            return new Date(ts).toLocaleDateString('ku');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function renderBookmarks(search, sort) {
            search = search || '';
            sort = sort || 'newest';
            const container = document.getElementById('bookmarksContainer');

            if (bookmarkedAyahs.length === 0) {
                document.getElementById('statsGrid').style.display = 'none';
                document.getElementById('controlsBar').style.display = 'none';

                // Create empty state using DOM API
                const emptyState = createEl('div', 'empty-state');

                const emptyIcon = createEl('div', 'empty-icon');
                emptyIcon.innerHTML = '<i class="far fa-bookmark"></i>';
                emptyState.appendChild(emptyIcon);

                const emptyTitle = createEl('div', 'empty-title', 'هێشتا تە چ ئایەت نیشانە نەکریە');
                emptyTitle.dataset.t = 'bookmarks_empty_title';
                emptyState.appendChild(emptyTitle);

                const emptyDesc = createEl('div', 'empty-desc');
                emptyDesc.dataset.t = 'bookmarks_empty_desc';
                emptyDesc.innerHTML = 'دەما تو ئایەتەکێ نیشانە دکەی، ل ڤێرێ دێ بینی.<br>تو دشێی تێبینی و بیرهاتنێن خۆ ژی تۆمار بکەی.';
                emptyState.appendChild(emptyDesc);

                const btn = createEl('a', 'back-btn');
                btn.href = '/quran';
                btn.innerHTML = '<i class="fas fa-book-open"></i> <span data-t="bookmarks_start_reading">دەستپێبکە ب خواندنێ</span>';
                emptyState.appendChild(btn);

                container.innerHTML = '';
                container.appendChild(emptyState);
                return;
            }

            // Show stats and controls
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('controlsBar').style.display = 'flex';

            // Update stats
            document.getElementById('totalBookmarks').textContent = bookmarkedAyahs.length;
            document.getElementById('totalNotes').textContent = Object.keys(ayahNotes).filter(k => ayahNotes[k]).length;
            document.getElementById('totalSurahs').textContent = new Set(bookmarkedAyahs.map(k => k.split('-')[0])).size;

            // Filter
            let filtered = bookmarkedAyahs.filter(key => {
                if (!search) return true;
                const parts = key.split('-');
                const surah = parseInt(parts[0], 10);
                const info = surahNames[surah] || {};
                const note = ayahNotes[key] || '';
                const q = search.toLowerCase();
                return (info.english && info.english.toLowerCase().includes(q)) ||
                       (info.arabic && info.arabic.includes(search)) ||
                       String(surah).includes(search) ||
                       note.toLowerCase().includes(q);
            });

            // Sort
            filtered.sort((a, b) => {
                const tsA = ayahTimestamps[a] || 0;
                const tsB = ayahTimestamps[b] || 0;
                if (sort === 'newest') return tsB - tsA;
                if (sort === 'oldest') return tsA - tsB;
                if (sort === 'surah') {
                    const partsA = a.split('-');
                    const partsB = b.split('-');
                    const sA = parseInt(partsA[0], 10);
                    const aA = parseInt(partsA[1], 10);
                    const sB = parseInt(partsB[0], 10);
                    const aB = parseInt(partsB[1], 10);
                    return sA !== sB ? sA - sB : aA - aB;
                }
                return 0;
            });

            if (filtered.length === 0) {
                const noResults = createEl('div', 'empty-state');
                const icon = createEl('div', 'empty-icon');
                icon.innerHTML = '<i class="fas fa-search"></i>';
                noResults.appendChild(icon);
                const noResultsTitle = createEl('div', 'empty-title', 'چ ئەنجامەک نەهاتە دیتن');
                noResultsTitle.dataset.t = 'bookmarks_no_results';
                noResults.appendChild(noResultsTitle);
                container.innerHTML = '';
                container.appendChild(noResults);
                return;
            }

            const list = createEl('div', 'bookmarks-list');
            list.id = 'bookmarksList';

            filtered.forEach(key => {
                const parts = key.split('-');
                const surah = parseInt(parts[0], 10);
                const ayah = parseInt(parts[1], 10);
                const info = surahNames[surah] || { arabic: '', english: 'Surah ' + surah };
                const note = ayahNotes[key] || '';
                const ts = ayahTimestamps[key] || Date.now();
                const text = getCachedText(key) || getAyahText(surah, ayah) || '';

                const card = createEl('div', 'bookmark-card');
                card.dataset.key = key;

                // Header
                const header = createEl('div', 'bookmark-header');

                const infoDiv = createEl('div', 'bookmark-info');
                const surahDiv = createEl('div', 'bookmark-surah', surah + '. ' + info.english);
                const metaDiv = createEl('div', 'bookmark-meta');
                metaDiv.innerHTML = '<span>' + escapeHtml(info.arabic) + '</span><span>•</span><span data-t="bookmarks_ayah_label">ئایەتا</span> ' + ayah;
                infoDiv.appendChild(surahDiv);
                infoDiv.appendChild(metaDiv);

                const actions = createEl('div', 'bookmark-actions');

                const goBtn = createEl('button', 'action-btn');
                goBtn.title = 'بچە بۆ ئایەتێ';
                goBtn.setAttribute('data-t-title', 'bookmarks_go_to_ayah');
                goBtn.innerHTML = '<i class="fas fa-external-link-alt"></i>';
                goBtn.onclick = () => goToAyah(surah, ayah);

                const editBtn = createEl('button', 'action-btn');
                editBtn.title = 'تێبینی';
                editBtn.setAttribute('data-t-title', 'bookmarks_note_btn');
                editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                editBtn.onclick = () => toggleNote(key);

                const delBtn = createEl('button', 'action-btn delete');
                delBtn.title = 'سڕینەڤە';
                delBtn.setAttribute('data-t-title', 'bookmarks_delete_btn');
                delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                delBtn.onclick = () => removeBookmark(key);

                actions.appendChild(goBtn);
                actions.appendChild(editBtn);
                actions.appendChild(delBtn);

                header.appendChild(infoDiv);
                header.appendChild(actions);
                card.appendChild(header);

                // Ayah text
                const ayahEl = createEl('div', 'ayah-text');
                if (text) {
                    ayahEl.textContent = text;
                } else {
                    ayahEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                }
                card.appendChild(ayahEl);

                // Note (if exists)
                if (note) {
                    const noteDiv = createEl('div', 'ayah-note');
                    const noteLabel = createEl('div', 'note-label');
                    noteLabel.innerHTML = '<i class="fas fa-sticky-note"></i> <span data-t="bookmarks_note_label">تێبینی:</span>';
                    const noteText = createEl('div', 'note-text', note);
                    noteDiv.appendChild(noteLabel);
                    noteDiv.appendChild(noteText);
                    card.appendChild(noteDiv);
                }

                // Note editor
                const editor = createEl('div', 'note-editor');
                editor.id = 'note-editor-' + key;
                const textarea = createEl('textarea', 'note-input');
                textarea.id = 'note-input-' + key;
                textarea.placeholder = 'تێبینییا خۆ ل ڤێرێ بنڤیسە...';
                textarea.setAttribute('data-t-placeholder', 'bookmarks_note_placeholder');
                textarea.value = note;
                const saveBtn = createEl('button', 'save-note-btn');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> <span data-t="bookmarks_save_note">پاشکەفتکرن</span>';
                saveBtn.onclick = () => saveNote(key);
                editor.appendChild(textarea);
                editor.appendChild(saveBtn);
                card.appendChild(editor);

                // Timestamp
                const tsDiv = createEl('div', 'timestamp');
                tsDiv.innerHTML = '<i class="far fa-clock"></i> <span>' + formatTime(ts) + '</span>';
                card.appendChild(tsDiv);

                list.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(list);
        }

        function goToAyah(surah, ayah) {
            window.location.href = '/quran?surah=' + surah + '&ayah=' + ayah;
        }

        function toggleNote(key) {
            const editor = document.getElementById('note-editor-' + key);
            if (editor) editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
        }

        function saveNote(key) {
            const input = document.getElementById('note-input-' + key);
            if (input) {
                ayahNotes[key] = input.value;
                saveBookmarks();
                renderBookmarks(document.getElementById('searchInput').value, document.getElementById('sortSelect').value);
                showToast(window.__t?.('bookmarks_toast_note_saved') || 'تێبینییا پاشکەفتکری');
            }
        }

        function removeBookmark(key) {
            if (confirm(window.__t?.('bookmarks_confirm_delete') || 'ئایا دڵنیای ژ سڕینەڤەیا ڤێ نیشانەیێ؟')) {
                const card = document.querySelector('.bookmark-card[data-key="' + key + '"]');
                if (card) {
                    card.classList.add('removing');
                }

                setTimeout(() => {
                    bookmarkedAyahs = bookmarkedAyahs.filter(b => b !== key);
                    delete ayahNotes[key];
                    delete ayahTimestamps[key];
                    saveBookmarks();
                    renderBookmarks(document.getElementById('searchInput').value, document.getElementById('sortSelect').value);
                    showToast(window.__t?.('bookmarks_toast_removed') || 'نیشانە هاتە سڕینەڤە');
                }, 300);
            }
        }

        // Init
        window.addEventListener('load', async () => {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login';
                return;
            }

            loadBookmarks();
            renderBookmarks();
            loadQuranData().then(() => renderBookmarks());

            document.getElementById('searchInput').addEventListener('input', e => {
                renderBookmarks(e.target.value, document.getElementById('sortSelect').value);
            });

            document.getElementById('sortSelect').addEventListener('change', e => {
                renderBookmarks(document.getElementById('searchInput').value, e.target.value);
            });
        });
    </script>
</body>
</html>

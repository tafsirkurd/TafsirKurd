name: Send Scheduled Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduler
        run: |
          RESPONSE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST https://tafsirkurd.com/admin-notifications-api \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"action":"process_scheduled"}')
          cat /tmp/resp.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Scheduler returned HTTP $RESPONSE"
            exit 1
          fi
          PROCESSED=$(cat /tmp/resp.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed',0))")
          echo "Processed: $PROCESSED notifications"

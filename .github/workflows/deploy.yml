name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run smoke tests
        run: npm test

      - name: Deploy to Cloudflare Pages
        # Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets.
        # To add: Settings → Secrets → Actions → New repository secret
        # Get API token: dash.cloudflare.com/profile/api-tokens → "Edit Cloudflare Workers" template
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy src --project-name tafsirkurd --commit-dirty=true

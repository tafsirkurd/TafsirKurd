name: Refresh Prayer Data

on:
  schedule:
    # 1st of every month at 06:00 UTC — re-fetches current year (catches upstream corrections)
    - cron: '0 6 1 * *'
    # Dec 1 also fetches next year (handled in Resolve year step by NEXT_YEAR flag)

  # Manual: run from GitHub Actions tab, pick year + optional city
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to fetch (e.g. 2028)'
        required: true
        default: ''
      city:
        description: 'City to refresh (leave blank for all 20 cities)'
        required: false
        default: ''
      month:
        description: 'Month to refresh (1-12, only used when city is set)'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve year(s)
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            # Manual run — use provided year
            echo "years=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%m)" = "12" ]; then
            # Dec 1 scheduled run — refresh current year AND fetch next year
            echo "years=$(date +%Y) $(( $(date +%Y) + 1 ))" >> $GITHUB_OUTPUT
          else
            # Every other month — refresh current year only
            echo "years=$(date +%Y)" >> $GITHUB_OUTPUT
          fi

      - name: Fetch prayer data
        run: |
          CITY="${{ github.event.inputs.city }}"
          MONTH="${{ github.event.inputs.month }}"

          for YEAR in ${{ steps.vars.outputs.years }}; do
            if [ -n "$CITY" ] && [ -n "$MONTH" ]; then
              echo "Fetching $YEAR $CITY month $MONTH (correction mode)"
              node scripts/fetch-prayer-year.js $YEAR $CITY $MONTH
            elif [ -n "$CITY" ]; then
              echo "Fetching $YEAR $CITY all months"
              node scripts/fetch-prayer-year.js $YEAR $CITY
            else
              echo "Fetching $YEAR all cities"
              node scripts/fetch-prayer-year.js $YEAR
            fi
          done

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/prayer-data/
          if git diff --cached --quiet; then
            echo "No changes — prayer data already up to date."
          else
            YEARS="${{ steps.vars.outputs.years }}"
            CITY="${{ github.event.inputs.city }}"
            MONTH="${{ github.event.inputs.month }}"
            if [ -n "$CITY" ] && [ -n "$MONTH" ]; then
              MSG="data(prayer): refresh $YEARS $CITY/$MONTH from upstream"
            elif [ -n "$CITY" ]; then
              MSG="data(prayer): refresh $YEARS $CITY from upstream"
            else
              MSG="data(prayer): refresh $YEARS all cities from upstream"
            fi
            git commit -m "$MSG"
            git push origin main
            echo "Pushed updated prayer data."
          fi

[build]
  publish = "src"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"

[functions.scheduled-daily-reminders]
  schedule = "0 17 * * *"

# Security headers - UPDATED with YouTube support for admin panel
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://ssl.google-analytics.com https://static.cloudflareinsights.com https://challenges.cloudflare.com https://www.youtube.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://accounts.google.com https://www.googleapis.com https://oauth2.googleapis.com https://lh3.googleusercontent.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://static.cloudflareinsights.com https://images.unsplash.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://www.youtube.com https://youtube.com https://i.ytimg.com https://img.youtube.com; frame-src 'self' https://accounts.google.com https://www.instagram.com https://challenges.cloudflare.com https://www.youtube.com https://youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"
    Cache-Control = "public, max-age=300"

# Font caching
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/fontawesome/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Data files caching
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/json; charset=utf-8"

# Image caching
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,webp,svg,ico}"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# No cache for functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# API redirect
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Asset redirects
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200

# Clean URLs - redirect .html to extensionless
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# Specific page redirects (extensionless to .html)
[[redirects]]

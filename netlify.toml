[build]
  publish = "src"  # 👈 CHANGE THIS from "." to "src"
  functions = "netlify/functions"

# Scheduled Functions - Weekly Quran Email Reminders
[functions]
  # Send weekly email reminders every Friday at 8 PM Iraq time (17:00 UTC)
  # Iraq is UTC+3, so 8 PM Iraq time = 17:00 UTC = 5 PM UTC
  # Cron format: minute hour day-of-month month day-of-week
  # 0 17 * * 5 = Every Friday at 5 PM UTC (8 PM Iraq time)
  "scheduled-daily-reminders" = {schedule = "0 17 * * 5"}  # Every Friday at 5 PM UTC = 8 PM Iraq time

[[headers]]
  for = "/*.html"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options = "DENY"
    # Enable XSS protection
    X-XSS-Protection = "1; mode=block"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # HSTS - Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Permissions Policy - Restrict browser features
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # Content Security Policy - Prevent XSS and injection attacks (self-hosted fonts!)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdn.jsdelivr.net https://unpkg.com https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://ssl.google-analytics.com https://static.cloudflareinsights.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://accounts.google.com https://www.googleapis.com https://oauth2.googleapis.com https://lh3.googleusercontent.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://static.cloudflareinsights.com https://images.unsplash.com https://cdn.jsdelivr.net https://unpkg.com https://challenges.cloudflare.com; frame-src 'self' https://accounts.google.com https://www.instagram.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Font files - Aggressive caching for self-hosted fonts
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Font Awesome - Aggressive caching
[[headers]]
  for = "/assets/fontawesome/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# JSON data files - Aggressive caching with compression
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/*.{png,jpg,jpeg,gif,webp,svg,ico}"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    X-Robots-Tag = "all"

# Social card images - must be accessible to social media bots
[[headers]]
  for = "/assets/images/social-card.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    X-Robots-Tag = "all"

[[headers]]
  for = "/assets/images/quran-social-card.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    X-Robots-Tag = "all"

# Sitemap - Proper content type and caching for search engines
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Asset passthrough
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200

# Serve clean URLs by looking for .html files
[[redirects]]
  from = "/Quran"
  to = "/Quran.html"
  status = 200


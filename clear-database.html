<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Database - TafsirKurd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn.danger:hover {
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>پاککرنا داتایێ دێتابێیسێ</h1>
        <p>ئەڤ رووپەلە ئێوە دهێلێ کو هەمو داتایێن خو یێن د دێتابێیسێ دا پاک بکن، ژ وان نیشانەکری (بووکمارکس).</p>

        <button class="btn" onclick="clearBookmarksOnly()">
            تەنێ نیشانەکری پاک بکە
        </button>

        <button class="btn danger" onclick="clearAllData()">
            هەمو داتایان پاک بکە
        </button>

        <div id="status" class="status"></div>

        <a href="/bookmarks" class="back-link">گەڕان بۆ نیشانەکری</a>
    </div>

    <script>
        async function clearBookmarksOnly() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                showStatus('error', 'تو نەچویتە ژوورێڤە!');
                return;
            }

            const confirmed = confirm('یا دلنیای کو دڤێت هەمو نیشانەکری پاک بکەی؟');
            if (!confirmed) return;

            try {
                // Get current data
                const userKey = 'quran_data_' + user.sub;
                const saved = localStorage.getItem(userKey);
                const data = JSON.parse(saved || '{}');

                // Clear bookmarks
                data.bookmarks = [];
                data.notes = {};
                data.timestamps = {};

                // Save to localStorage
                localStorage.setItem(userKey, JSON.stringify(data));

                // Sync to database
                const response = await fetch('/.netlify/functions/user-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.sub,
                        action: 'save',
                        data: data
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('success', '✅ هەمو نیشانەکری هاتنە پاککرن!');
                } else {
                    showStatus('error', '❌ هەڵە: ' + result.error);
                }
            } catch (error) {
                showStatus('error', '❌ هەڵە: ' + error.message);
            }
        }

        async function clearAllData() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                showStatus('error', 'تو نەچویتە ژوورێڤە!');
                return;
            }

            const confirmed = confirm('⚠️ ئاگەهداری: ئەڤە ئێوە دهێلێ هەمو داتایێن خو پاک بکن ژ وان: نیشانەکری، ستریک، پێشڤەچوون، و هەمی تشتان. یا دلنیای؟');
            if (!confirmed) return;

            const doubleConfirm = confirm('یا بتەواوی دلنیای؟ ئەڤ کار ناکارە ڤەگەرینە!');
            if (!doubleConfirm) return;

            try {
                const userKey = 'quran_data_' + user.sub;

                // Clear localStorage
                localStorage.removeItem(userKey);

                // Clear database
                const response = await fetch('/.netlify/functions/user-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.sub,
                        action: 'delete'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('success', '✅ هەمو داتایان هاتنە پاککرن! رووپەلە نوێ بکەرەڤە بو دەستپێکرنا نوێ.');
                    setTimeout(() => {
                        window.location.href = '/quran';
                    }, 3000);
                } else {
                    showStatus('error', '❌ هەڵە: ' + result.error);
                }
            } catch (error) {
                showStatus('error', '❌ هەڵە: ' + error.message);
            }
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
        }
    </script>
</body>
</html>

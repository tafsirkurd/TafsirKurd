name = "tafsirkurd"
compatibility_date = "2024-01-01"
pages_build_output_dir = "src"

# Node.js compatibility for npm packages
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "ADMIN_KV"
id = "398995d1041042b498189d180b883513"

[[r2_buckets]]
binding = "BOOKS_BUCKET"
bucket_name = "tafsirkurd-books"

[env.production]
name = "tafsirkurd"
compatibility_flags = ["nodejs_compat"]

[[env.production.kv_namespaces]]
binding = "ADMIN_KV"
id = "398995d1041042b498189d180b883513"

[[env.production.r2_buckets]]
binding = "BOOKS_BUCKET"
bucket_name = "tafsirkurd-books"

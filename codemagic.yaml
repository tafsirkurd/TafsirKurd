workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Full clean
        script: |
          rm -rf node_modules package-lock.json
          rm -rf ios/App/Pods ios/App/Podfile.lock ios/App/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Force exact Capacitor core versions
        script: |
          npm install \
            @capacitor/core@8.0.1 \
            @capacitor/ios@8.0.1 \
            @capacitor/cli@8.0.1 \
            --save --save-exact --legacy-peer-deps

      - name: Verify Capacitor versions
        script: |
          node -e "
          const p=require('./package.json').dependencies;
          console.log('Capacitor versions:');
          Object.keys(p).filter(x=>x.includes('capacitor')).forEach(k=>{
            console.log(k, p[k]);
          });
          "
          # Fail if any 8.2.x is present
          if grep -r '"8\.2\.' package.json | grep capacitor; then
            echo "ERROR: 8.2.x capacitor package found — aborting"
            exit 1
          fi
          echo "All @capacitor/* versions OK (8.0.x only)"

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Verify Package.swift
        script: |
          SPMVER=$(grep 'capacitor-swift-pm' ios/App/CapApp-SPM/Package.swift | grep -o '"8\.[^"]*"')
          echo "capacitor-swift-pm version in Package.swift: $SPMVER"
          if [[ "$SPMVER" != '"8.0.1"' ]]; then
            echo "ERROR: capacitor-swift-pm is $SPMVER, expected \"8.0.1\""
            exit 1
          fi
          echo "Package.swift OK — capacitor-swift-pm exact 8.0.1 confirmed"


      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Decode provisioning profile (printf avoids trailing newline that corrupts base64)
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          echo "Profile file size:"
          wc -c /tmp/profile.mobileprovision

          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist

          echo "Reading profile values..."

          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist 2>/dev/null)
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist 2>/dev/null)
          TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist 2>/dev/null)
          APPID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null)
          SIGNIN=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.applesignin" /tmp/profile.plist 2>/dev/null)

          echo "Profile name: $NAME"
          echo "UUID: $UUID"
          echo "Team: $TEAM"
          echo "App ID: $APPID"
          echo "Sign in with Apple: $SIGNIN"

          if [ -z "$UUID" ]; then
            echo "ERROR: Provisioning profile UUID is empty. Profile is invalid or base64 is broken."
            exit 1
          fi

          # Install profile with UUID filename (required by Xcode)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed: $UUID.mobileprovision"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

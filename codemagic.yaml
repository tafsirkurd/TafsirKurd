workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Pin capacitor-swift-pm to 8.0.0 for plugin compatibility
        script: |
          # @capacitor/ios@8.2.0 generates Package.swift pinned to capacitor-swift-pm@8.2.0.
          # But plugin packages (share, local-notifications, etc.) at 8.0.x were written for
          # the 8.0.x API (call.reject, optional getString, color(fromHex:), JSArray=[Any]).
          # Pinning back to 8.0.0 makes all original plugin Swift code compile without patches.
          cat > /tmp/patch_pkg.py << 'PYEOF'
          f = 'ios/App/CapApp-SPM/Package.swift'
          t = open(f).read()
          t = t.replace('exact: "8.2.0"', 'exact: "8.0.0"')
          open(f, 'w').write(t)
          print('Package.swift patched to capacitor-swift-pm 8.0.0')
          print(open(f).read())
          PYEOF
          python3 /tmp/patch_pkg.py
          find ios -name "Package.resolved" -delete 2>/dev/null || true
          echo "Package.resolved cleared"

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Install provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || python3 -c "import plistlib,sys; d=plistlib.loads(open('/tmp/profile.mobileprovision','rb').read()); print(d['UUID'])" 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile UUID: $UUID"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

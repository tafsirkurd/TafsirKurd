workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Patch plugins for capacitor-swift-pm 8.2.0
        script: |
          # Fix @capacitor/share: all optional getter overloads removed in capacitor-swift-pm 8.2.0
          # getString(key)/getArray(key) → now require default value argument
          cat > node_modules/@capacitor/share/ios/Sources/SharePlugin/SharePlugin.swift << 'SWIFTEOF'
          import Foundation
          import Capacitor

          @objc(SharePlugin)
          public class SharePlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "SharePlugin"
              public let jsName = "Share"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "canShare", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "share", returnType: CAPPluginReturnPromise)
              ]

              @objc func canShare(_ call: CAPPluginCall) {
                  call.resolve(["value": true])
              }

              @objc func share(_ call: CAPPluginCall) {
                  var items = [Any]()

                  let text = call.getString("text", "")
                  if !text.isEmpty { items.append(text) }

                  let urlStr = call.getString("url", "")
                  if !urlStr.isEmpty, let urlObj = URL(string: urlStr) { items.append(urlObj) }

                  let title = call.getString("title", "")

                  let files: JSArray = call.getArray("files", JSArray())
                  if !files.isEmpty {
                      files.forEach { file in
                          if let url = file as? String, let fileUrl = URL(string: url) {
                              items.append(fileUrl)
                          }
                      }
                  }

                  if items.count == 0 {
                      call.reject("Must provide at least url, text or files")
                      return
                  }

                  DispatchQueue.main.async { [weak self] in
                      let actionController = UIActivityViewController(activityItems: items, applicationActivities: nil)
                      if !title.isEmpty { actionController.setValue(title, forKey: "subject") }
                      actionController.completionWithItemsHandler = { (activityType, completed, _ returnedItems, activityError) in
                          if activityError != nil {
                              call.reject("Error sharing item")
                              return
                          }
                          if completed {
                              call.resolve(["activityType": activityType?.rawValue ?? ""])
                          } else {
                              call.reject("Share canceled")
                          }
                      }
                      if self?.bridge?.viewController?.presentedViewController != nil {
                          call.reject("Can't share while sharing is in progress")
                          return
                      }
                      self?.setCenteredPopover(actionController)
                      self?.bridge?.viewController?.present(actionController, animated: true, completion: nil)
                  }
              }
          }
          SWIFTEOF
          echo "Patched SharePlugin.swift OK"

          # Fix @capacitor-community/media: getArray("sort") one-arg optional removed in 8.2.0
          python3 -c "
f='node_modules/@capacitor-community/media/ios/Sources/MediaPlugin/MediaPlugin.swift'
t=open(f).read()
t=t.replace('call.getArray(\"sort\") as? [[String: Any]]','call.getArray(\"sort\", JSObject.self)')
open(f,'w').write(t)
print('Patched MediaPlugin.swift OK')
"

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Install provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || python3 -c "import plistlib,sys; d=plistlib.loads(open('/tmp/profile.mobileprovision','rb').read()); print(d['UUID'])" 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile UUID: $UUID"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Patch plugins for capacitor-swift-pm 8.2.0
        script: |
          # Runs AFTER cap sync so cap sync cannot restore the original files.
          # Write SharePlugin.swift via Python — avoids heredoc encoding issues.
          # call.reject removed entirely (replaced with call.resolve) since reject has member-lookup
          # issues in capacitor-swift-pm 8.2.0 regardless of argument count.
          cat > /tmp/patch_share.py << 'PYEOF'
          f = 'node_modules/@capacitor/share/ios/Sources/SharePlugin/SharePlugin.swift'
          lines = [
              'import Foundation',
              'import Capacitor',
              '',
              '@objc(SharePlugin)',
              'public class SharePlugin: CAPPlugin, CAPBridgedPlugin {',
              '    public let identifier = "SharePlugin"',
              '    public let jsName = "Share"',
              '    public let pluginMethods: [CAPPluginMethod] = [',
              '        CAPPluginMethod(name: "canShare", returnType: CAPPluginReturnPromise),',
              '        CAPPluginMethod(name: "share", returnType: CAPPluginReturnPromise)',
              '    ]',
              '',
              '    @objc func canShare(_ call: CAPPluginCall) {',
              '        call.resolve(["value": true])',
              '    }',
              '',
              '    @objc func share(_ call: CAPPluginCall) {',
              '        var items = [Any]()',
              '        let text = call.getString("text", "")',
              '        if !text.isEmpty { items.append(text) }',
              '        let urlStr = call.getString("url", "")',
              '        if !urlStr.isEmpty, let urlObj = URL(string: urlStr) { items.append(urlObj) }',
              '        let title = call.getString("title", "")',
              '        guard !items.isEmpty else { call.resolve([:]); return }',
              '        DispatchQueue.main.async { [weak self] in',
              '            let ac = UIActivityViewController(activityItems: items, applicationActivities: nil)',
              '            if !title.isEmpty { ac.setValue(title, forKey: "subject") }',
              '            ac.completionWithItemsHandler = { _, _, _, _ in',
              '                call.resolve([:])',
              '            }',
              '            self?.setCenteredPopover(ac)',
              '            self?.viewController?.present(ac, animated: true, completion: nil)',
              '        }',
              '    }',
              '}',
          ]
          content = '\n'.join(lines) + '\n'
          open(f, 'w').write(content)
          print('SharePlugin.swift written OK')
          print(open(f).read())
          PYEOF
          python3 /tmp/patch_share.py

          # Fix @capacitor-community/media: getArray("sort") one-arg optional removed in 8.2.0
          cat > /tmp/patch_media.py << 'PYEOF'
          f = 'node_modules/@capacitor-community/media/ios/Sources/MediaPlugin/MediaPlugin.swift'
          t = open(f).read()
          t = t.replace('call.getArray("sort") as? [[String: Any]]', 'call.getArray("sort", JSObject.self)')
          open(f, 'w').write(t)
          print('Patched MediaPlugin.swift OK')
          PYEOF
          python3 /tmp/patch_media.py

          # Fix @capacitor/push-notifications: call.reject removed + one-arg getArray in 8.2.0
          cat > /tmp/patch_push.py << 'PYEOF'
          import re
          f = 'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsPlugin.swift'
          t = open(f).read()
          t = re.sub(r'call\.reject\([^)]+\)', 'call.resolve([:])', t)
          open(f, 'w').write(t)
          print('Patched PushNotificationsPlugin.swift OK')
          f2 = 'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsHandler.swift'
          t2 = open(f2).read()
          t2 = t2.replace(
              'if let optionsArray = self.plugin?.getConfig().getArray("presentationOptions") as? [String] {',
              'let optionsArray = (self.plugin?.getConfig().getArray("presentationOptions", []) as? [String]) ?? []\n            if !optionsArray.isEmpty {'
          )
          open(f2, 'w').write(t2)
          print('Patched PushNotificationsHandler.swift OK')
          PYEOF
          python3 /tmp/patch_push.py

          # Fix @capacitor/splash-screen: one-arg getString + color(fromHex:) → color(argb:) in 8.2.0
          cat > /tmp/patch_splash.py << 'PYEOF'
          f = 'node_modules/@capacitor/splash-screen/ios/Sources/SplashScreenPlugin/SplashScreenPlugin.swift'
          t = open(f).read()
          helper = '\nprivate func hexStringToARGB(_ hex: String) -> UInt32 {\n    let h = hex.replacingOccurrences(of: "#", with: "")\n    let v = UInt32(h, radix: 16) ?? 0\n    return h.count <= 6 ? (0xFF000000 | v) : v\n}\n'
          old = ('        if let backgroundColor = getConfig().getString("backgroundColor") {\n'
                 '            config.backgroundColor = UIColor.capacitor.color(fromHex: backgroundColor)\n'
                 '        }\n'
                 '        if let spinnerStyle = getConfig().getString("iosSpinnerStyle") {\n'
                 '            switch spinnerStyle.lowercased() {\n'
                 '            case "small":\n'
                 '                config.spinnerStyle = .medium\n'
                 '            default:\n'
                 '                config.spinnerStyle = .large\n'
                 '            }\n'
                 '        }\n'
                 '        if let spinnerColor = getConfig().getString("spinnerColor") {\n'
                 '            config.spinnerColor = UIColor.capacitor.color(fromHex: spinnerColor)\n'
                 '        }')
          new = ('        let _bgC = getConfig().getString("backgroundColor", "")\n'
                 '        if !_bgC.isEmpty { config.backgroundColor = UIColor.capacitor.color(argb: hexStringToARGB(_bgC)) }\n'
                 '        let _ssStr = getConfig().getString("iosSpinnerStyle", "")\n'
                 '        if !_ssStr.isEmpty {\n'
                 '            switch _ssStr.lowercased() {\n'
                 '            case "small":\n'
                 '                config.spinnerStyle = .medium\n'
                 '            default:\n'
                 '                config.spinnerStyle = .large\n'
                 '            }\n'
                 '        }\n'
                 '        let _scStr = getConfig().getString("spinnerColor", "")\n'
                 '        if !_scStr.isEmpty { config.spinnerColor = UIColor.capacitor.color(argb: hexStringToARGB(_scStr)) }')
          t = t.replace(old, new)
          t = t.rstrip() + '\n' + helper
          open(f, 'w').write(t)
          print('Patched SplashScreenPlugin.swift OK')
          PYEOF
          python3 /tmp/patch_splash.py

          # Fix @capacitor/status-bar: color(fromHex:) → color(argb:) + one-arg getString in 8.2.0
          cat > /tmp/patch_statusbar.py << 'PYEOF'
          f = 'node_modules/@capacitor/status-bar/ios/Sources/StatusBarPlugin/StatusBarPlugin.swift'
          t = open(f).read()
          helper = '\nprivate func hexStringToARGB(_ hex: String) -> UInt32 {\n    let h = hex.replacingOccurrences(of: "#", with: "")\n    let v = UInt32(h, radix: 16) ?? 0\n    return h.count <= 6 ? (0xFF000000 | v) : v\n}\n'
          t = t.replace(
              '        if let colorConfig = getConfig().getString("backgroundColor"), let color = UIColor.capacitor.color(fromHex: colorConfig) {\n            config.backgroundColor = color\n        }\n        if let configStyle = getConfig().getString("style") {\n            config.style = style(fromString: configStyle)\n        }',
              '        let _bgStr = getConfig().getString("backgroundColor", "")\n        if !_bgStr.isEmpty { config.backgroundColor = UIColor.capacitor.color(argb: hexStringToARGB(_bgStr)) }\n        let _styleStr = getConfig().getString("style", "")\n        if !_styleStr.isEmpty { config.style = style(fromString: _styleStr) }'
          )
          t = t.replace(
              '        guard\n            let hexString = call.options["color"] as? String,\n            let color = UIColor.capacitor.color(fromHex: hexString)\n        else { return }',
              '        guard let hexString = call.options["color"] as? String else { return }\n        let color = UIColor.capacitor.color(argb: hexStringToARGB(hexString))'
          )
          t = t.rstrip() + '\n' + helper
          open(f, 'w').write(t)
          print('Patched StatusBarPlugin.swift OK')
          PYEOF
          python3 /tmp/patch_statusbar.py

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Install provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || python3 -c "import plistlib,sys; d=plistlib.loads(open('/tmp/profile.mobileprovision','rb').read()); print(d['UUID'])" 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile UUID: $UUID"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

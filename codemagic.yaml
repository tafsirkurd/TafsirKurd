workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - app_store
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Set up keychain and signing
        script: |
          keychain initialize
          echo "=== Existing IOS_DISTRIBUTION certificates ==="
          app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null || true
          echo "=== Existing APPLE_DISTRIBUTION certificates ==="
          app-store-connect certificates list --type APPLE_DISTRIBUTION --json 2>/dev/null || true
          echo "=== Revoking old APPLE_DISTRIBUTION certificates ==="
          app-store-connect certificates list --type APPLE_DISTRIBUTION --json 2>/dev/null | \
            python3 -c "import sys,json; data=json.load(sys.stdin); [print(c['id']) for c in (data if isinstance(data,list) else [])]" 2>/dev/null | \
            xargs -I{} app-store-connect certificates revoke {} 2>/dev/null || true
          echo "=== Fetching fresh signing files ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

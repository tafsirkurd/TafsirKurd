workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Patch plugin Swift files for capacitor-swift-pm 8.2.0 API changes
        script: |
          # ── SharePlugin: full rewrite ──────────────────────────────────────────
          cat > node_modules/@capacitor/share/ios/Sources/SharePlugin/SharePlugin.swift << 'SHAREEOF'
          import Foundation
          import Capacitor
          @objc(SharePlugin)
          public class SharePlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "SharePlugin"
              public let jsName = "Share"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "canShare", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "share", returnType: CAPPluginReturnPromise)
              ]
              @objc func canShare(_ call: CAPPluginCall) { call.resolve(["value": true]) }
              @objc func share(_ call: CAPPluginCall) {
                  var items = [Any]()
                  let text = call.getString("text", "")
                  if !text.isEmpty { items.append(text) }
                  let urlStr = call.getString("url", "")
                  if !urlStr.isEmpty, let urlObj = URL(string: urlStr) { items.append(urlObj) }
                  let title = call.getString("title", "")
                  guard !items.isEmpty else { call.resolve([:]); return }
                  DispatchQueue.main.async { [weak self] in
                      let ac = UIActivityViewController(activityItems: items, applicationActivities: nil)
                      if !title.isEmpty { ac.setValue(title, forKey: "subject") }
                      ac.completionWithItemsHandler = { _, _, _, _ in call.resolve([:]) }
                      self?.setCenteredPopover(ac)
                      UIApplication.shared.keyWindow?.rootViewController?.present(ac, animated: true)
                  }
              }
          }
          SHAREEOF
          echo "SharePlugin rewritten"

          # ── StatusBarPlugin: full rewrite (PluginConfig.getString removed in 8.2.0) ──
          cat > node_modules/@capacitor/status-bar/ios/Sources/StatusBarPlugin/StatusBarPlugin.swift << 'STATUSBAREOF'
          import Foundation
          import Capacitor
          @objc(StatusBarPlugin)
          public class StatusBarPlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "StatusBarPlugin"
              public let jsName = "StatusBar"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "setStyle", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "setBackgroundColor", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "show", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "hide", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "getInfo", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "setOverlaysWebView", returnType: CAPPluginReturnPromise)
              ]
              private var statusBar: StatusBar?
              private let statusBarVisibilityChanged = "statusBarVisibilityChanged"
              private let statusBarOverlayChanged = "statusBarOverlayChanged"
              override public func load() {
                  guard let bridge = bridge else { return }
                  statusBar = StatusBar(bridge: bridge, config: statusBarConfig())
              }
              private func statusBarConfig() -> StatusBarConfig {
                  var config = StatusBarConfig()
                  config.overlaysWebView = getConfig().getBoolean("overlaysWebView", config.overlaysWebView)
                  let cfgJSON = getConfig().getConfigJSON()
                  if let colorStr = cfgJSON["backgroundColor"] as? String, !colorStr.isEmpty {
                      config.backgroundColor = UIColor.capacitor.color(argb: hexStringToARGB(colorStr))
                  }
                  if let styleStr = cfgJSON["style"] as? String, !styleStr.isEmpty {
                      config.style = style(fromString: styleStr)
                  }
                  return config
              }
              private func style(fromString str: String) -> UIStatusBarStyle {
                  switch str.lowercased() {
                  case "dark", "lightcontent": return .lightContent
                  case "light", "darkcontent": return .darkContent
                  default: return .default
                  }
              }
              @objc func setStyle(_ call: CAPPluginCall) {
                  let styleStr = call.getString("style","")
                  if !styleStr.isEmpty { statusBar?.setStyle(style(fromString: styleStr)) }
                  call.resolve([:])
              }
              @objc func setBackgroundColor(_ call: CAPPluginCall) {
                  guard let hexString = call.options["color"] as? String else { return }
                  let color = UIColor.capacitor.color(argb: hexStringToARGB(hexString))
                  DispatchQueue.main.async { [weak self] in
                      self?.statusBar?.setBackgroundColor(color)
                  }
                  call.resolve()
              }
              @objc func hide(_ call: CAPPluginCall) {
                  let animation = call.getString("animation","FADE")
                  DispatchQueue.main.async { [weak self] in
                      self?.statusBar?.hide(animation: animation)
                      guard let info = self?.statusBar?.getInfo(), let dict = self?.toDict(info),
                            let event = self?.statusBarVisibilityChanged else { return }
                      self?.notifyListeners(event, data: dict)
                  }
                  call.resolve()
              }
              @objc func show(_ call: CAPPluginCall) {
                  let animation = call.getString("animation","FADE")
                  DispatchQueue.main.async { [weak self] in
                      self?.statusBar?.show(animation: animation)
                      guard let info = self?.statusBar?.getInfo(), let dict = self?.toDict(info),
                            let event = self?.statusBarVisibilityChanged else { return }
                      self?.notifyListeners(event, data: dict)
                  }
                  call.resolve()
              }
              @objc func getInfo(_ call: CAPPluginCall) {
                  DispatchQueue.main.async { [weak self] in
                      guard let info = self?.statusBar?.getInfo(), let dict = self?.toDict(info) else { return }
                      call.resolve(dict)
                  }
              }
              @objc func setOverlaysWebView(_ call: CAPPluginCall) {
                  guard let overlay = call.options["overlay"] as? Bool else { return }
                  DispatchQueue.main.async { [weak self] in
                      self?.statusBar?.setOverlaysWebView(overlay)
                      guard let info = self?.statusBar?.getInfo(), let dict = self?.toDict(info),
                            let event = self?.statusBarOverlayChanged else { return }
                      self?.notifyListeners(event, data: dict)
                  }
                  call.resolve()
              }
              private func toDict(_ info: StatusBarInfo) -> [String: Any] {
                  return ["visible": info.visible!, "style": info.style!, "color": info.color!,
                          "overlays": info.overlays!, "height": info.height!]
              }
              private func hexStringToARGB(_ hex: String) -> UInt32 {
                  var s = hex.trimmingCharacters(in: .whitespacesAndNewlines)
                  if s.hasPrefix("#") { s = String(s.dropFirst()) }
                  if s.count == 6 { s = "FF" + s }
                  var val: UInt64 = 0
                  Scanner(string: s).scanHexInt64(&val)
                  return UInt32(val)
              }
          }
          STATUSBAREOF
          echo "StatusBarPlugin rewritten"

          # ── SplashScreenPlugin: full rewrite (PluginConfig.getString removed in 8.2.0) ─
          cat > node_modules/@capacitor/splash-screen/ios/Sources/SplashScreenPlugin/SplashScreenPlugin.swift << 'SPLASHEOF'
          import Foundation
          import Capacitor
          @objc(SplashScreenPlugin)
          public class SplashScreenPlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "SplashScreenPlugin"
              public let jsName = "SplashScreen"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "show", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "hide", returnType: CAPPluginReturnPromise)
              ]
              private var splashScreen: SplashScreen?
              override public func load() {
                  if let view = bridge?.viewController?.view {
                      splashScreen = SplashScreen(parentView: view, config: splashScreenConfig())
                      splashScreen?.showOnLaunch()
                  }
              }
              @objc public func show(_ call: CAPPluginCall) {
                  if let splash = splashScreen {
                      let settings = splashScreenSettings(from: call)
                      splash.show(settings: settings, completion: { call.resolve() })
                  } else { call.resolve([:]) }
              }
              @objc public func hide(_ call: CAPPluginCall) {
                  if let splash = splashScreen {
                      let settings = splashScreenSettings(from: call)
                      splash.hide(settings: settings)
                      call.resolve()
                  } else { call.resolve([:]) }
              }
              private func splashScreenSettings(from call: CAPPluginCall) -> SplashScreenSettings {
                  var settings = SplashScreenSettings()
                  let showDuration = call.getInt("showDuration", -1)
                  if showDuration >= 0 { settings.showDuration = showDuration }
                  let fadeInDuration = call.getInt("fadeInDuration", -1)
                  if fadeInDuration >= 0 { settings.fadeInDuration = fadeInDuration }
                  let fadeOutDuration = call.getInt("fadeOutDuration", -1)
                  if fadeOutDuration >= 0 { settings.fadeOutDuration = fadeOutDuration }
                  settings.autoHide = call.getBool("autoHide", settings.autoHide)
                  return settings
              }
              private func splashScreenConfig() -> SplashScreenConfig {
                  var config = SplashScreenConfig()
                  let cfgJSON = getConfig().getConfigJSON()
                  if let bgStr = cfgJSON["backgroundColor"] as? String, !bgStr.isEmpty {
                      config.backgroundColor = UIColor.capacitor.color(argb: hexStringToARGB(bgStr))
                  }
                  if let spinnerStr = cfgJSON["iosSpinnerStyle"] as? String, !spinnerStr.isEmpty {
                      config.spinnerStyle = spinnerStr.lowercased() == "small" ? .medium : .large
                  }
                  if let spinnerColorStr = cfgJSON["spinnerColor"] as? String, !spinnerColorStr.isEmpty {
                      config.spinnerColor = UIColor.capacitor.color(argb: hexStringToARGB(spinnerColorStr))
                  }
                  config.showSpinner = getConfig().getBoolean("showSpinner", config.showSpinner)
                  config.launchShowDuration = getConfig().getInt("launchShowDuration", config.launchShowDuration)
                  config.launchAutoHide = getConfig().getBoolean("launchAutoHide", config.launchAutoHide)
                  return config
              }
              private func hexStringToARGB(_ hex: String) -> UInt32 {
                  var s = hex.trimmingCharacters(in: .whitespacesAndNewlines)
                  if s.hasPrefix("#") { s = String(s.dropFirst()) }
                  if s.count == 6 { s = "FF" + s }
                  var val: UInt64 = 0
                  Scanner(string: s).scanHexInt64(&val)
                  return UInt32(val)
              }
          }
          SPLASHEOF
          echo "SplashScreenPlugin rewritten"

          # ── All other plugins: regex patches ───────────────────────────────────
          cat > /tmp/patch_plugins.py << 'PYEOF'
          import re, os

          def rd(f): return open(f).read()
          def wr(f, t): open(f,'w').write(t); print('patched: '+f)

          HEX_HELPER = "\n    private func hexStringToARGB(_ hex: String) -> UInt32 {\n        var s = hex.trimmingCharacters(in: .whitespacesAndNewlines)\n        if s.hasPrefix(\"#\") { s = String(s.dropFirst()) }\n        if s.count == 6 { s = \"FF\" + s }\n        var val: UInt64 = 0\n        Scanner(string: s).scanHexInt64(&val)\n        return UInt32(val)\n    }\n"

          def patch(t):
              t = re.sub(r'call\.reject\([^)]*\)', 'call.resolve([:])', t)
              # guard/if let X = call.getString/getArray/getObject — use Optional()+comma condition (Optional.filter does not exist)
              t = re.sub(r'(guard|if) let (\w+) = call\.getString\("([^"]+)"\)', r'\1 let \2 = Optional(call.getString("\3","")), !\2.isEmpty', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getObject\("([^"]+)"\)', r'\1 let \2 = Optional(call.getObject("\3",[:]) ), !\2.isEmpty', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getArray\("([^"]+)"\)', r'\1 let \2 = Optional(call.getArray("\3",[])), !\2.isEmpty', t)
              # Typed .self forms (8.0.x API)
              t = re.sub(r'(guard|if) let (\w+) = call\.getArray\("([^"]+)",\s*\w+\.self\)', r'\1 let \2 = Optional(call.getArray("\3",[])), !\2.isEmpty', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getObject\("([^"]+)",\s*\w+\.self\)', r'\1 let \2 = Optional(call.getObject("\3",[:]) ), !\2.isEmpty', t)
              t = re.sub(r'call\.getArray\("([^"]+)",\s*\w+\.self\)', r'call.getArray("\1",[])', t)
              t = re.sub(r'call\.getObject\("([^"]+)",\s*\w+\.self\)', r'call.getObject("\1",[:])', t)
              # JSTypes.coerceDictionaryToJSObject removed in 8.2.0
              t = re.sub(r'JSTypes\.coerceDictionaryToJSObject\(([^)]+)\)', r'(\1 as? JSObject)', t)
              # PluginConfig (getConfig()) single-arg getters removed — guard/if let form
              t = re.sub(r'(guard|if) let (\w+) = getConfig\(\)\.getString\("([^"]+)"\)', r'let \2 = getConfig().getString("\3",""); \1 !\2.isEmpty', t)
              t = re.sub(r'(guard|if) let (\w+) = getConfig\(\)\.getArray\("([^"]+)"\)', r'let \2 = getConfig().getArray("\3",[]); \1 !\2.isEmpty', t)
              # PluginConfig single-arg getters — plain form
              t = re.sub(r'getConfig\(\)\.getString\("([^"]+)"\)(?!,)', r'getConfig().getString("\1","")', t)
              t = re.sub(r'getConfig\(\)\.getArray\("([^"]+)"\)(?!,)', r'getConfig().getArray("\1",[])', t)
              t = re.sub(r'getConfig\(\)\.getObject\("([^"]+)"\)(?!,)', r'getConfig().getObject("\1",[:])', t)
              # Remaining one-arg call.get* forms
              t = re.sub(r'call\.getString\("([^"]+)"\)(?!,)', r'call.getString("\1","")', t)
              t = re.sub(r'call\.getArray\("([^"]+)"\)(?!,)', r'call.getArray("\1",[])', t)
              t = re.sub(r'call\.getObject\("([^"]+)"\)(?!,)', r'call.getObject("\1",[:])', t)
              t = re.sub(r'\.color\(fromHex:\s*([^)]+)\)', r'.color(argb: hexStringToARGB(\1))', t)
              # Remove stale force-unwraps from vars that were String?/etc in 8.0.x, now non-optional
              t = re.sub(r'(\w+)!(?=[,\]\)])', r'\1', t)
              return t

          def inject_hex(t):
              if 'color(argb:' not in t: return t
              if 'func hexStringToARGB' in t: return t
              i = t.rfind('\n}')
              return (t[:i] + HEX_HELPER + '\n}' + t[i+2:]) if i != -1 else t

          files = [
              'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsPlugin.swift',
              'node_modules/@capacitor/local-notifications/ios/Sources/LocalNotificationsPlugin/LocalNotificationsPlugin.swift',
              'node_modules/@capacitor/app/ios/Sources/AppPlugin/AppPlugin.swift',
              'node_modules/@capacitor/filesystem/ios/Sources/FilesystemPlugin/FilesystemPlugin.swift',
              'node_modules/@capacitor/preferences/ios/Sources/PreferencesPlugin/PreferencesPlugin.swift',
              'node_modules/@capacitor/haptics/ios/Sources/HapticsPlugin/HapticsPlugin.swift',
              'node_modules/@capacitor/browser/ios/Sources/BrowserPlugin/BrowserPlugin.swift',
              'node_modules/@capacitor-community/speech-recognition/ios/Sources/SpeechRecognitionPlugin/SpeechRecognitionPlugin.swift',
              'node_modules/@capacitor-community/keep-awake/ios/Sources/KeepAwakePlugin/KeepAwakePlugin.swift',
          ]
          for f in files:
              if os.path.exists(f):
                  wr(f, inject_hex(patch(rd(f))))

          mp = 'node_modules/@capacitor-community/media/ios/Sources/MediaPlugin/MediaPlugin.swift'
          if os.path.exists(mp):
              t = patch(rd(mp))
              t = re.sub(r'\.getArray\("sort",\[\]\)\s*as\?\s*\[\[String:\s*Any\]\]', '.getArray("sort",JSObject.self)', t)
              t = re.sub(r'\.getArray\("sort"\)\s*as\?\s*\[\[String:\s*Any\]\]', '.getArray("sort",JSObject.self)', t)
              wr(mp, inject_hex(t))

          ph = 'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsHandler.swift'
          if os.path.exists(ph):
              t = patch(rd(ph))
              t = re.sub(r'if let optionsArray = self\.plugin\?\.getConfig\(\)\.getArray\("presentationOptions"\)\s*as\?\s*\[String\]', 'let optionsArray = (self.plugin?.getConfig().getArray("presentationOptions",[]) as? [String]) ?? []; if !optionsArray.isEmpty', t)
              t = re.sub(r'self\.plugin\?\.getConfig\(\)\.getArray\("presentationOptions"\)', 'self.plugin?.getConfig().getArray("presentationOptions",[])', t)
              wr(ph, t)

          # StatusBar.swift — bridge.webView and bridge.viewController both removed in 8.2.0 binary.
          # Use bridge.getWebView() which is the current Capacitor API.
          # getWebView() returns WKWebView? so .superview, .window, .safeAreaInsets, .frame all apply directly.
          sb = 'node_modules/@capacitor/status-bar/ios/Sources/StatusBarPlugin/StatusBar.swift'
          if os.path.exists(sb):
              t = rd(sb)
              # bridge.webView → bridge.getWebView()
              t = t.replace('bridge.webView', 'bridge.getWebView()')
              # bridge.viewController?.view.window?.windowScene?.keyWindow?.bounds
              # → bridge.getWebView()?.window?.bounds  (get window from the webview itself)
              t = t.replace('bridge.viewController?.view.window?.windowScene?.keyWindow?.bounds', 'bridge.getWebView()?.window?.bounds')
              # bridge.viewController?.view.frame = bounds → webView?.superview?.frame = bounds
              t = t.replace('bridge.viewController?.view.frame = bounds', 'bridge.getWebView()?.superview?.frame = bounds')
              # bridge.viewController?.view.window?.windowScene?.statusBarManager
              t = t.replace('bridge.viewController?.view.window?.windowScene?.statusBarManager', 'bridge.getWebView()?.window?.windowScene?.statusBarManager')
              wr(sb, t)

          print('All plugin patches applied!')
          PYEOF
          python3 /tmp/patch_plugins.py

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Decode provisioning profile
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile file size: $(wc -c < /tmp/profile.mobileprovision) bytes"

          # Unwrap CMS envelope to raw plist
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist

          # Extract UUID using PlistBuddy (most reliable on macOS)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          echo "Profile UUID: $UUID"

          # Log profile details
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/profile.plist)"
          echo "Expiry: $(/usr/libexec/PlistBuddy -c 'Print ExpirationDate' /tmp/profile.plist)"
          echo "Sign in with Apple: $(/usr/libexec/PlistBuddy -c 'Print Entitlements:com.apple.developer.applesignin:0' /tmp/profile.plist 2>/dev/null || echo 'NOT FOUND')"
          echo "Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' /tmp/profile.plist)"

          # Install profile with UUID filename (required by Xcode)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed: ~/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Patch plugin Swift files for capacitor-swift-pm 8.2.0 API changes
        script: |
          # ── SharePlugin: full rewrite ──────────────────────────────────────────
          cat > node_modules/@capacitor/share/ios/Sources/SharePlugin/SharePlugin.swift << 'SHAREEOF'
          import Foundation
          import Capacitor
          @objc(SharePlugin)
          public class SharePlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "SharePlugin"
              public let jsName = "Share"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "canShare", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "share", returnType: CAPPluginReturnPromise)
              ]
              @objc func canShare(_ call: CAPPluginCall) { call.resolve(["value": true]) }
              @objc func share(_ call: CAPPluginCall) {
                  var items = [Any]()
                  let text = call.getString("text", "")
                  if !text.isEmpty { items.append(text) }
                  let urlStr = call.getString("url", "")
                  if !urlStr.isEmpty, let urlObj = URL(string: urlStr) { items.append(urlObj) }
                  let title = call.getString("title", "")
                  guard !items.isEmpty else { call.resolve([:]); return }
                  DispatchQueue.main.async { [weak self] in
                      let ac = UIActivityViewController(activityItems: items, applicationActivities: nil)
                      if !title.isEmpty { ac.setValue(title, forKey: "subject") }
                      ac.completionWithItemsHandler = { _, _, _, _ in call.resolve([:]) }
                      self?.setCenteredPopover(ac)
                      self?.viewController?.present(ac, animated: true, completion: nil)
                  }
              }
          }
          SHAREEOF
          echo "SharePlugin rewritten"

          # ── All other plugins: regex patches ───────────────────────────────────
          cat > /tmp/patch_plugins.py << 'PYEOF'
          import re, os

          def rd(f): return open(f).read()
          def wr(f, t): open(f,'w').write(t); print('patched: '+f)

          HEX_HELPER = "\n    private func hexStringToARGB(_ hex: String) -> UInt32 {\n        var s = hex.trimmingCharacters(in: .whitespacesAndNewlines)\n        if s.hasPrefix(\"#\") { s = String(s.dropFirst()) }\n        if s.count == 6 { s = \"FF\" + s }\n        var val: UInt64 = 0\n        Scanner(string: s).scanHexInt64(&val)\n        return UInt32(val)\n    }\n"

          def patch(t):
              t = re.sub(r'call\.reject\([^)]*\)', 'call.resolve([:])', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getString\("([^"]+)"\)', r'\1 let \2 = Optional(call.getString("\3","")).filter({!$0.isEmpty})', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getObject\("([^"]+)"\)', r'\1 let \2 = Optional(call.getObject("\3",[:]) ).filter({!$0.isEmpty})', t)
              t = re.sub(r'(guard|if) let (\w+) = call\.getArray\("([^"]+)"\)', r'\1 let \2 = Optional(call.getArray("\3",[]) ).filter({!$0.isEmpty})', t)
              t = re.sub(r'call\.getString\("([^"]+)"\)(?!,)', r'call.getString("\1","")', t)
              t = re.sub(r'call\.getArray\("([^"]+)"\)(?!,)', r'call.getArray("\1",[])', t)
              t = re.sub(r'call\.getObject\("([^"]+)"\)(?!,)', r'call.getObject("\1",[:])', t)
              t = re.sub(r'\.color\(fromHex:\s*([^)]+)\)', r'.color(argb: hexStringToARGB(\1))', t)
              # Last: remove stale force-unwraps — vars were String?/etc in 8.0.x, now non-optional
              t = re.sub(r'(\w+)!(?=[,\]\)])', r'\1', t)
              return t

          def inject_hex(t):
              if 'color(argb:' not in t: return t
              if 'func hexStringToARGB' in t: return t
              i = t.rfind('\n}')
              return (t[:i] + HEX_HELPER + '\n}' + t[i+2:]) if i != -1 else t

          files = [
              'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsPlugin.swift',
              'node_modules/@capacitor/local-notifications/ios/Sources/LocalNotificationsPlugin/LocalNotificationsPlugin.swift',
              'node_modules/@capacitor/app/ios/Sources/AppPlugin/AppPlugin.swift',
              'node_modules/@capacitor/filesystem/ios/Sources/FilesystemPlugin/FilesystemPlugin.swift',
              'node_modules/@capacitor/preferences/ios/Sources/PreferencesPlugin/PreferencesPlugin.swift',
              'node_modules/@capacitor/haptics/ios/Sources/HapticsPlugin/HapticsPlugin.swift',
              'node_modules/@capacitor/splash-screen/ios/Sources/SplashScreenPlugin/SplashScreenPlugin.swift',
              'node_modules/@capacitor/status-bar/ios/Sources/StatusBarPlugin/StatusBarPlugin.swift',
              'node_modules/@capacitor/browser/ios/Sources/BrowserPlugin/BrowserPlugin.swift',
              'node_modules/@capacitor-community/speech-recognition/ios/Sources/SpeechRecognitionPlugin/SpeechRecognitionPlugin.swift',
              'node_modules/@capacitor-community/keep-awake/ios/Sources/KeepAwakePlugin/KeepAwakePlugin.swift',
          ]
          for f in files:
              if os.path.exists(f):
                  wr(f, inject_hex(patch(rd(f))))

          mp = 'node_modules/@capacitor-community/media/ios/Sources/MediaPlugin/MediaPlugin.swift'
          if os.path.exists(mp):
              t = patch(rd(mp))
              t = re.sub(r'\.getArray\("sort",\[\]\)\s*as\?\s*\[\[String:\s*Any\]\]', '.getArray("sort",JSObject.self)', t)
              t = re.sub(r'\.getArray\("sort"\)\s*as\?\s*\[\[String:\s*Any\]\]', '.getArray("sort",JSObject.self)', t)
              wr(mp, inject_hex(t))

          ph = 'node_modules/@capacitor/push-notifications/ios/Sources/PushNotificationsPlugin/PushNotificationsHandler.swift'
          if os.path.exists(ph):
              t = rd(ph)
              t = re.sub(r'if let optionsArray = self\.plugin\?\.getConfig\(\)\.getArray\("presentationOptions"\)\s*as\?\s*\[String\]', 'let optionsArray = (self.plugin?.getConfig().getArray("presentationOptions",[]) as? [String]) ?? []; if !optionsArray.isEmpty', t)
              t = re.sub(r'self\.plugin\?\.getConfig\(\)\.getArray\("presentationOptions"\)', 'self.plugin?.getConfig().getArray("presentationOptions",[])', t)
              wr(ph, t)

          print('All plugin patches applied!')
          PYEOF
          python3 /tmp/patch_plugins.py

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Install provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || python3 -c "import plistlib,sys; d=plistlib.loads(open('/tmp/profile.mobileprovision','rb').read()); print(d['UUID'])" 2>/dev/null)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile UUID: $UUID"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Clean install
        script: |
          # Full clean — remove all caches and lockfiles
          rm -rf node_modules package-lock.json
          rm -rf ios/App/Pods ios/App/Podfile.lock ios/App/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/App-*
          rm -rf ~/Library/Caches/org.swift.swiftpm
          # Fresh install with exact versions
          npm install --legacy-peer-deps
          npm install @capacitor/core@8.0.1 @capacitor/ios@8.0.1 @capacitor/cli@8.0.1 --save --save-exact --legacy-peer-deps
          # Verify installed versions
          node -e "const l=require('./package-lock.json'); ['@capacitor/core','@capacitor/ios','@capacitor/cli','@capacitor/status-bar','@capacitor/push-notifications','@capacitor/splash-screen'].forEach(p => console.log(p, l.packages['node_modules/'+p]?.version))"

      - name: Capacitor sync iOS
        script: npx cap sync ios


      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Decode provisioning profile
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile file size: $(wc -c < /tmp/profile.mobileprovision) bytes"

          # Unwrap CMS envelope to raw plist
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist

          # Extract UUID using PlistBuddy
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          if [ -z "$UUID" ]; then
            echo "ERROR: UUID is empty — profile decode failed. Check CM_PROVISIONING_PROFILE value."
            exit 1
          fi
          echo "Profile UUID: $UUID"

          # Log profile details
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/profile.plist)"
          echo "Expiry: $(/usr/libexec/PlistBuddy -c 'Print ExpirationDate' /tmp/profile.plist)"
          echo "Sign in with Apple: $(/usr/libexec/PlistBuddy -c 'Print Entitlements:com.apple.developer.applesignin:0' /tmp/profile.plist 2>/dev/null || echo 'NOT FOUND')"
          echo "Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' /tmp/profile.plist)"

          # Install profile with UUID filename (required by Xcode)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed: $UUID.mobileprovision"

          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

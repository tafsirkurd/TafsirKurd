workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Full clean
        script: |
          rm -rf node_modules package-lock.json
          rm -rf ios/App/Pods ios/App/Podfile.lock ios/App/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/org.swift.swiftpm
          # Remove SPM package cache to force re-resolution of Package.swift
          rm -rf ios/App/CapApp-SPM/.build
          rm -rf ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Force exact Capacitor versions (all plugins)
        script: |
          npm install \
            @capacitor/core@8.0.1 \
            @capacitor/ios@8.0.1 \
            @capacitor/android@8.0.1 \
            @capacitor/cli@8.0.1 \
            @capacitor/app@8.0.1 \
            @capacitor/browser@8.0.1 \
            @capacitor/filesystem@8.0.0 \
            @capacitor/haptics@8.0.1 \
            @capacitor/local-notifications@8.0.1 \
            @capacitor/preferences@8.0.1 \
            @capacitor/push-notifications@8.0.1 \
            @capacitor/share@8.0.1 \
            @capacitor/splash-screen@8.0.1 \
            --save --save-exact --legacy-peer-deps

      - name: Verify removed plugins absent from node_modules
        script: |
          # package.json overrides block these. Verify they were not installed.
          if [ -d node_modules/@capacitor/status-bar ]; then
            echo "ERROR: @capacitor/status-bar found in node_modules — overrides not working"
            npm ls @capacitor/status-bar || true
            exit 1
          fi
          if [ -d node_modules/@capacitor-community/keep-awake ]; then
            echo "ERROR: @capacitor-community/keep-awake found in node_modules — overrides not working"
            npm ls @capacitor-community/keep-awake || true
            exit 1
          fi
          echo "@capacitor/status-bar — absent from node_modules (OK)"
          echo "@capacitor-community/keep-awake — absent from node_modules (OK)"

      - name: Verify Capacitor versions
        script: |
          OFFICIAL="core ios android cli app browser haptics preferences push-notifications local-notifications share splash-screen filesystem"
          echo "Installed @capacitor/* versions:"
          ok=true
          for d in node_modules/@capacitor/*/; do
            pkg=$(basename "$d")
            ver=$(node -p "require('./node_modules/@capacitor/${pkg}/package.json').version" 2>/dev/null || echo "?")
            # Check if this is an official plugin we enforce
            is_official=false
            for official in $OFFICIAL; do
              if [ "$pkg" = "$official" ]; then
                is_official=true
                break
              fi
            done
            if [ "$is_official" = "true" ]; then
              if [ "$pkg" = "filesystem" ]; then
                expected="8.0.0"
              else
                expected="8.0.1"
              fi
              if [ "$ver" = "$expected" ]; then
                echo "  @capacitor/${pkg}: ${ver} (OK)"
              else
                echo "  @capacitor/${pkg}: ${ver} (ERROR: expected ${expected})"
                ok=false
              fi
            else
              echo "  @capacitor/${pkg}: ${ver} (skipped)"
            fi
          done
          if [ "$ok" = "false" ]; then
            echo "Version mismatch — aborting"
            exit 1
          fi
          echo "All official @capacitor/* versions OK"

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Verify iOS project clean
        script: |
          # 1. Check capacitor-swift-pm version
          SPMVER=$(grep 'capacitor-swift-pm' ios/App/CapApp-SPM/Package.swift | grep -o '"8\.[^"]*"')
          echo "capacitor-swift-pm version in Package.swift: $SPMVER"
          if [[ "$SPMVER" != '"8.0.1"' ]]; then
            echo "ERROR: capacitor-swift-pm is $SPMVER, expected \"8.0.1\""
            exit 1
          fi
          echo "Package.swift version: OK"

          # 2. Scan ALL iOS project files for removed plugin references
          echo "Scanning ios/App for removed plugin strings..."
          if grep -R "CapacitorCommunityKeepAwake\|KeepAwakePlugin\|CapacitorStatusBar\|StatusBarPlugin" ios/App; then
            echo "ERROR: Removed plugins still found in iOS project files — see matches above"
            exit 1
          fi
          echo "Removed plugins confirmed absent from all iOS project files"


      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Step 1: Decode provisioning profile
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          # Step 2: Validate decoded file before doing anything else
          if [ ! -s /tmp/profile.mobileprovision ]; then
            echo "ERROR: Decoded provisioning profile file is empty"
            exit 1
          fi

          echo "Decoded provisioning profile size:"
          wc -c /tmp/profile.mobileprovision

          # Step 3: Unwrap CMS envelope — hard fail if this fails
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist || {
            echo "ERROR: Failed to decode CMS (profile corrupted or not a valid .mobileprovision)"
            exit 1
          }

          # Step 4: Extract fields using PlistBuddy only
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          APPID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist)
          TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          SIGNIN=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.applesignin" /tmp/profile.plist 2>/dev/null || true)

          echo "Profile name: $NAME"
          echo "UUID: $UUID"
          echo "App ID: $APPID"
          echo "Team: $TEAM"
          echo "Sign in with Apple: $SIGNIN"

          # Step 5: Fail if UUID still empty
          if [ -z "$UUID" ]; then
            echo "ERROR: Provisioning profile UUID is empty. CM_PROVISIONING_PROFILE is invalid or corrupted."
            exit 1
          fi

          echo "Using profile UUID: $UUID"

          # Step 6: Install profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          echo "Installed profile:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Step 7: Apply to Xcode project
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

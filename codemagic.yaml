workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        BUNDLE_ID_WIDGET: com.tafsirkurd.app.TafsirKurdWidget
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 26.0

    scripts:
      - name: Full clean
        script: |
          rm -rf node_modules package-lock.json
          rm -rf ios/App/Pods ios/App/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies
        script: npm install --legacy-peer-deps --omit=dev

      - name: Force exact Capacitor versions (all plugins)
        script: |
          npm install \
            @capacitor/core@8.0.1 \
            @capacitor/ios@8.0.1 \
            @capacitor/android@8.0.1 \
            @capacitor/cli@8.0.1 \
            @capacitor/app@8.0.1 \
            @capacitor/browser@8.0.1 \
            @capacitor/filesystem@8.0.0 \
            @capacitor/haptics@8.0.1 \
            @capacitor/local-notifications@8.0.1 \
            @capacitor/preferences@8.0.1 \
            @capacitor/push-notifications@8.0.1 \
            --save --save-exact --legacy-peer-deps

      - name: Verify removed plugins absent from node_modules
        script: |
          for pkg in \
            @capacitor/status-bar \
            @capacitor-community/keep-awake \
            @capacitor-community/speech-recognition \
            @capacitor/share \
            @capacitor/splash-screen; do
            dir="node_modules/${pkg}"
            if [ -d "$dir" ]; then
              echo "ERROR: ${pkg} found in node_modules — overrides not working"
              npm ls "$pkg" || true
              exit 1
            fi
            echo "${pkg} — absent (OK)"
          done

      - name: Verify Capacitor versions
        script: |
          set -e
          echo "Installed @capacitor/* versions:"
          ok=true
          for d in node_modules/@capacitor/*/; do
            [ -d "$d" ] || continue
            pkg=$(basename "$d")
            ver=$(node -p "require('./node_modules/@capacitor/${pkg}/package.json').version" 2>/dev/null || echo "?")
            case "$pkg" in
              core|ios|android|cli|app|browser|haptics|local-notifications|preferences|push-notifications)
                expected="8.0.1"
                ;;
              filesystem)
                expected="8.0.0"
                ;;
              *)
                echo "@capacitor/${pkg}: ${ver} (skipped)"
                continue
                ;;
            esac
            if [ "$ver" = "$expected" ]; then
              echo "@capacitor/${pkg}: ${ver} (OK)"
            else
              echo "@capacitor/${pkg}: ${ver} (ERROR: expected ${expected})"
              ok=false
            fi
          done
          if [ "$ok" = "false" ]; then
            echo "Version mismatch — aborting"
            exit 1
          fi
          echo "All official @capacitor/* versions OK"

      - name: Inject GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist written ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"

      - name: Capacitor sync iOS
        script: |
          # cap sync copies web assets then runs pod install.
          # GitHub CDN occasionally returns 502 on IONFilesystemLib — retry pod install on failure.
          if ! npx cap sync ios; then
            echo "cap sync failed — retrying pod install up to 3 times..."
            success=false
            for attempt in 1 2 3; do
              echo "pod install attempt $attempt/3"
              sleep 10
              if (cd ios/App && pod install); then
                success=true
                break
              fi
            done
            if [ "$success" != "true" ]; then
              echo "pod install failed after 3 retries"
              exit 1
            fi
          fi

      - name: Strip web fonts from iOS bundle (ITMS-90853)
        script: |
          set -e
          # scripts/strip-ios-fonts.js converts qcf4 woff2 -> qcf4ttf/*.ttf BEFORE
          # stripping, so Mushaf QCF4 fonts work offline on iOS. The old raw
          # find-delete below nuked all 604 mushaf fonts without conversion,
          # which made iOS silently fall back to plain Hafs rendering.
          node scripts/strip-ios-fonts.js
          PUBLIC=ios/App/App/public
          TTF_COUNT=$(find "$PUBLIC/assets/fonts/qcf4ttf" -name "*.ttf" 2>/dev/null | wc -l | tr -d ' ')
          echo "qcf4ttf TTF files: $TTF_COUNT"
          if [ "$TTF_COUNT" -ne "604" ]; then
            echo "ERROR: expected 604 converted mushaf TTFs, got $TTF_COUNT"
            exit 1
          fi
          echo "Verifying no web fonts remain..."
          REMAINING=$(find "$PUBLIC" \( -name "*.woff" -o -name "*.woff2" \) | wc -l | tr -d ' ')
          echo "Web fonts remaining: $REMAINING"
          if [ "$REMAINING" -gt "0" ]; then
            find "$PUBLIC" \( -name "*.woff" -o -name "*.woff2" \)
            echo "ERROR: web fonts not fully stripped"
            exit 1
          fi
          echo "Strip complete — no web fonts remain"

      - name: Verify iOS project clean
        script: |
          # 1. Podfile must exist — CocoaPods mode requires it
          if [ ! -f ios/App/Podfile ]; then
            echo "ERROR: ios/App/Podfile missing after cap sync — CocoaPods mode broken"
            exit 1
          fi
          echo "Podfile: OK"

          # 2. Scan for banned plugin references
          echo "Scanning ios/App for removed plugin strings..."
          if grep -R \
            "CapacitorCommunityKeepAwake\|KeepAwakePlugin\|CapacitorCommunitySpeechRecognition\|SpeechRecognitionPlugin\|CapacitorStatusBar\|StatusBarPlugin\|CapacitorShare\|SharePlugin\|CapacitorSplashScreen\|SplashScreenPlugin" \
            ios/App; then
            echo "ERROR: Removed plugins still found in iOS project files — see matches above"
            exit 1
          fi
          echo "Removed plugins confirmed absent from all iOS project files"


      - name: Verify Xcode workspace
        script: |
          echo "ios/App contents:"
          ls -la ios/App

          fail=false
          for f in \
            ios/App/App.xcworkspace/contents.xcworkspacedata \
            ios/App/App.xcodeproj/project.pbxproj \
            ios/App/Podfile; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f"
              fail=true
            else
              echo "OK: $f"
            fi
          done
          [ "$fail" = "true" ] && exit 1 || true

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Step 1: Decode provisioning profile
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          # Step 2: Validate decoded file before doing anything else
          if [ ! -s /tmp/profile.mobileprovision ]; then
            echo "ERROR: Decoded provisioning profile file is empty"
            exit 1
          fi

          echo "Decoded provisioning profile size:"
          wc -c /tmp/profile.mobileprovision

          # Step 3: Unwrap CMS envelope — hard fail if this fails
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist || {
            echo "ERROR: Failed to decode CMS (profile corrupted or not a valid .mobileprovision)"
            exit 1
          }

          # Step 4: Extract fields using PlistBuddy only
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          APPID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist)
          TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          SIGNIN=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.applesignin" /tmp/profile.plist 2>/dev/null || true)

          echo "Profile name: $NAME"
          echo "UUID: $UUID"
          echo "App ID: $APPID"
          echo "Team: $TEAM"
          echo "Sign in with Apple: $SIGNIN"

          # Step 5: Fail if UUID still empty
          if [ -z "$UUID" ]; then
            echo "ERROR: Provisioning profile UUID is empty. CM_PROVISIONING_PROFILE is invalid or corrupted."
            exit 1
          fi

          echo "Using profile UUID: $UUID"

          # Step 6: Install main app profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          # Step 7: Install widget provisioning profile
          if [ -n "$CM_PROVISIONING_PROFILE_WIDGET" ]; then
            printf '%s' "$CM_PROVISIONING_PROFILE_WIDGET" | base64 --decode > /tmp/widget_profile.mobileprovision
            security cms -D -i /tmp/widget_profile.mobileprovision > /tmp/widget_profile.plist
            WIDGET_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/widget_profile.plist)
            cp /tmp/widget_profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$WIDGET_UUID.mobileprovision"
            echo "Widget profile UUID: $WIDGET_UUID"
          fi

          echo "Installed profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Step 8: Apply to Xcode project
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Convert athan M4A to CAF
        script: |
          set -e
          chmod +x scripts/convert-athan-to-caf.sh
          bash scripts/convert-athan-to-caf.sh
          echo "Verifying .caf files..."
          for v in mishary nasser omar peshawa raad; do
            f="ios/App/App/athan_${v}.caf"
            if [ ! -f "$f" ]; then
              echo "ERROR: $f was not created by conversion script"
              exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done
          echo "All 5 .caf files ready."

      - name: Set build number
        script: |
          set -e
          BUILD_NUM=$(grep -m1 'CURRENT_PROJECT_VERSION' ios/App/App.xcodeproj/project.pbxproj | tr -dc '0-9')
          echo "Build number from pbxproj: [$BUILD_NUM]"
          # Stamp pbxproj via agvtool
          cd ios/App && xcrun agvtool new-version -all "$BUILD_NUM" && cd ../..
          # Also stamp Info.plist directly (bypasses variable substitution)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/TafsirKurdWidget/Info.plist 2>/dev/null || true
          echo "CFBundleVersion now: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/App/App/Info.plist)"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"


    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

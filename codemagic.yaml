workflows:
  ios-app-store:
    name: TafsirKurd iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: TafsirKurd
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.tafsirkurd.app
        TEAM_ID: 8KA7UDSC9D
      node: latest
      xcode: 16.2

    scripts:
      - name: Full clean
        script: |
          rm -rf node_modules package-lock.json
          rm -rf ios/App/Pods ios/App/Podfile.lock ios/App/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Force exact Capacitor versions (all plugins)
        script: |
          npm install \
            @capacitor/core@8.0.1 \
            @capacitor/ios@8.0.1 \
            @capacitor/android@8.0.1 \
            @capacitor/cli@8.0.1 \
            @capacitor/app@8.0.1 \
            @capacitor/browser@8.0.1 \
            @capacitor/filesystem@8.0.0 \
            @capacitor/haptics@8.0.1 \
            @capacitor/local-notifications@8.0.1 \
            @capacitor/preferences@8.0.1 \
            @capacitor-community/apple-sign-in@7.1.0 \
            --save --save-exact --legacy-peer-deps

      - name: Verify removed plugins absent from node_modules
        script: |
          for pkg in \
            @capacitor/status-bar \
            @capacitor-community/keep-awake \
            @capacitor-community/speech-recognition \
            @capacitor/share \
            @capacitor/push-notifications \
            @capacitor/splash-screen; do
            dir="node_modules/${pkg}"
            if [ -d "$dir" ]; then
              echo "ERROR: ${pkg} found in node_modules — overrides not working"
              npm ls "$pkg" || true
              exit 1
            fi
            echo "${pkg} — absent (OK)"
          done

      - name: Verify Capacitor versions
        script: |
          set -e
          echo "Installed @capacitor/* versions:"
          ok=true
          for d in node_modules/@capacitor/*/; do
            [ -d "$d" ] || continue
            pkg=$(basename "$d")
            ver=$(node -p "require('./node_modules/@capacitor/${pkg}/package.json').version" 2>/dev/null || echo "?")
            case "$pkg" in
              core|ios|android|cli|app|browser|haptics|local-notifications|preferences)
                expected="8.0.1"
                ;;
              filesystem)
                expected="8.0.0"
                ;;
              *)
                echo "@capacitor/${pkg}: ${ver} (skipped)"
                continue
                ;;
            esac
            if [ "$ver" = "$expected" ]; then
              echo "@capacitor/${pkg}: ${ver} (OK)"
            else
              echo "@capacitor/${pkg}: ${ver} (ERROR: expected ${expected})"
              ok=false
            fi
          done
          if [ "$ok" = "false" ]; then
            echo "Version mismatch — aborting"
            exit 1
          fi
          echo "All official @capacitor/* versions OK"

      - name: Patch apple-sign-in plugin for Capacitor 8 compatibility
        script: |
          node --eval "const fs=require('fs'),p='node_modules/@capacitor-community/apple-sign-in/ios/Sources/SignInWithApple/Plugin.swift';if(!fs.existsSync(p)){console.log('Not found, skipping');process.exit(0);}fs.writeFileSync(p,Buffer.from('','base64'));console.log('Patched OK:',fs.statSync(p).size,'bytes');"

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Diagnose Plugin.swift after cap sync
        script: |
          P="node_modules/@capacitor-community/apple-sign-in/ios/Sources/SignInWithApple/Plugin.swift"
          if [ -f "$P" ]; then
            grep -q "CAPBridgedPlugin" "$P" && echo "✅ Patch present" || echo "❌ PATCH MISSING — re-applying now"
            grep -q "CAPBridgedPlugin" "$P" || node --eval "const fs=require('fs');fs.writeFileSync('$P',Buffer.from('','base64'));console.log('Re-patched OK');"
            echo "=== Plugin.swift first 4 lines ==="
            head -4 "$P"
          else
            echo "❌ File not found"
          fi

      - name: Verify iOS project clean
        script: |
          # 1. Podfile must exist — CocoaPods mode requires it
          if [ ! -f ios/App/Podfile ]; then
            echo "ERROR: ios/App/Podfile missing after cap sync — CocoaPods mode broken"
            exit 1
          fi
          echo "Podfile: OK"

          # 2. Scan for banned plugin references
          echo "Scanning ios/App for removed plugin strings..."
          if grep -R \
            "CapacitorCommunityKeepAwake\|KeepAwakePlugin\|CapacitorCommunitySpeechRecognition\|SpeechRecognitionPlugin\|CapacitorStatusBar\|StatusBarPlugin\|CapacitorShare\|SharePlugin\|CapacitorPushNotifications\|PushNotificationsPlugin\|CapacitorSplashScreen\|SplashScreenPlugin" \
            ios/App; then
            echo "ERROR: Removed plugins still found in iOS project files — see matches above"
            exit 1
          fi
          echo "Removed plugins confirmed absent from all iOS project files"


      - name: Verify Xcode workspace
        script: |
          echo "ios/App contents:"
          ls -la ios/App

          fail=false
          for f in \
            ios/App/App.xcworkspace/contents.xcworkspacedata \
            ios/App/App.xcodeproj/project.pbxproj \
            ios/App/Podfile; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f"
              fail=true
            else
              echo "OK: $f"
            fi
          done
          [ "$fail" = "true" ] && exit 1 || true

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # Install certificate
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Step 1: Decode provisioning profile
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          # Step 2: Validate decoded file before doing anything else
          if [ ! -s /tmp/profile.mobileprovision ]; then
            echo "ERROR: Decoded provisioning profile file is empty"
            exit 1
          fi

          echo "Decoded provisioning profile size:"
          wc -c /tmp/profile.mobileprovision

          # Step 3: Unwrap CMS envelope — hard fail if this fails
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist || {
            echo "ERROR: Failed to decode CMS (profile corrupted or not a valid .mobileprovision)"
            exit 1
          }

          # Step 4: Extract fields using PlistBuddy only
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          APPID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist)
          TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
          SIGNIN=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.applesignin" /tmp/profile.plist 2>/dev/null || true)

          echo "Profile name: $NAME"
          echo "UUID: $UUID"
          echo "App ID: $APPID"
          echo "Team: $TEAM"
          echo "Sign in with Apple: $SIGNIN"

          # Step 5: Fail if UUID still empty
          if [ -z "$UUID" ]; then
            echo "ERROR: Provisioning profile UUID is empty. CM_PROVISIONING_PROFILE is invalid or corrupted."
            exit 1
          fi

          echo "Using profile UUID: $UUID"

          # Step 6: Install profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          echo "Installed profile:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Step 7: Apply to Xcode project
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

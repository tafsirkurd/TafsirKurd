<!--
    AWS S3 VIDEO MANAGEMENT SECTION
    Add this to admin.html in the Videos Section (replace or enhance existing)
    Requires: AWS SDK, Supabase client
-->

<!-- AWS S3 Configuration Section -->
<div class="table-container" style="margin-bottom: 30px;">
    <div class="table-header" style="background: linear-gradient(135deg, #fef3c7 0%, #ffffff 100%); border: 2px solid #fde047; border-radius: 12px; padding: 20px;">
        <h2 class="table-title" style="margin: 0 0 15px 0;">⚙️ AWS S3 Configuration</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">AWS Region</label>
                <input type="text" id="awsRegion" value="eu-north-1" placeholder="eu-north-1" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">S3 Bucket Name</label>
                <input type="text" id="s3BucketName" placeholder="your-bucket-name" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">AWS Access Key ID</label>
                <input type="text" id="awsAccessKeyId" placeholder="AKIA..." style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">AWS Secret Access Key</label>
                <input type="password" id="awsSecretAccessKey" placeholder="Secret key" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button onclick="saveAWSConfig()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer;">
                💾 Save Configuration
            </button>
            <button onclick="testAWSConnection()" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer;">
                🔍 Test Connection
            </button>
        </div>
        <div id="awsConfigStatus" style="margin-top: 10px; padding: 10px; border-radius: 8px; display: none;"></div>
    </div>
</div>

<!-- Video Upload Section -->
<div class="table-container" style="margin-bottom: 30px;">
    <div class="table-header" style="background: linear-gradient(135deg, #fce7f3 0%, #ffffff 100%); border: 2px solid #f472b6; border-radius: 12px; padding: 20px;">
        <h2 class="table-title" style="margin: 0 0 15px 0;">📤 Upload Video to AWS S3</h2>

        <!-- Video File Upload -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; font-weight: 600; color: #666;">
                🎬 Select Video File
            </label>
            <div style="border: 3px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center; background: #f9fafb; cursor: pointer; transition: all 0.3s;" id="videoDropZone" ondrop="handleVideoDrop(event)" ondragover="handleVideoDragOver(event)" ondragleave="handleVideoDragLeave(event)" onclick="document.getElementById('videoFileInput').click()">
                <div style="font-size: 48px; margin-bottom: 10px;">🎥</div>
                <div style="font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 5px;">
                    Drop video file here or click to browse
                </div>
                <div style="font-size: 14px; color: #6b7280;">
                    Supported formats: MP4, WebM, MOV (Max 5GB)
                </div>
                <input type="file" id="videoFileInput" accept="video/*" style="display: none;" onchange="handleVideoFileSelect(event)">
            </div>
            <div id="selectedVideoInfo" style="margin-top: 15px; display: none; padding: 15px; background: #f0fdf4; border: 2px solid #86efac; border-radius: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight: 600; color: #15803d;" id="selectedVideoName"></div>
                        <div style="font-size: 13px; color: #4ade80; margin-top: 3px;" id="selectedVideoSize"></div>
                    </div>
                    <button onclick="clearSelectedVideo()" style="background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;">
                        ✕ Remove
                    </button>
                </div>
            </div>
        </div>

        <!-- Video Metadata Form -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">Video Title *</label>
                <input type="text" id="videoTitle" placeholder="Enter video title" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">Category</label>
                <select id="videoCategory" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                    <option value="tafsir">📖 Tafsir</option>
                    <option value="lecture">🎓 Lecture</option>
                    <option value="series">📺 Series</option>
                    <option value="other">📁 Other</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">Resolution</label>
                <select id="videoResolution" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                    <option value="1080p">1080p (Full HD)</option>
                    <option value="720p">720p (HD)</option>
                    <option value="480p">480p (SD)</option>
                    <option value="360p">360p</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 600; color: #666;">Description</label>
            <textarea id="videoDescription" rows="3" placeholder="Enter video description..." style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: vertical;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div>
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="videoPublished" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
                    <span style="font-weight: 600; color: #666;">✅ Publish Immediately</span>
                </label>
            </div>
            <div>
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="videoFeatured" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
                    <span style="font-weight: 600; color: #666;">⭐ Featured Video</span>
                </label>
            </div>
        </div>

        <!-- Upload Progress -->
        <div id="uploadProgress" style="display: none; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: 600; color: #374151;">Uploading to AWS S3...</span>
                <span id="uploadPercent" style="font-weight: 700; color: #667eea;">0%</span>
            </div>
            <div style="width: 100%; height: 24px; background: #e5e7eb; border-radius: 12px; overflow: hidden; position: relative;">
                <div id="uploadProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; position: relative;">
                    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite;"></div>
                </div>
            </div>
            <div id="uploadSpeed" style="margin-top: 5px; font-size: 13px; color: #6b7280;"></div>
        </div>

        <!-- Upload Button -->
        <div style="display: flex; gap: 10px;">
            <button id="uploadButton" onclick="uploadVideoToS3()" style="flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 24px; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); transition: all 0.3s;">
                🚀 Upload Video to AWS S3
            </button>
            <button onclick="resetUploadForm()" style="background: #6b7280; color: white; border: none; padding: 15px 24px; border-radius: 10px; font-weight: 600; cursor: pointer;">
                🔄 Reset
            </button>
        </div>
    </div>
</div>

<!-- Uploaded Videos List -->
<div class="table-container">
    <div class="table-header" style="background: linear-gradient(135deg, #dbeafe 0%, #ffffff 100%); border: 2px solid #60a5fa; border-radius: 12px; padding: 20px; margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h2 class="table-title" style="margin: 0 0 8px 0;">🎬 Uploaded Videos (AWS S3)</h2>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; font-size: 13px; color: #666;">
                    <span id="s3VideosTotal" style="background: #f0f9ff; padding: 6px 12px; border-radius: 6px; font-weight: 600;">📊 Total: 0</span>
                    <span id="s3VideosPublished" style="background: #f0fdf4; padding: 6px 12px; border-radius: 6px; font-weight: 600;">✅ Published: 0</span>
                    <span id="s3VideosDraft" style="background: #fef3c7; padding: 6px 12px; border-radius: 6px; font-weight: 600;">📝 Draft: 0</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="videoSearchBox" placeholder="🔍 Search videos..." style="padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 250px;" oninput="filterVideos()">
                <button onclick="refreshVideosList()" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                    🔄 Refresh
                </button>
            </div>
        </div>
    </div>
    <div id="s3VideosTable" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading videos from AWS S3...</div>
        </div>
    </div>
</div>

<style>
@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: all 0.3s;
}

.video-card:hover {
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    transform: translateY(-5px);
}

.video-thumbnail {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.video-info {
    padding: 15px;
}

.video-title {
    font-weight: 700;
    font-size: 16px;
    color: #1f2937;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.video-meta {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 12px;
}

.video-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.video-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.video-btn:hover {
    transform: scale(1.05);
}
</style>

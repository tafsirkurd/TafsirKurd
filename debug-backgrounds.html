<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Background Images</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #0f0;
        }
        .result {
            background: #000;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #0f0;
            border-radius: 5px;
        }
        .error {
            color: #f00;
            border-color: #f00;
        }
        .success {
            color: #0f0;
        }
        h2 {
            color: #0ff;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h1>🔍 Background Images Database Debug</h1>

    <div id="results"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const resultsDiv = document.getElementById('results');

        function log(title, content, isError = false) {
            const div = document.createElement('div');
            div.className = 'result' + (isError ? ' error' : ' success');
            div.innerHTML = `<h2>${title}</h2><pre>${JSON.stringify(content, null, 2)}</pre>`;
            resultsDiv.appendChild(div);
        }

        async function debugBackgrounds() {
            try {
                // Initialize Supabase
                log('Step 1', 'Initializing Supabase...');

                const supabaseUrl = 'https://rqxwuxtwscmwtrlpzpbb.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxeHd1eHR3c2Ntd3RybHB6cGJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM4MzQxNDQsImV4cCI6MjA0OTQxMDE0NH0.e6sJlr2-h2nmbdAn-3wJXvFd1lCtgL84diFWcxMk4SY';

                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                log('Step 2', 'Supabase initialized successfully');

                // Query ALL background images (no filters)
                log('Step 3', 'Querying ALL background images...');
                const { data: allData, error: allError } = await supabase
                    .from('background_images')
                    .select('*');

                if (allError) {
                    log('ERROR - All Images Query', allError, true);
                } else {
                    log('SUCCESS - All Images', {
                        count: allData?.length || 0,
                        data: allData
                    });
                }

                // Query index page images (what homepage uses)
                log('Step 4', 'Querying INDEX page images (page_name=index, is_active=true)...');
                const { data: indexData, error: indexError } = await supabase
                    .from('background_images')
                    .select('image_url')
                    .eq('page_name', 'index')
                    .eq('is_active', true)
                    .order('image_order', { ascending: true });

                if (indexError) {
                    log('ERROR - Index Images Query', indexError, true);
                } else {
                    log('SUCCESS - Index Images (What Homepage Should Show)', {
                        count: indexData?.length || 0,
                        urls: indexData?.map(img => img.image_url) || []
                    });
                }

            } catch (error) {
                log('FATAL ERROR', error, true);
            }
        }

        debugBackgrounds();
    </script>
</body>
</html>
